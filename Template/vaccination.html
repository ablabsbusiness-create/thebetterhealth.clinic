  <style>
    :root {
      --bg: #f4f7f5;
      --panel: #ffffff;
      --ink: #1b2a21;
      --muted: #607067;
      --line: #d7e2d9;
      --brand: #166534;
      --brand-soft: #dcfce7;
      --brand-strong: #14532d;
      --accent: #b45309;
      --accent-soft: #ffedd5;
      --danger: #b91c1c;
      --danger-soft: #fee2e2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(248, 252, 248, 0.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .topbar {
      width: min(1220px, calc(100% - 28px));
      min-height: 72px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #166534, #22c55e);
      color: #fff;
      font-weight: 800;
    }

    .brand-copy strong,
    .brand-copy span {
      display: block;
    }

    .brand-copy strong { font-size: 15px; }
    .brand-copy span { margin-top: 4px; color: var(--muted); font-size: 12px; }

    .topbar-actions {
      margin-left: auto;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-link,
    .btn-primary,
    .btn-secondary,
    .btn-ghost {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      padding: 0 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .nav-link,
    .btn-secondary,
    .btn-ghost {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--brand-strong);
    }

    .btn-primary {
      border: 1px solid var(--brand);
      background: var(--brand);
      color: #fff;
    }

    .btn-ghost {
      min-height: 32px;
      padding: 0 10px;
      background: #f8fbf9;
      color: var(--muted);
    }

    .page-shell {
      width: 100%;
      margin: 0;
      padding: 10px 8px 32px;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0 0 5px;
      font-size: 18px;
      line-height: 1.1;
    }

    .muted {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .patient-search {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    input,
    select,
    textarea {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      padding: 8px 10px;
    }

    textarea {
      width: 100%;
      min-height: 72px;
      resize: vertical;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 8px;
    }

    .summary-card {
      border: 1px solid var(--line);
      background: #fff;
      padding: 9px 10px;
    }

    .summary-card span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .summary-card strong {
      display: block;
      margin-top: 7px;
      font-size: 16px;
      line-height: 1.1;
    }

    .panel {
      margin-bottom: 8px;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid #e9f0ea;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 13px;
    }

    .chart-head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .chart-scroll-btn {
      width: 32px;
      height: 30px;
      display: inline-grid;
      place-items: center;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #ffffff;
      color: #14532d;
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
    }

    .chart-scroll-btn:hover {
      background: #effaf2;
      border-color: #9fcfb0;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 2320px;
    }

    th,
    td {
      padding: 0;
      border: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: top;
      font-size: 11px;
    }

    th {
      height: 30px;
      padding: 6px 8px;
      color: #334155;
      background: #f8fafc;
      font-size: 11px;
      text-align: center;
      white-space: nowrap;
      text-transform: none;
    }

    .schedule-table {
      table-layout: fixed;
    }

    .schedule-table th:first-child,
    .schedule-table td:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
      width: 92px;
      min-width: 92px;
      max-width: 92px;
      background: #ffffff;
      text-align: center;
      font-weight: 700;
      color: #475569;
    }

    .schedule-table th:first-child {
      z-index: 5;
      background: #f8fafc;
    }

    .schedule-table th.is-current,
    .schedule-table td.is-current {
      border-left: 2px solid #2563eb;
      border-right: 2px solid #2563eb;
    }

    .schedule-table th.is-current {
      background: #2563eb;
      color: #ffffff;
    }

    .vaccine-row-label {
      min-height: 118px;
      display: grid;
      place-items: center;
      padding: 8px;
    }

    .schedule-cell {
      min-height: 118px;
      padding: 7px 8px;
      background: #ffffff;
      overflow: hidden;
    }

    .schedule-cell.has-vaccine {
      background: #fffdf5;
    }

    .schedule-cell.status-given {
      background: #d1fae5;
    }

    .schedule-cell.status-due {
      background: #dbeafe;
    }

    .schedule-cell.status-missed {
      background: #fee2e2;
    }

    .schedule-cell.status-pending {
      background: #ffffff;
    }

    .cell-vaccine {
      display: block;
      font-weight: 800;
      color: #1f2937;
      line-height: 1.18;
      overflow-wrap: anywhere;
    }

    .cell-vaccine-entry + .cell-vaccine-entry {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(148, 163, 184, 0.35);
    }

    .cell-date,
    .cell-note {
      display: block;
      margin-top: 4px;
      color: #475569;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .cell-status {
      display: inline-flex;
      margin-top: 4px;
      min-height: 18px;
      align-items: center;
      border-radius: 999px;
      padding: 0 6px;
      background: rgba(255, 255, 255, 0.74);
      color: #334155;
      font-size: 10px;
      font-weight: 800;
    }

    .row-actions {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .cell-action {
      min-height: 22px;
      border-radius: 4px;
      border: 1px solid #cbd5e1;
      background: rgba(255, 255, 255, 0.86);
      color: #14532d;
      font: inherit;
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
      padding: 0 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .edit-grid {
      display: grid;
      grid-template-columns: 180px 180px minmax(220px, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .field label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .history-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .history-list li {
      border: 1px solid var(--line);
      background: #f8fbf9;
      padding: 10px;
      font-size: 13px;
    }

    .action-panel {
      border: 1px solid var(--line);
      background: #ffffff;
      margin-bottom: 8px;
      padding: 12px;
    }

    .action-panel h2 {
      margin: 0 0 10px;
      font-size: 14px;
    }

    .vaccine-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.36);
    }

    .vaccine-modal.is-open {
      display: flex;
    }

    .vaccine-modal-dialog {
      width: min(720px, 100%);
      max-height: min(86vh, 720px);
      border: 1px solid var(--line);
      background: #ffffff;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.22);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .vaccine-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      border-bottom: 1px solid #e9f0ea;
    }

    .vaccine-tabs {
      display: flex;
      gap: 26px;
    }

    .vaccine-tab {
      min-height: 52px;
      border: 0;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .vaccine-tab.is-active {
      border-color: #1677ff;
      color: #1677ff;
    }

    .vaccine-modal-close {
      width: 30px;
      height: 30px;
      border: 0;
      background: transparent;
      color: #7b8794;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
    }

    .vaccine-modal-body {
      min-height: 0;
      overflow: hidden;
    }

    .vaccine-given-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(220px, 0.82fr);
      min-height: 460px;
    }

    .vaccine-given-main {
      padding: 22px 20px 18px;
    }

    .vaccine-given-main h2 {
      margin: 0 0 16px;
      font-size: 15px;
      color: #4b5563;
    }

    .vaccine-note {
      width: 100%;
      min-height: 48px;
      border-radius: 4px;
      border: 1px solid #d5dde5;
      font-size: 13px;
    }

    .vaccine-date-controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 10px 0;
    }

    .vaccine-date-controls select,
    .vaccine-date-controls button {
      min-height: 28px;
      border-radius: 4px;
      border: 1px solid #d5dde5;
      background: #ffffff;
      color: #5f6b7a;
      font: inherit;
      font-size: 12px;
      padding: 0 9px;
    }

    .vaccine-date-controls button.is-active {
      border-color: #1677ff;
      color: #1677ff;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-top: 1px solid #d5dde5;
      border-bottom: 1px solid #d5dde5;
      padding: 7px 0 10px;
      row-gap: 4px;
      text-align: center;
      color: #4b5563;
      font-size: 13px;
    }

    .calendar-day-name {
      color: #6b7280;
      font-weight: 600;
      padding: 4px 0;
    }

    .calendar-day {
      width: 26px;
      height: 26px;
      justify-self: center;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: #4b5563;
      font: inherit;
      cursor: pointer;
    }

    .calendar-day.is-muted {
      color: #c3cad3;
    }

    .calendar-day.is-selected {
      background: #1677ff;
      color: #ffffff;
      font-weight: 800;
    }

    .calendar-today {
      margin-top: 10px;
      display: flex;
      justify-content: center;
    }

    .calendar-today button {
      border: 0;
      background: transparent;
      color: #1677ff;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .vaccine-brand-panel {
      border-left: 1px solid #e5e7eb;
      padding: 22px 22px;
      overflow-y: auto;
    }

    .vaccine-brand-panel h3 {
      margin: 0 0 14px;
      color: #4b5563;
      font-size: 13px;
      font-weight: 600;
    }

    .brand-options {
      display: grid;
      gap: 12px;
    }

    .brand-option {
      display: flex;
      align-items: center;
      gap: 9px;
      color: #4b5563;
      font-size: 13px;
    }

    .brand-option input {
      min-height: 0;
      width: 14px;
      height: 14px;
      margin: 0;
    }

    .vaccine-modal-foot {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
    }

    .vaccine-modal-foot .btn-primary {
      min-height: 36px;
      background: #1677ff;
      border-color: #1677ff;
      border-radius: 4px;
    }

    .empty-state,
    .status-note {
      color: var(--muted);
      padding: 16px;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 860px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .vaccine-modal {
        align-items: end;
        padding: 12px;
      }

      .vaccine-given-layout {
        grid-template-columns: 1fr;
      }

      .vaccine-brand-panel {
        border-left: 0;
        border-top: 1px solid #e5e7eb;
        max-height: 220px;
      }
    }

  
    .brand-mark {
      background: #fff !important;
      color: var(--brand, #166534);
      overflow: hidden;
      border: 1px solid rgba(22, 101, 52, 0.14);
    }

    .brand-logo {
      width: 78%;
      height: 78%;
      object-fit: contain;
      display: block;
    }

  </style>
</head>
<body>
  <header class="site-header">
    <div class="topbar">
      <a class="brand" href="search">
        <span class="brand-mark"><img class="brand-logo" src="/ab-labs-logo.png" alt="Ab Labs logo"></span>
        <span class="brand-copy">
          <strong>Kid EMR Template</strong>
          <span>Vaccination Tracker</span>
        </span>
      </a>
      
      <nav id="primary-nav" class="nav-links" aria-label="Primary">
        <a class="nav-link" href="index">Dashboard</a>
        <a class="nav-link active" href="search">Enter Clinic</a>
        <a class="nav-link" href="pending-approvals">Approvals</a>
        <a class="nav-link" href="settings">Settings</a>
      </nav>

    </div>
  </header>

  <main class="page-shell">
    <input id="patient-id-input" type="hidden">

    <section class="summary-grid" aria-label="Vaccination summary">
      <div class="summary-card"><span>Completed</span><strong id="completed-count">0</strong></div>
      <div class="summary-card"><span>Pending</span><strong id="pending-count">0</strong></div>
      <div class="summary-card"><span>Missed</span><strong id="missed-count">0</strong></div>
      <div class="summary-card"><span>Next Due</span><strong id="next-due-label">-</strong></div>
    </section>

    <div id="status-note" class="status-note">Loading vaccination module...</div>
    <div id="tables-root"></div>
  </main>

  <div id="vaccine-modal" class="vaccine-modal" aria-hidden="true">
    <div class="vaccine-modal-dialog" role="dialog" aria-modal="true" aria-label="Mark vaccine as given">
      <div class="vaccine-modal-head">
        <div class="vaccine-tabs" aria-label="Vaccine status">
          <button class="vaccine-tab is-active" type="button" data-vaccine-mode="given">Given</button>
          <button class="vaccine-tab" type="button" data-vaccine-mode="due">Due</button>
        </div>
        <button id="vaccine-modal-close" class="vaccine-modal-close" type="button" aria-label="Close vaccine popup">x</button>
      </div>
      <div id="vaccine-modal-body" class="vaccine-modal-body"></div>
      <div id="vaccine-modal-foot" class="vaccine-modal-foot"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js';
    import { doc, getDoc, getFirestore, serverTimestamp, setDoc } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js';
    const CLINIC_FIREBASE_NAMESPACE = 'clinics/kid';
    const FIREBASE_COLLECTIONS = {
      patients: `${CLINIC_FIREBASE_NAMESPACE}/patients`,
      pendingPatients: `${CLINIC_FIREBASE_NAMESPACE}/pendingPatients`,
      history: `${CLINIC_FIREBASE_NAMESPACE}/history`,
      prescription: `${CLINIC_FIREBASE_NAMESPACE}/prescription`
    };
    const CLINIC_STORAGE_PREFIX = CLINIC_FIREBASE_NAMESPACE;
    const CLINIC_LOCAL_STORAGE_PREFIX = CLINIC_FIREBASE_NAMESPACE.replace(/\//g, ':');
    const clinicStorageKey = (key) => `${CLINIC_LOCAL_STORAGE_PREFIX}:${key}`;
    const CLINIC_USER_NAME_STORAGE_KEY = clinicStorageKey('clinicUserName');

    const firebaseEnv = import.meta.env || {};
    const firebaseConfig = {
      apiKey: firebaseEnv.VITE_FIREBASE_API_KEY || '',
      authDomain: firebaseEnv.VITE_FIREBASE_AUTH_DOMAIN || '',
      projectId: firebaseEnv.VITE_FIREBASE_PROJECT_ID || '',
      storageBucket: firebaseEnv.VITE_FIREBASE_STORAGE_BUCKET || '',
      messagingSenderId: firebaseEnv.VITE_FIREBASE_MESSAGING_SENDER_ID || '',
      appId: firebaseEnv.VITE_FIREBASE_APP_ID || '',
      measurementId: firebaseEnv.VITE_FIREBASE_MEASUREMENT_ID || ''
    };

    const db = Object.values(firebaseConfig).every(Boolean) ? getFirestore(initializeApp(firebaseConfig)) : null;
    const patientIdInput = document.getElementById('patient-id-input');
    const backToProfileLink = document.getElementById('back-to-profile-link');
    const statusNote = document.getElementById('status-note');
    const tablesRoot = document.getElementById('tables-root');
    const completedCount = document.getElementById('completed-count');
    const pendingCount = document.getElementById('pending-count');
    const missedCount = document.getElementById('missed-count');
    const nextDueLabel = document.getElementById('next-due-label');
    const vaccineModal = document.getElementById('vaccine-modal');
    const vaccineModalBody = document.getElementById('vaccine-modal-body');
    const vaccineModalFoot = document.getElementById('vaccine-modal-foot');
    const vaccineModalClose = document.getElementById('vaccine-modal-close');
    const todayIso = new Date().toISOString().slice(0, 10);
    let currentPatient = null;
    let editingKey = '';
    let historyKey = '';
    let modalMode = 'given';

    const routineVaccineSchedule = [
      { key: 'birth-bcg', milestone: 'Birth', vaccine: 'BCG', months: 0, days: 0 },
      { key: 'birth-opv', milestone: 'Birth', vaccine: 'OPV', months: 0, days: 0 },

      { key: '16y-td-tdap', milestone: '16-18 years', vaccine: 'Td/Tdap', months: 192, days: 0 }
    ];

    function getVaccineSchedule(patient) {
      const gender = String(patient?.gender || patient?.sex || '').trim().toLowerCase();
      const hpvSchedule = [];

      if (gender === 'female' || gender === 'girl') {
        hpvSchedule.push({ key: '9y-hpv-single', milestone: '9-up to 15 years', vaccine: 'HPV Single Dose', months: 108, days: 0 });
      } else if (gender === 'male' || gender === 'boy') {
        hpvSchedule.push(
          { key: '9y-hpv1', milestone: '9-up to 15 years', vaccine: 'HPV 1', months: 108, days: 0 },
          { key: '9y-hpv2', milestone: '9-up to 15 years', vaccine: 'HPV 2', months: 114, days: 0 }
        );
      } else {
        hpvSchedule.push(
          { key: '9y-hpv1', milestone: '9-up to 15 years', vaccine: 'HPV 1', months: 108, days: 0 },
          { key: '9y-hpv2', milestone: '9-up to 15 years', vaccine: 'HPV 2', months: 114, days: 0 }
        );
      }

      const insertBeforeIndex = routineVaccineSchedule.findIndex((item) => item.key === '10y-tdap');
      return [
        ...routineVaccineSchedule.slice(0, insertBeforeIndex),
        ...hpvSchedule,
        ...routineVaccineSchedule.slice(insertBeforeIndex)
      ];
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDate(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function addToDob(dobValue, months, days) {
      const date = new Date(dobValue);
      if (Number.isNaN(date.getTime())) return '';
      date.setMonth(date.getMonth() + months);
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    function calculateAge(dobValue) {
      const dob = new Date(dobValue);
      if (Number.isNaN(dob.getTime())) return 'DOB not saved';
      const now = new Date();
      const months = Math.max(0, Math.floor((now.getFullYear() - dob.getFullYear()) * 12 + now.getMonth() - dob.getMonth()));
      if (months < 24) return `${months} month${months === 1 ? '' : 's'}`;
      const years = Math.floor(months / 12);
      return `${years} year${years === 1 ? '' : 's'}`;
    }

    function getPatientName(patient) {
      return patient?.childName || [patient?.firstName, patient?.middleName, patient?.lastName].filter(Boolean).join(' ') || 'Unnamed child';
    }

    function getRecordsByKey(patient) {
      const map = new Map();
      (Array.isArray(patient?.vaccinationRecords) ? patient.vaccinationRecords : []).forEach((record) => {
        if (record?.vaccineKey) map.set(record.vaccineKey, record);
      });
      return map;
    }

    function getStatus(dueDate, record) {
      if (record?.status === 'Due') return 'Due';
      if (record?.status === 'Given' || record?.givenDate) return 'Given';
      if (!dueDate) return 'Pending';
      if (dueDate === todayIso) return 'Due';
      return dueDate < todayIso ? 'Missed' : 'Pending';
    }

    function buildRows(patient) {
      const recordsByKey = getRecordsByKey(patient);
      return getVaccineSchedule(patient).map((item) => {
        const record = recordsByKey.get(item.key) || {};
        const dueDate = record.dueDate || addToDob(patient?.dob || '', item.months, item.days);
        return {
          ...item,
          dueDate,
          record,
          status: getStatus(dueDate, record),
          givenDate: record.status === 'Given' ? record.givenDate || '' : '',
          notes: record.notes || ''
        };
      });
    }

    function getNextDueRow(rows) {
      const upcoming = rows
        .filter((row) => row.status !== 'Given' && row.dueDate)
        .filter((row) => row.dueDate >= todayIso)
        .sort((left, right) => new Date(left.dueDate) - new Date(right.dueDate));
      return upcoming[0] || null;
    }

    function updateSummary(rows) {
      const completed = rows.filter((row) => row.status === 'Given').length;
      const pending = rows.filter((row) => row.status !== 'Given').length;
      const missed = rows.filter((row) => row.status === 'Missed').length;
      const next = getNextDueRow(rows);
      completedCount.textContent = completed;
      pendingCount.textContent = pending;
      missedCount.textContent = missed;
      nextDueLabel.textContent = next ? `${next.vaccine} ${formatDate(next.dueDate)}` : '-';
    }

    function getVaccineGroup(vaccineName) {
      const value = vaccineName.toLowerCase();
      if (value.includes('typhoid')) return 'Typhoid';
      if (value.includes('mmr') || value === 'mr 1') return 'MMR';
      if (value.includes('opv') || value.includes('ipv')) return 'Polio';
      if (value.includes('dtwp') || value.includes('dtap') || value.includes('dpt') || value.includes('tdap') || value === 'td' || value === 'td/tdap') return 'DTaP/Tdap/Td';
      if (value.includes('bcg')) return 'BCG';
      if (value.includes('hepatitis b') || value.includes('hep b')) return 'Hepatitis B';
      if (value.includes('hib')) return 'Hib';
      if (value.includes('rotavirus')) return 'Rotavirus';
      if (value.includes('pcv')) return 'PCV';
      if (value.includes('influenza')) return 'Influenza';
      if (value.includes('hepatitis a')) return 'Hepatitis A';
      if (value.includes('varicella')) return 'Varicella';
      if (value.includes('hpv')) return 'HPV';
      if (value.includes('pentavalent')) return 'Pentavalent';
      return vaccineName.replace(/\s+\d+$/, '');
    }

    function getMilestones(rows) {
      return [...new Map(rows.map((item) => [item.milestone, item])).keys()];
    }

    function getVaccineGroups(rows) {
      return [...new Set(rows.map((item) => getVaccineGroup(item.vaccine)))];
    }

    function getCurrentMilestone(rows, milestones) {
      const dueRows = milestones.map((milestone) => rows.find((row) => row.milestone === milestone)).filter(Boolean);
      const nextUpcoming = dueRows.find((row) => row.dueDate && row.dueDate >= todayIso);
      return nextUpcoming?.milestone || dueRows[dueRows.length - 1]?.milestone || '';
    }

    function getRowByKey(key) {
      return buildRows(currentPatient).find((row) => row.key === key) || null;
    }

    function getBrandOptions(row) {
      const group = getVaccineGroup(row.vaccine);
      const brandsByGroup = {
        'BCG': ['BCG'],
        'Polio': ['OPV', 'IPV', 'Imovax Polio', 'Poliorix'],
        'DTaP/Tdap/Td': ['Boostrix', 'Adacel', 'Easy 5', 'Pentaxim', 'ComBE Five'],
        'Pentavalent': ['Bevac', 'ComBE Five', 'Comvac 5', 'Easy 5', 'Easy 6', 'Engerix B', 'Genevac B', 'Hexaxim', 'Infanrix Hexa', 'Pentashield', 'Pentavac', 'Quinvaxem', 'Revac B', 'Shan 5'],
        'Hib': ['Act-HIB', 'Hiberix', 'PedvaxHIB', 'Pentaxim', 'Hexaxim'],
        'Rotavirus': ['Rotarix', 'RotaTeq', 'Rotavac', 'Rotasiil'],
        'PCV': ['Prevenar 13', 'Synflorix', 'Pneumosil'],
        'Influenza': ['Influvac', 'Vaxigrip Tetra', 'Fluarix Tetra'],
        'MMR': ['Priorix', 'Tresivac', 'MMR II'],
        'Typhoid': ['Typbar TCV', 'PedaTyph', 'Typhim Vi'],
        'Hepatitis A': ['Havrix', 'Avaxim', 'Biovac A'],
        'Hepatitis B': ['Engerix B', 'Genevac B', 'Revac B', 'Shanvac B'],
        'Varicella': ['Varilrix', 'Varivax'],
        'HPV': ['Gardasil 9', 'Gardasil 4', 'Cervarix']
      };
      return brandsByGroup[group] || [row.vaccine];
    }

    function getMonthMatrix(selectedIso) {
      const selected = new Date(selectedIso || todayIso);
      const year = selected.getFullYear();
      const month = selected.getMonth();
      const first = new Date(year, month, 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      return Array.from({ length: 42 }, (_, index) => {
        const date = new Date(start);
        date.setDate(start.getDate() + index);
        return {
          iso: date.toISOString().slice(0, 10),
          day: date.getDate(),
          isCurrentMonth: date.getMonth() === month,
          isSelected: date.toISOString().slice(0, 10) === selectedIso
        };
      });
    }

    function getCellStatus(rows) {
      if (rows.some((row) => row.status === 'Due')) return 'due';
      if (rows.some((row) => row.status === 'Missed')) return 'missed';
      if (rows.every((row) => row.status === 'Given')) return 'given';
      return 'pending';
    }

    function vaccineCellHtml(cellRows) {
      if (!cellRows.length) {
        return '<div class="schedule-cell"></div>';
      }

      const cellStatus = getCellStatus(cellRows);
      return `
        <div class="schedule-cell has-vaccine status-${cellStatus}">
          ${cellRows.map((row) => `
            <div class="cell-vaccine-entry">
              <span class="cell-vaccine">${escapeHtml(row.vaccine)}</span>
              <span class="cell-date">${row.status === 'Given' ? `Given ${formatDate(row.givenDate)}` : `Due ${formatDate(row.dueDate)}`}</span>
              <span class="cell-status">${escapeHtml(row.status)}</span>
              ${row.notes ? `<span class="cell-note">${escapeHtml(row.notes)}</span>` : ''}
              <div class="row-actions">
                <button class="cell-action" type="button" data-edit-vaccine="${escapeHtml(row.key)}">${row.status === 'Given' ? 'Edit' : 'Mark Given'}</button>
                <button class="cell-action" type="button" data-history-vaccine="${escapeHtml(row.key)}">History</button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function editFormHtml(row, mode = 'given') {
      if (!row) return '';
      const isDueMode = mode === 'due';
      const selectedDate = isDueMode ? row.dueDate || todayIso : row.givenDate || todayIso;
      const selected = new Date(selectedDate);
      const brands = getBrandOptions(row);
      const selectedBrand = row.record.brand || row.record.vaccineBrand || '';
      const panelTitle = isDueMode ? `Due date: ${row.vaccine}` : row.vaccine;
      const notePlaceholder = isDueMode ? 'Add due note' : 'Add Vaccination Note';
      return `
        <div class="vaccine-given-layout" data-edit-panel>
          <div class="vaccine-given-main">
            <h2>${escapeHtml(panelTitle)}</h2>
            <input type="hidden" data-modal-date value="${escapeHtml(selectedDate)}">
            <input type="hidden" data-marked-by value="${escapeHtml(row.record.markedBy || localStorage.getItem(CLINIC_USER_NAME_STORAGE_KEY) || 'Clinic user')}">
            <textarea class="vaccine-note" data-vaccine-notes placeholder="${escapeHtml(notePlaceholder)}">${escapeHtml(row.notes || '')}</textarea>
            <div class="vaccine-date-controls">
              <select data-calendar-year aria-label="Year">
                ${Array.from({ length: 8 }, (_, offset) => selected.getFullYear() - 3 + offset)
                  .map((year) => `<option value="${year}" ${year === selected.getFullYear() ? 'selected' : ''}>${year}</option>`).join('')}
              </select>
              <select data-calendar-month aria-label="Month">
                ${Array.from({ length: 12 }, (_, month) => {
                  const name = new Date(2020, month, 1).toLocaleString('en-IN', { month: 'short' });
                  return `<option value="${month}" ${month === selected.getMonth() ? 'selected' : ''}>${name}</option>`;
                }).join('')}
              </select>
              <button class="is-active" type="button">Month</button>
              <button type="button">Year</button>
            </div>
            <div class="calendar-grid">
              ${['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'].map((day) => `<div class="calendar-day-name">${day}</div>`).join('')}
              ${getMonthMatrix(selectedDate).map((day) => `
                <button class="calendar-day ${day.isCurrentMonth ? '' : 'is-muted'} ${day.isSelected ? 'is-selected' : ''}" type="button" data-calendar-date="${day.iso}">${day.day}</button>
              `).join('')}
            </div>
            <div class="calendar-today"><button type="button" data-calendar-today>Today</button></div>
          </div>
          <div class="vaccine-brand-panel">
            ${isDueMode
              ? `<h3>Due details</h3>
                <div class="brand-options">
                  <div class="brand-option"><span>Milestone</span><strong>${escapeHtml(row.milestone)}</strong></div>
                  <div class="brand-option"><span>Vaccine</span><strong>${escapeHtml(row.vaccine)}</strong></div>
                  <div class="brand-option"><span>Status</span><strong>Due</strong></div>
                </div>`
              : `<h3>Select Brand</h3>
                <div class="brand-options">
                  ${brands.map((brand) => `
                    <label class="brand-option">
                      <input type="radio" name="vaccine-brand" value="${escapeHtml(brand)}" ${brand === selectedBrand ? 'checked' : ''}>
                      <span>${escapeHtml(brand)}</span>
                    </label>
                  `).join('')}
                </div>`}
          </div>
        </div>
      `;
    }

    function renderVaccineModal(row, mode = modalMode) {
      if (!row) return;
      modalMode = mode;
      editingKey = row.key;
      vaccineModal.querySelectorAll('.vaccine-tab').forEach((button, index) => {
        const buttonMode = index === 0 ? 'given' : 'due';
        button.classList.toggle('is-active', buttonMode === modalMode);
      });
      vaccineModalBody.innerHTML = editFormHtml(row, modalMode);
      vaccineModalFoot.innerHTML = `
        <button class="btn-ghost" type="button" data-cancel-edit>Cancel</button>
        ${modalMode === 'due'
          ? `<button class="btn-primary" type="button" data-save-due-vaccine="${escapeHtml(row.key)}">Save due date</button>`
          : `<button class="btn-primary" type="button" data-save-vaccine="${escapeHtml(row.key)}">Mark as given</button>`}
      `;
    }

    function openVaccineModal(row, mode = 'given') {
      renderVaccineModal(row, mode);
      vaccineModal.classList.add('is-open');
      vaccineModal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      vaccineModalBody.querySelector('[data-vaccine-notes]')?.focus();
    }

    function closeVaccineModal() {
      vaccineModal.classList.remove('is-open');
      vaccineModal.setAttribute('aria-hidden', 'true');
      vaccineModalBody.innerHTML = '';
      vaccineModalFoot.innerHTML = '';
      document.body.style.overflow = '';
      editingKey = '';
      modalMode = 'given';
    }

    function setModalCalendarDate(isoDate) {
      const hiddenDate = vaccineModalBody.querySelector('[data-modal-date]');
      if (!hiddenDate) return;
      hiddenDate.value = isoDate;
      vaccineModalBody.querySelectorAll('[data-calendar-date]').forEach((button) => {
        button.classList.toggle('is-selected', button.getAttribute('data-calendar-date') === isoDate);
      });
    }

    function rebuildModalCalendar(year, month, selectedIso) {
      const calendar = vaccineModalBody.querySelector('.calendar-grid');
      if (!calendar) return;
      const selectedDate = new Date(selectedIso || todayIso);
      const nextSelected = new Date(year, month, Math.min(selectedDate.getDate(), 28)).toISOString().slice(0, 10);
      setModalCalendarDate(nextSelected);
      calendar.innerHTML = [
        ...['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'].map((day) => `<div class="calendar-day-name">${day}</div>`),
        ...getMonthMatrix(nextSelected).map((day) => `
          <button class="calendar-day ${day.isCurrentMonth ? '' : 'is-muted'} ${day.isSelected ? 'is-selected' : ''}" type="button" data-calendar-date="${day.iso}">${day.day}</button>
        `)
      ].join('');
    }

    function historyPanelHtml(row) {
      if (!row) return '';
      const history = Array.isArray(row.record.history) ? row.record.history : [];
      return `
        <section class="action-panel">
          <h2>History: ${escapeHtml(row.vaccine)} (${escapeHtml(row.milestone)})</h2>
          ${history.length
            ? `<ul class="history-list">${history.map((entry) => `<li><strong>${formatDate(entry.givenDate || entry.dueDate)}</strong> ${escapeHtml(entry.status || 'Given')} by ${escapeHtml(entry.markedBy || '-')}. ${escapeHtml(entry.notes || '')}</li>`).join('')}</ul>`
            : '<div class="empty-state">No history for this vaccine yet.</div>'}
        </section>
      `;
    }

    function scheduleGridHtml(rows) {
      const milestones = getMilestones(rows);
      const vaccineGroups = getVaccineGroups(rows);
      const currentMilestone = getCurrentMilestone(rows, milestones);

      return `
        <section class="panel">
          <div class="panel-head">
            <h2>Vaccination Chart</h2>
            <div class="chart-head-actions">
              <span class="muted">Doctor confirms the final schedule</span>
              <button class="chart-scroll-btn" type="button" data-table-scroll="-1" aria-label="Move table left">&lsaquo;</button>
              <button class="chart-scroll-btn" type="button" data-table-scroll="1" aria-label="Move table right">&rsaquo;</button>
            </div>
          </div>
          <div class="table-wrap" data-vaccination-table-wrap>
            <table class="schedule-table">
              <thead>
                <tr>
                  <th>Vaccine</th>
                  ${milestones.map((milestone) => `<th class="${milestone === currentMilestone ? 'is-current' : ''}">${escapeHtml(milestone)}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${vaccineGroups.map((group) => `
                  <tr>
                    <td><div class="vaccine-row-label">${escapeHtml(group)}</div></td>
                    ${milestones.map((milestone) => {
                      const cellRows = rows.filter((entry) => entry.milestone === milestone && getVaccineGroup(entry.vaccine) === group);
                      return `<td class="${milestone === currentMilestone ? 'is-current' : ''}">${vaccineCellHtml(cellRows)}</td>`;
                    }).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function render() {
      if (!currentPatient) {
        tablesRoot.innerHTML = '';
        updateSummary([]);
        return;
      }

      const rows = buildRows(currentPatient);
      updateSummary(rows);
      document.title = `${getPatientName(currentPatient)} Vaccination`;
      if (backToProfileLink) {
        backToProfileLink.href = `search?patientId=${encodeURIComponent(currentPatient.patientId || '')}`;
      }
      tablesRoot.innerHTML = [
        historyPanelHtml(getRowByKey(historyKey)),
        scheduleGridHtml(rows)
      ].join('');
    }

    async function loadPatient(patientId) {
      const normalizedPatientId = String(patientId || '').trim().toUpperCase();
      patientIdInput.value = normalizedPatientId;
      if (!normalizedPatientId) {
        statusNote.textContent = 'Open this page from a patient profile to load vaccination records.';
        return;
      }

      if (!db) {
        statusNote.textContent = 'Cloud records are not configured.';
        return;
      }

      statusNote.textContent = 'Loading patient vaccination records...';
      const snapshot = await getDoc(doc(db, FIREBASE_COLLECTIONS.patients, normalizedPatientId));
      if (!snapshot.exists()) {
        currentPatient = { patientId: normalizedPatientId, vaccinationRecords: [] };
        statusNote.textContent = 'Patient was not found. Showing an empty vaccination tracker for this ID.';
      } else {
        currentPatient = {
          id: snapshot.id,
          patientId: snapshot.data().patientId || normalizedPatientId,
          ...snapshot.data()
        };
        statusNote.textContent = 'Vaccination records loaded. This screen only tracks records; doctor confirms the schedule.';
      }
      editingKey = '';
      historyKey = '';
      render();
    }

    async function saveVaccine(vaccineKey) {
      if (!currentPatient?.patientId || !db) return;
      const row = buildRows(currentPatient).find((entry) => entry.key === vaccineKey);
      const editPanel = document.querySelector('[data-edit-panel]');
      const givenDate = editPanel?.querySelector('[data-modal-date]')?.value || todayIso;
      const markedBy = editPanel?.querySelector('[data-marked-by]')?.value.trim() || 'Clinic user';
      const notes = editPanel?.querySelector('[data-vaccine-notes]')?.value.trim() || '';
      const brand = editPanel?.querySelector('input[name="vaccine-brand"]:checked')?.value || '';
      const existingRecords = Array.isArray(currentPatient.vaccinationRecords) ? currentPatient.vaccinationRecords : [];
      const existingRecord = existingRecords.find((record) => record.vaccineKey === vaccineKey) || {};
      const savedRecord = {
        ...existingRecord,
        vaccineKey,
        vaccineName: row.vaccine,
        milestone: row.milestone,
        dueDate: row.dueDate,
        status: 'Given',
        givenDate,
        markedBy,
        brand,
        notes,
        updatedAtIso: new Date().toISOString(),
        history: [
          ...(Array.isArray(existingRecord.history) ? existingRecord.history : []),
          { status: 'Given', givenDate, markedBy, brand, notes, savedAtIso: new Date().toISOString() }
        ]
      };
      const vaccinationRecords = [
        ...existingRecords.filter((record) => record.vaccineKey !== vaccineKey),
        savedRecord
      ];

      await setDoc(doc(db, FIREBASE_COLLECTIONS.patients, currentPatient.patientId), {
        vaccinationRecords,
        vaccinationUpdatedAt: serverTimestamp()
      }, { merge: true });

      currentPatient = { ...currentPatient, vaccinationRecords };
      localStorage.setItem(CLINIC_USER_NAME_STORAGE_KEY, markedBy);
      closeVaccineModal();
      statusNote.textContent = `${row.vaccine} marked as given.`;
      render();
    }

    async function saveDueVaccine(vaccineKey) {
      if (!currentPatient?.patientId || !db) return;
      const row = buildRows(currentPatient).find((entry) => entry.key === vaccineKey);
      const editPanel = document.querySelector('[data-edit-panel]');
      const dueDate = editPanel?.querySelector('[data-modal-date]')?.value || row?.dueDate || todayIso;
      const markedBy = editPanel?.querySelector('[data-marked-by]')?.value.trim() || 'Clinic user';
      const notes = editPanel?.querySelector('[data-vaccine-notes]')?.value.trim() || '';
      const existingRecords = Array.isArray(currentPatient.vaccinationRecords) ? currentPatient.vaccinationRecords : [];
      const existingRecord = existingRecords.find((record) => record.vaccineKey === vaccineKey) || {};
      const savedRecord = {
        ...existingRecord,
        vaccineKey,
        vaccineName: row.vaccine,
        milestone: row.milestone,
        dueDate,
        status: 'Due',
        givenDate: '',
        markedBy,
        notes,
        updatedAtIso: new Date().toISOString(),
        history: [
          ...(Array.isArray(existingRecord.history) ? existingRecord.history : []),
          { status: 'Due', dueDate, markedBy, notes, savedAtIso: new Date().toISOString() }
        ]
      };
      const vaccinationRecords = [
        ...existingRecords.filter((record) => record.vaccineKey !== vaccineKey),
        savedRecord
      ];

      await setDoc(doc(db, FIREBASE_COLLECTIONS.patients, currentPatient.patientId), {
        vaccinationRecords,
        vaccinationUpdatedAt: serverTimestamp()
      }, { merge: true });

      currentPatient = { ...currentPatient, vaccinationRecords };
      localStorage.setItem(CLINIC_USER_NAME_STORAGE_KEY, markedBy);
      closeVaccineModal();
      statusNote.textContent = `${row.vaccine} due date saved.`;
      render();
    }

    tablesRoot.addEventListener('click', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      const editKey = target.getAttribute('data-edit-vaccine');
      const rowHistoryKey = target.getAttribute('data-history-vaccine');
      const scrollDirection = target.getAttribute('data-table-scroll');

      if (scrollDirection) {
        const tableWrap = tablesRoot.querySelector('[data-vaccination-table-wrap]');
        if (tableWrap) {
          tableWrap.scrollBy({
            left: tableWrap.clientWidth * 0.8 * Number(scrollDirection),
            behavior: 'smooth'
          });
        }
        return;
      }

      if (editKey) {
        openVaccineModal(getRowByKey(editKey));
        historyKey = '';
        return;
      }

      if (rowHistoryKey) {
        historyKey = historyKey === rowHistoryKey ? '' : rowHistoryKey;
        editingKey = '';
        render();
        return;
      }
    });

    vaccineModal.addEventListener('click', (event) => {
      if (event.target === vaccineModal) {
        closeVaccineModal();
      }
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      const saveKey = target.getAttribute('data-save-vaccine');
      const saveDueKey = target.getAttribute('data-save-due-vaccine');
      const modeButton = target.closest('.vaccine-tab');
      const calendarDate = target.getAttribute('data-calendar-date');

      if (modeButton) {
        const mode = modeButton.getAttribute('data-vaccine-mode') || (Array.from(vaccineModal.querySelectorAll('.vaccine-tab')).indexOf(modeButton) === 0 ? 'given' : 'due');
        renderVaccineModal(getRowByKey(editingKey), mode);
        return;
      }

      if (saveKey) {
        saveVaccine(saveKey).catch((error) => {
          statusNote.textContent = `Unable to save vaccine: ${error.message}`;
        });
        return;
      }

      if (saveDueKey) {
        saveDueVaccine(saveDueKey).catch((error) => {
          statusNote.textContent = `Unable to save due date: ${error.message}`;
        });
        return;
      }

      if (calendarDate) {
        setModalCalendarDate(calendarDate);
        return;
      }

      if (target.matches('[data-calendar-today]')) {
        const today = new Date();
        const yearSelect = vaccineModalBody.querySelector('[data-calendar-year]');
        const monthSelect = vaccineModalBody.querySelector('[data-calendar-month]');
        if (yearSelect) yearSelect.value = String(today.getFullYear());
        if (monthSelect) monthSelect.value = String(today.getMonth());
        rebuildModalCalendar(today.getFullYear(), today.getMonth(), todayIso);
        return;
      }

      if (target.matches('[data-cancel-edit]')) {
        closeVaccineModal();
      }
    });

    vaccineModal.addEventListener('change', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLSelectElement)) return;
      if (!target.matches('[data-calendar-year], [data-calendar-month]')) return;
      const year = Number(vaccineModalBody.querySelector('[data-calendar-year]')?.value || new Date().getFullYear());
      const month = Number(vaccineModalBody.querySelector('[data-calendar-month]')?.value || new Date().getMonth());
      const selectedIso = vaccineModalBody.querySelector('[data-modal-date]')?.value || todayIso;
      rebuildModalCalendar(year, month, selectedIso);
    });

    vaccineModalClose.addEventListener('click', closeVaccineModal);

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && vaccineModal.classList.contains('is-open')) {
        closeVaccineModal();
      }
    });

    const params = new URLSearchParams(window.location.search);
    const initialPatientId = params.get('patientId') || '';
    if (initialPatientId) {
      loadPatient(initialPatientId).catch((error) => {
        statusNote.textContent = `Unable to load patient: ${error.message}`;
      });
    } else {
      statusNote.textContent = 'Open this page from a patient profile to load vaccination records.';
    }
  </script>
  <script type="module" src="/template-brand.js"></script>
</body>
</html>
