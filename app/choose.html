<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Patient Type</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef4ef;
      --panel: #fcfdf8;
      --panel-strong: #ffffff;
      --ink: #1b2a21;
      --muted: #607067;
      --line: #d7e2d9;
      --brand: #166534;
      --brand-soft: #dcfce7;
      --brand-strong: #14532d;
      --accent-soft: #ffedd5;
      --shadow: 0 18px 45px rgba(22, 38, 29, 0.08);
      --radius-lg: 24px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.14), transparent 28%),
        linear-gradient(180deg, #f5faf3 0%, #edf5ef 100%);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: rgba(248, 252, 248, 0.85);
      border-bottom: 1px solid rgba(215, 226, 217, 0.95);
      box-shadow: 0 8px 24px rgba(22, 38, 29, 0.05);
    }

    .topbar {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 20px;
      background: linear-gradient(135deg, #166534, #22c55e);
      color: #fff;
      box-shadow: 0 10px 22px rgba(22, 101, 52, 0.22);
    }

    .brand-copy strong {
      display: block;
      font-size: 15px;
      line-height: 1.1;
    }

    .brand-copy span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      background: var(--brand-soft);
      color: var(--brand-strong);
    }

    .menu-toggle,
    .nav-links {
      display: none !important;
    }

    .menu-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      margin-left: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(22, 38, 29, 0.08);
    }

    .menu-toggle-inner {
      display: grid;
      gap: 4px;
    }

    .menu-toggle-bar {
      display: block;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-bar:nth-child(1) {
      transform: translateY(6px) rotate(45deg);
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-bar:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-bar:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg);
    }

    .topbar-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: #f8fbf9;
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.12);
    }

    .page-shell {
      width: min(1040px, calc(100% - 32px));
      margin: 34px auto;
    }

    .intro {
      margin-bottom: 22px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand-strong);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 8px;
      font-size: clamp(28px, 3.6vw, 42px);
      line-height: 1.04;
    }

    .intro p {
      margin: 0;
      max-width: 58ch;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .chooser-panel {
      padding: 24px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(215, 226, 217, 0.95);
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
    }

    .panel-head h2 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .panel-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .panel-note {
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--accent-soft);
      color: #9a3412;
      font-size: 12px;
      font-weight: 600;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .choice-card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 240px;
      padding: 22px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(244, 250, 245, 0.96));
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .choice-card:hover {
      transform: translateY(-3px);
      border-color: rgba(22, 101, 52, 0.28);
      box-shadow: 0 16px 30px rgba(22, 101, 52, 0.08);
    }

    .choice-icon {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 28px;
      background: linear-gradient(135deg, #166534, #22c55e);
      color: #fff;
      box-shadow: 0 10px 24px rgba(22, 101, 52, 0.2);
    }

    .choice-card h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
    }

    .choice-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
      flex: 1;
    }

    .choice-footer {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--brand);
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .topbar {
        width: min(100% - 24px, 100%);
        min-height: auto;
        padding: 14px 0;
        flex-wrap: wrap;
      }

      .page-shell {
        width: min(100% - 24px, 100%);
      }

      .panel-head {
        flex-direction: column;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        width: min(100% - 20px, 100%);
        padding: 12px 0;
        gap: 12px;
        align-items: stretch;
      }

      .brand {
        width: auto;
        flex: 1 1 auto;
        gap: 12px;
        align-items: center;
      }

      .menu-toggle {
        display: inline-flex;
        flex-shrink: 0;
      }

      .nav-links {
        width: 100%;
        order: 3;
        margin-left: 0;
        display: none;
        flex-direction: column;
        gap: 6px;
        padding: 10px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 14px 28px rgba(22, 38, 29, 0.08);
      }

      .nav-links.is-open {
        display: flex;
      }

      .topbar-actions {
        margin-left: 0;
        width: 100%;
        order: 4;
      }

      .page-shell {
        width: min(100% - 20px, 100%);
        margin: 16px auto 22px;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        font-size: 18px;
      }

      .brand-copy strong {
        font-size: 14px;
      }

      .brand-copy span {
        font-size: 11px;
      }

      .chooser-panel {
        padding: 16px;
      }

      .status-chip {
        width: 100%;
        justify-content: center;
        border-radius: 14px;
      }

      .nav-link {
        width: 100%;
        min-height: 42px;
        padding: 10px 12px;
        border-radius: 14px;
      }

      .choice-grid {
        grid-template-columns: 1fr;
      }

      .choice-card {
        min-height: 0;
        padding: 18px;
      }

      .intro p,
      .panel-head p {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">+</div>
        <div class="brand-copy">
          <strong>The Better Health Clinic</strong>
          <span>Prescription Choice</span>
        </div>
      </div>

      <div class="topbar-actions">
        <div class="status-chip">
          <span class="status-dot"></span>
          Patient selection ready
        </div>
      </div>
    </div>
  </header>

  <div class="page-shell">
    <section class="intro">
      <div class="eyebrow">Prescription</div>
      <h1>Choose patient type before continuing.</h1>
      <p></p>
    </section>

    <section class="chooser-panel">
      <div class="panel-head">
        <div>
          <h2>Select one option</h2>
          <p></p>
        </div>
        <div class="panel-note"></div>
      </div>

      <div class="choice-grid">
        <a class="choice-card" href="search.html">
          <div class="choice-icon">R</div>
          <h3>Existing Patient</h3>
          <p></p>
          <div class="choice-footer">Continue <span>&rarr;</span></div>
        </a>

        <a class="choice-card" href="new-patient.html">
          <div class="choice-icon">+</div>
          <h3>New Patient</h3>
          <p></p>
          <div class="choice-footer">Continue <span>&rarr;</span></div>
        </a>
      </div>
    </section>
  </div>

  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const primaryNav = document.getElementById('primary-nav');
    const navLinks = [...document.querySelectorAll('#primary-nav .nav-link')];

    function closeMobileMenu() {
      menuToggle.setAttribute('aria-expanded', 'false');
      primaryNav.classList.remove('is-open');
    }

    function toggleMobileMenu() {
      const isOpen = menuToggle.getAttribute('aria-expanded') === 'true';
      menuToggle.setAttribute('aria-expanded', String(!isOpen));
      primaryNav.classList.toggle('is-open', !isOpen);
    }

    menuToggle.addEventListener('click', toggleMobileMenu);
    navLinks.forEach((link) => link.addEventListener('click', closeMobileMenu));
    window.addEventListener('resize', () => {
      if (window.innerWidth > 640) {
        closeMobileMenu();
      }
    });
  </script>
</body>
</html>
