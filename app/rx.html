<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prescription Link</title>
  <style>
    :root {
      --bg: #eef4ef;
      --panel: #ffffff;
      --ink: #1b2a21;
      --muted: #607067;
      --line: #d7e2d9;
      --brand: #166534;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Outfit, system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.14), transparent 28%),
        linear-gradient(180deg, #f5faf3 0%, #edf5ef 100%);
    }

    .panel {
      width: min(460px, 100%);
      padding: 28px 24px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 18px 45px rgba(22, 38, 29, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      color: var(--brand);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1 id="title">Opening Prescription</h1>
    <p id="message">Please wait while we open the prescription.</p>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js';
    import { doc, getDoc, getFirestore } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js';

    const title = document.getElementById('title');
    const message = document.getElementById('message');
    const params = new URLSearchParams(window.location.search);
    const prescriptionId = (params.get('i') || '').trim();

    const firebaseEnv = import.meta.env || {};
    const firebaseConfig = {
      apiKey: firebaseEnv.VITE_FIREBASE_API_KEY,
      authDomain: firebaseEnv.VITE_FIREBASE_AUTH_DOMAIN,
      projectId: firebaseEnv.VITE_FIREBASE_PROJECT_ID,
      storageBucket: firebaseEnv.VITE_FIREBASE_STORAGE_BUCKET,
      messagingSenderId: firebaseEnv.VITE_FIREBASE_MESSAGING_SENDER_ID,
      appId: firebaseEnv.VITE_FIREBASE_APP_ID,
      measurementId: firebaseEnv.VITE_FIREBASE_MEASUREMENT_ID
    };

    async function openPrescription() {
      if (!prescriptionId) {
        title.textContent = 'Prescription Not Found';
        message.textContent = 'This prescription link is missing an ID.';
        return;
      }

      const configured = Object.values(firebaseConfig).every(Boolean);
      if (!configured) {
        title.textContent = 'Firebase Not Ready';
        message.textContent = 'Prescription link cannot open because Firebase is not configured.';
        return;
      }

      try {
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const snapshot = await getDoc(doc(db, 'history', prescriptionId));

        if (!snapshot.exists()) {
          title.textContent = 'Prescription Not Found';
          message.textContent = 'No saved prescription was found for this link.';
          return;
        }

        const record = snapshot.data();
        if (!record?.downloadURL) {
          title.textContent = 'Prescription Not Available';
          message.textContent = 'This prescription record does not have a PDF link.';
          return;
        }

        message.innerHTML = `Redirecting to prescription PDF. If it does not open automatically, <a href="${record.downloadURL}">tap here</a>.`;
        window.location.replace(record.downloadURL);
      } catch (error) {
        title.textContent = 'Unable To Open Prescription';
        message.textContent = error.message || 'Something went wrong while opening the prescription.';
      }
    }

    openPrescription();
  </script>
</body>
</html>
