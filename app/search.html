<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Patients</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef4ef;
      --panel: #fcfdf8;
      --panel-strong: #ffffff;
      --ink: #1b2a21;
      --muted: #607067;
      --line: #d7e2d9;
      --brand: #166534;
      --brand-soft: #dcfce7;
      --brand-strong: #14532d;
      --accent: #b45309;
      --accent-soft: #ffedd5;
      --shadow: 0 18px 45px rgba(22, 38, 29, 0.08);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.14), transparent 28%),
        linear-gradient(180deg, #f5faf3 0%, #edf5ef 100%);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: rgba(248, 252, 248, 0.85);
      border-bottom: 1px solid rgba(215, 226, 217, 0.95);
      box-shadow: 0 8px 24px rgba(22, 38, 29, 0.05);
    }

    .topbar {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 20px;
      background: linear-gradient(135deg, #166534, #22c55e);
      color: #fff;
      box-shadow: 0 10px 22px rgba(22, 101, 52, 0.22);
    }

    .brand-copy strong {
      display: block;
      font-size: 15px;
      line-height: 1.1;
    }

    .brand-copy span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      background: var(--brand-soft);
      color: var(--brand-strong);
    }

    .menu-toggle,
    .nav-links {
      display: none !important;
    }

    .menu-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      margin-left: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(22, 38, 29, 0.08);
    }

    .menu-toggle-inner {
      display: grid;
      gap: 4px;
    }

    .menu-toggle-bar {
      display: block;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-bar:nth-child(1) {
      transform: translateY(6px) rotate(45deg);
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-bar:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-bar:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg);
    }

    .topbar-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: #f8fbf9;
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.12);
    }

    .page-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 34px auto;
    }

    .page-intro {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    .page-intro h1 {
      margin: 10px 0 6px;
      font-size: clamp(28px, 3.4vw, 40px);
      line-height: 1.05;
    }

    .page-intro p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      max-width: 64ch;
    }

    .page-meta {
      padding: 14px 16px;
      min-width: 220px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(215, 226, 217, 0.95);
      box-shadow: var(--shadow);
    }

    .page-meta strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .page-meta span {
      color: var(--muted);
      font-size: 13px;
    }

    .search-shell {
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(215, 226, 217, 0.95);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .search-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .search-head h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .search-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .count-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand-strong);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 12px;
      margin-bottom: 16px;
    }

    .search-row input {
      width: 100%;
      min-height: 54px;
      padding: 0 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      font: inherit;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .search-row input:focus {
      border-color: rgba(22, 101, 52, 0.5);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
      background: #fff;
    }

    button {
      width: 100%;
      min-height: 54px;
      border: none;
      border-radius: 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #166534, #15803d);
      box-shadow: 0 14px 30px rgba(21, 128, 61, 0.2);
    }

    .status-note {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #f8fbf9;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .status-note.visible {
      display: block;
    }

    .status-note.warning {
      background: #fff7ed;
      border-color: #fed7aa;
      color: #9a3412;
    }

    .results-list {
      display: grid;
      gap: 12px;
    }

    .result-card {
      padding: 14px;
      border-radius: 22px;
      border: 1px solid rgba(215, 226, 217, 0.98);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(247, 251, 247, 0.96));
      box-shadow:
        0 16px 38px rgba(22, 38, 29, 0.07),
        inset 0 1px 0 rgba(255, 255, 255, 0.92);
    }

    .result-top {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(0, 0.95fr) 170px;
      gap: 12px;
      align-items: start;
      margin-bottom: 14px;
    }

    .result-meta {
      padding: 14px 14px 12px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      min-height: 92px;
    }

    .result-meta--child {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.2), transparent 32%),
        linear-gradient(135deg, rgba(22, 101, 52, 0.12), rgba(255, 255, 255, 0.96) 58%);
      border-color: rgba(22, 101, 52, 0.18);
    }

    .profile-trigger {
      width: 100%;
      padding: 0;
      border: 0;
      text-align: left;
      font: inherit;
      color: inherit;
      cursor: pointer;
      background: transparent;
    }

    .profile-trigger:focus-visible {
      outline: 3px solid rgba(22, 101, 52, 0.2);
      outline-offset: 4px;
      border-radius: 18px;
    }

    .result-meta--child::after {
      content: '';
      position: absolute;
      top: -26px;
      right: -24px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.46), rgba(255,255,255,0));
      pointer-events: none;
    }

    .result-meta-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .child-meta-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .child-avatar {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #166534, #22c55e);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(22, 101, 52, 0.18);
      flex-shrink: 0;
    }

    .result-meta strong {
      display: block;
      margin-top: 6px;
      font-size: clamp(20px, 3vw, 28px);
      line-height: 1.05;
    }

    .result-meta--child strong {
      margin-top: 0;
      font-size: clamp(22px, 3.1vw, 30px);
      line-height: 1;
    }

    .result-meta small {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .patient-id-badge {
      display: inline-flex;
      align-items: center;
      margin-top: 0;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(22, 101, 52, 0.1);
      color: var(--brand-strong);
      border: 1px solid rgba(22, 101, 52, 0.14);
      font-size: 11px;
      font-weight: 700;
    }

    .profile-action-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .profile-toggle-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(22, 101, 52, 0.14);
      color: var(--brand-strong);
      font-size: 11px;
      font-weight: 700;
    }

    .continue-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 92px;
      border-radius: 18px;
      padding: 14px;
      text-decoration: none;
      color: #fff;
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 700;
      background: linear-gradient(135deg, #166534, #0f3f22);
      box-shadow: 0 12px 24px rgba(21, 128, 61, 0.18);
      text-align: center;
    }

    .result-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.85fr) minmax(260px, 0.9fr);
      gap: 16px;
    }

    .result-layout.is-hidden {
      display: none;
    }

    .info-panel,
    .history-panel {
      min-height: 260px;
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(135deg, rgba(18, 23, 20, 0.92), rgba(41, 49, 44, 0.96)),
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.22), transparent 38%);
      color: #fff;
    }

    .history-panel .panel-content {
      min-height: 640px;
      padding: 0;
      gap: 0;
    }

    .history-panel .panel-content h3 {
      display: none;
    }

    .info-panel::before,
    .history-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 28px);
      opacity: 0.5;
      pointer-events: none;
    }

    .panel-content {
      position: relative;
      z-index: 1;
      height: 100%;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }

    .panel-content h3 {
      margin: 0;
      font-size: clamp(26px, 3.2vw, 34px);
      line-height: 1.15;
    }

    .panel-content p {
      margin: 0;
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.86);
    }

    .record-table-wrap {
      overflow-x: auto;
      margin-top: 2px;
    }

    .record-table {
      width: 100%;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 4px;
    }

    .record-table th,
    .record-table td {
      padding: 8px 8px;
      text-align: center;
      vertical-align: middle;
      font-size: 12px;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.9);
    }

    .record-table thead th {
      padding-bottom: 4px;
      color: rgba(255, 255, 255, 0.76);
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .record-table .metric-name {
      min-width: 70px;
      padding-left: 0;
      text-align: left;
      color: #fff;
      font-weight: 700;
      white-space: nowrap;
    }

    .record-table .metric-unit {
      min-width: 34px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
    }

    .record-table .metric-value {
      min-width: 52px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-weight: 600;
    }

    .record-table .table-empty {
      text-align: left;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .history-filter-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 2px;
    }

    .history-filter-row label {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.84);
    }

    .history-filter-row input[type="date"] {
      width: auto;
      min-width: 180px;
      min-height: 42px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      font: inherit;
    }

    .filter-clear-btn {
      width: auto;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: #fff;
      box-shadow: none;
      font-size: 13px;
    }

    .table-empty {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.82);
    }

    .prescription-list {
      display: flex;
      gap: 0;
      width: 100%;
      flex: 1;
      min-height: 0;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
    }

    .prescription-carousel {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 0;
      display: flex;
    }

    .carousel-arrow {
      position: absolute;
      top: 50%;
      z-index: 3;
      width: 24px;
      height: 24px;
      transform: translateY(-50%);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: #102217;
      font: inherit;
      font-size: 16px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(5, 18, 11, 0.18);
    }

    .carousel-arrow:hover {
      background: #fff;
    }

    .carousel-arrow-left {
      left: 6px;
    }

    .carousel-arrow-right {
      right: 6px;
    }

    .prescription-preview-card {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 6px;
      flex: 0 0 100%;
      padding: 0;
      border-radius: 0;
      border: 0;
      background: transparent;
      color: #fff;
      min-height: 100%;
      scroll-snap-align: start;
      cursor: pointer;
    }

    .prescription-date {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: #102217;
      font-size: 15px;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(5, 18, 11, 0.16);
      width: 100%;
      max-width: 100%;
    }

    .prescription-preview-surface {
      position: relative;
      width: 100%;
      min-height: 606px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.92);
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .prescription-preview-frame {
      width: 100%;
      height: auto;
      min-height: 606px;
      object-fit: contain;
      object-position: top center;
      background: rgba(255, 255, 255, 0.92);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .prescription-preview-frame.is-ready {
      opacity: 1;
    }

    .prescription-preview-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      text-align: center;
      color: #415146;
      font-size: 13px;
      line-height: 1.6;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.95), rgba(244, 248, 245, 0.96));
    }

    .prescription-preview-placeholder.is-error {
      color: #8a3b12;
      background: linear-gradient(180deg, #fff8f2, #fff0e6);
    }

    .pdf-preview-modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(11, 22, 16, 0.68);
      backdrop-filter: blur(10px);
    }

    .pdf-preview-modal.is-open {
      display: flex;
    }

    .pdf-preview-dialog {
      width: min(980px, 100%);
      height: min(92vh, 980px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      border-radius: 24px;
      background: #f8fbf9;
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: 0 30px 80px rgba(11, 22, 16, 0.28);
    }

    .pdf-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px 12px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
    }

    .pdf-preview-head strong {
      font-size: 15px;
    }

    .pdf-preview-close {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(22, 38, 29, 0.08);
    }

    .pdf-preview-body {
      min-height: 0;
      display: grid;
      place-items: center;
      gap: 16px;
      padding: 20px;
      overflow: auto;
      background: linear-gradient(180deg, #f8fbf9, #eef4f0);
    }

    .pdf-preview-viewer {
      width: min(100%, 760px);
      min-height: 320px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      border: 1px solid rgba(22, 38, 29, 0.08);
      background: #fff;
      box-shadow: 0 18px 40px rgba(22, 38, 29, 0.08);
      overflow: hidden;
    }

    .pdf-preview-image {
      width: 100%;
      height: auto;
      display: none;
      object-fit: contain;
      background: #fff;
    }

    .pdf-preview-image.is-ready {
      display: block;
    }

    .pdf-preview-placeholder {

    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">🩺</div>
        <div class="brand-copy">
          <strong>The Better Health Clinic</strong>
          <span>Growth Monitoring Portal</span>
        </div>
      </div>

    </div>
  </header>

  <div class="page-shell">
    <section class="search-shell">
      <div class="search-head">
        <div id="results-count" class="count-chip">0 patients</div>
      </div>

      <div class="search-row">
        <input id="search-input" type="text" placeholder="Search by child name or phone number" autocomplete="off">
        <button id="clear-btn" class="btn-primary" type="button">Clear Search</button>
      </div>

      <div id="status-note" class="status-note">Loading patients...</div>
      <div id="results-panel" class="results-list"></div>
    </section>
  </div>

  <div id="pdf-preview-modal" class="pdf-preview-modal" aria-hidden="true">
    <div class="pdf-preview-dialog" role="dialog" aria-modal="true" aria-labelledby="pdf-preview-title">
      <div class="pdf-preview-head">
        <strong id="pdf-preview-title">Prescription preview</strong>
        <button id="pdf-preview-close" class="pdf-preview-close" type="button" aria-label="Close prescription preview">x</button>
      </div>
      <div class="pdf-preview-body">
        <div class="pdf-preview-viewer" aria-live="polite">
          <div id="pdf-preview-placeholder" class="pdf-preview-placeholder">Loading preview...</div>
          <img id="pdf-preview-frame" class="pdf-preview-image" alt="Prescription preview image">
        </div>
        <div class="pdf-preview-fallback">
          If the preview does not appear, <a id="pdf-preview-link" href="#" target="_blank" rel="noopener noreferrer">open the prescription</a>.
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js';
    import { collection, getDocs, getFirestore } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js';

    const searchInput = document.getElementById('search-input');
    const clearBtn = document.getElementById('clear-btn');
    const statusNote = document.getElementById('status-note');
    const resultsPanel = document.getElementById('results-panel');
    const resultsCount = document.getElementById('results-count');
    const menuToggle = document.getElementById('menu-toggle');
    const primaryNav = document.getElementById('primary-nav');
    const navLinks = [...document.querySelectorAll('#primary-nav .nav-link')];
    const pdfPreviewModal = document.getElementById('pdf-preview-modal');
    const pdfPreviewFrame = document.getElementById('pdf-preview-frame');
    const pdfPreviewPlaceholder = document.getElementById('pdf-preview-placeholder');
    const pdfPreviewLink = document.getElementById('pdf-preview-link');
    const pdfPreviewClose = document.getElementById('pdf-preview-close');
    const pdfPreviewImageCache = new Map();
    let prescriptionPreviewObserver = null;
    let pdfPreviewRuntimePromise = null;

    const firebaseEnv = import.meta.env || {};
    const firebaseConfig = {
      apiKey: firebaseEnv.VITE_FIREBASE_API_KEY || 'AIzaSyAm-cUFMyTFSyw8KlFOCcBKQkTKApEr5oo',
      authDomain: firebaseEnv.VITE_FIREBASE_AUTH_DOMAIN || 'clinci-dr-gunda.firebaseapp.com',
      projectId: firebaseEnv.VITE_FIREBASE_PROJECT_ID || 'clinci-dr-gunda',
      storageBucket: firebaseEnv.VITE_FIREBASE_STORAGE_BUCKET || 'clinci-dr-gunda.firebasestorage.app',
      messagingSenderId: firebaseEnv.VITE_FIREBASE_MESSAGING_SENDER_ID || '1059959825609',
      appId: firebaseEnv.VITE_FIREBASE_APP_ID || '1:1059959825609:web:8201599754706ac4661918',
      measurementId: firebaseEnv.VITE_FIREBASE_MEASUREMENT_ID || 'G-4V5JMVW45E'
    };

    const firebaseConfigured = Object.values(firebaseConfig).every(Boolean);
    const db = firebaseConfigured ? getFirestore(initializeApp(firebaseConfig)) : null;
    let allPatients = [];
    let allHistory = [];
    const historyDateFilters = {};
    let selectedPatientId = '';

    function setStatus(message, tone = '') {
      statusNote.textContent = message;
      statusNote.className = 'status-note visible';
      if (tone) {
        statusNote.classList.add(tone);
      }
    }

    function updateCount(count) {
      resultsCount.textContent = `${count} patient${count === 1 ? '' : 's'}`;
    }

    function renderPlaceholder(message) {
      resultsPanel.innerHTML = `<div class="placeholder">${message}</div>`;
    }

    function formatMissing(value, fallback = 'Not saved') {
      return value && String(value).trim() ? value : fallback;
    }

    function escapeHtml(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function buildPdfPreviewUrl(url, options = 'toolbar=0&navpanes=0&scrollbar=0&view=FitH') {
      if (!url) {
        return '';
      }

      return url.includes('#') ? url : `${url}#${options}`;
    }

    async function ensurePdfPreviewRuntime() {
      if (pdfPreviewRuntimePromise) {
        return pdfPreviewRuntimePromise;
      }

      pdfPreviewRuntimePromise = (async () => {
        try {
          const [{ getDocument, GlobalWorkerOptions }, pdfWorkerModule] = await Promise.all([
            import('https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/+esm'),
            import('https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/build/pdf.worker.min.mjs')
          ]);

          GlobalWorkerOptions.workerSrc = pdfWorkerModule?.default || 'https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/build/pdf.worker.min.mjs';
          return { getDocument };
        } catch (error) {
          console.warn(`Unable to load PDF preview runtime: ${error.message}`);
          return null;
        }
      })();

      return pdfPreviewRuntimePromise;
    }

    async function buildPrescriptionPreviewImage(pdfUrl) {
      try {
        const pdfPreviewRuntime = await ensurePdfPreviewRuntime();
        if (!pdfPreviewRuntime) {
          throw new Error('PDF preview runtime unavailable');
        }

        if (pdfPreviewImageCache.has(pdfUrl)) {
          return pdfPreviewImageCache.get(pdfUrl);
        }

        const loadingTask = pdfPreviewRuntime.getDocument({
          url: pdfUrl,
          useWorkerFetch: true,
          isEvalSupported: false
        });
        const pdfDocument = await loadingTask.promise;
        const page = await pdfDocument.getPage(1);
        const baseViewport = page.getViewport({ scale: 1 });
        const targetWidth = 900;
        const scale = targetWidth / Math.max(baseViewport.width, 1);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d', { alpha: false });

        canvas.width = Math.ceil(viewport.width);
        canvas.height = Math.ceil(viewport.height);

        await page.render({
          canvasContext: context,
          viewport
        }).promise;

        const previewDataUrl = canvas.toDataURL('image/jpeg', 0.92);
        pdfPreviewImageCache.set(pdfUrl, previewDataUrl);
        page.cleanup();
        await pdfDocument.destroy();
        return previewDataUrl;
      } catch (error) {
        throw error;
      }
    }

    async function renderPrescriptionPreviewImage(imageElement) {
      if (!(imageElement instanceof HTMLImageElement)) {
        return;
      }

      if (imageElement.dataset.rendered === 'true') {
        return;
      }

      const pdfUrl = imageElement.dataset.pdfUrl || '';
      if (!pdfUrl) {
        return;
      }

      const placeholder = imageElement.parentElement?.querySelector('.prescription-preview-placeholder');

      try {
        const previewDataUrl = await buildPrescriptionPreviewImage(pdfUrl);
        imageElement.src = previewDataUrl;
        imageElement.dataset.rendered = 'true';
        imageElement.classList.add('is-ready');
        if (placeholder) {
          placeholder.hidden = true;
        }
      } catch (error) {
        console.warn(`Unable to render prescription preview image: ${error.message}`);
        if (placeholder) {
          placeholder.hidden = false;
          placeholder.classList.add('is-error');
          placeholder.textContent = 'Preview image could not be created. Tap to open the prescription.';
        }
      }
    }

    function attachPrescriptionPreviewRendering() {
      const previewImages = [...resultsPanel.querySelectorAll('.prescription-preview-frame[data-pdf-url]')];
      if (!previewImages.length) {
        return;
      }

      if (!('IntersectionObserver' in window)) {
        previewImages.forEach(renderPrescriptionPreviewImage);
        return;
      }

      if (!prescriptionPreviewObserver) {
        prescriptionPreviewObserver = new IntersectionObserver((entries, observer) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) {
              return;
            }

            renderPrescriptionPreviewImage(entry.target);
            observer.unobserve(entry.target);
          });
        }, {
          root: null,
          rootMargin: '240px 0px',
          threshold: 0.01
        });
      }

      previewImages.forEach((imageElement) => {
        prescriptionPreviewObserver.observe(imageElement);
      });
    }

    function formatDateDisplay(dateValue, fallback = 'DOB not saved') {
      if (!dateValue) {
        return fallback;
      }

      const parsed = new Date(dateValue);
      if (Number.isNaN(parsed.getTime())) {
        return dateValue;
      }

      return parsed.toLocaleDateString('en-IN', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      });
    }

    function getIsoDatePart(dateValue) {
      if (!dateValue) {
        return '';
      }

      const parsed = new Date(dateValue);
      if (Number.isNaN(parsed.getTime())) {
        return '';
      }

      const year = parsed.getFullYear();
      const month = String(parsed.getMonth() + 1).padStart(2, '0');
      const day = String(parsed.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function formatHistoryDateTime(entry) {
      if (entry.createdAtIso) {
        const parsed = new Date(entry.createdAtIso);
        if (!Number.isNaN(parsed.getTime())) {
          return parsed.toLocaleString('en-IN');
        }
      }

      return entry.createdAtDisplay || 'Saved measurement';
    }

    function formatHistoryDateHeader(entry) {
      if (entry.createdAtIso) {
        const parsed = new Date(entry.createdAtIso);
        if (!Number.isNaN(parsed.getTime())) {
          return parsed.toLocaleDateString('en-IN', {
            day: '2-digit',
            month: 'short',
            year: '2-digit'
          });
        }
      }

      return 'Saved';
    }

    function formatMetricCellValue(value, suffix = '') {
      return value && String(value).trim() ? `${value}${suffix}` : '';
    }

    function getPatientDisplayName(patient) {
      return (
        patient.childName
        || [patient.firstName, patient.middleName, patient.lastName].filter(Boolean).join(' ').trim()
        || patient.patientId
        || 'Unknown child'
      );
    }

    function normalizeSearchValue(value) {
      return String(value || '').replace(/\D+/g, '');
    }

    function getPatientSearchText(patient) {
      return [
        patient.childName,
        patient.firstName,
        patient.middleName,
        patient.lastName,
        patient.patientId,
        patient.phone,
        patient.parentName
      ]
        .filter(Boolean)
        .join(' ')
        .toLowerCase();
    }

    function patientMatchesSearch(patient, rawSearchValue) {
      const loweredSearchValue = rawSearchValue.trim().toLowerCase();
      if (!loweredSearchValue) {
        return true;
      }

      const normalizedSearchValue = normalizeSearchValue(rawSearchValue);
      const normalizedPatientPhone = normalizeSearchValue(patient.phone);

      return getPatientSearchText(patient).includes(loweredSearchValue)
        || Boolean(normalizedSearchValue && normalizedPatientPhone.includes(normalizedSearchValue));
    }

    function sortByPatientName(left, right) {
      return getPatientDisplayName(left).localeCompare(getPatientDisplayName(right));
    }

    function getMeasurementEntries(patient) {
      const entries = Array.isArray(patient.measurementHistory) ? [...patient.measurementHistory] : [];
      if (patient.lastMeasurementRecord && entries.length === 0) {
        entries.push(patient.lastMeasurementRecord);
      }

      return entries.sort((a, b) => {
        const aTime = Date.parse(a?.createdAtIso || '') || 0;
        const bTime = Date.parse(b?.createdAtIso || '') || 0;
        return bTime - aTime;
      });
    }

    function renderMeasurementHtml(patient) {
      const entries = getMeasurementEntries(patient).slice(0, 3);

      if (entries.length === 0) {
        return '<p>No chart measurements have been saved for this patient yet.</p>';
      }

      return `
        <div class="measurement-stack">
          ${entries.map((entry) => `
            <div class="measurement-item">
              <strong>${entry.createdAtDisplay || 'Saved measurement'}</strong>
              <span>Wt ${entry.weight || '-'} kg • Ht ${entry.height || '-'} cm • HC ${entry.head || '-'} cm</span>
              <span>SpO2 ${entry.spo2 || '-'}% • Pulse ${entry.pulse || '-'} bpm • BP ${entry.systolic || '-'}/${entry.diastolic || '-'} mmHg • Temp ${entry.temp || '-'}°C</span>
              <span>Charts: ${Array.isArray(entry.charts) && entry.charts.length > 0 ? entry.charts.join(', ') : 'Not saved'}</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderMeasurementTableHtml(patient, selectedDate = '') {
      const entries = getMeasurementEntries(patient);
      if (entries.length === 0) {
        return '';
      }

      const filteredEntries = (selectedDate
        ? entries.filter((entry) => getIsoDatePart(entry.createdAtIso) === selectedDate)
        : entries).slice(0, 6);

      const rows = [
        {
          label: 'Weight',
          unit: 'kg',
          getValue: (entry) => formatMetricCellValue(entry.weight)
        },
        {
          label: 'Height',
          unit: 'cm',
          getValue: (entry) => formatMetricCellValue(entry.height)
        },
        {
          label: 'Ofc',
          unit: 'cm',
          getValue: (entry) => formatMetricCellValue(entry.head)
        },
        {
          label: 'SPO2',
          unit: '%',
          getValue: (entry) => formatMetricCellValue(entry.spo2)
        },
        {
          label: 'Pulse',
          unit: '/min',
          getValue: (entry) => formatMetricCellValue(entry.pulse)
        },
        {
          label: 'Systolic',
          unit: 'mmHg',
          getValue: (entry) => formatMetricCellValue(entry.systolic)
        },
        {
          label: 'Diastolic',
          unit: 'mmHg',
          getValue: (entry) => formatMetricCellValue(entry.diastolic)
        },
        {
          label: 'Temperature',
          unit: '°C',
          getValue: (entry) => formatMetricCellValue(entry.temp)
        }
      ];

      return `
        <div class="history-filter-row">
          <label for="history-date-${patient.patientId}">Change date</label>
          <input id="history-date-${patient.patientId}" class="history-date-input" data-patient-id="${patient.patientId}" type="date" value="${selectedDate}">
          <button class="filter-clear-btn" type="button" data-clear-history-date="${patient.patientId}">Show all</button>
        </div>
        <div class="record-table-wrap">
          <table class="record-table">
            <thead>
              <tr>
                <th></th>
                <th></th>
                ${filteredEntries.map((entry) => `<th>${formatHistoryDateHeader(entry)}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${filteredEntries.length === 0 ? `
                <tr>
                  <td colspan="6" class="table-empty">No chart measurements were found for the selected date.</td>
                </tr>
              ` : rows.map((row) => `
                <tr>
                  <th scope="row" class="metric-name">${row.label}</th>
                  <td class="metric-unit">${row.unit}</td>
                  ${filteredEntries.map((entry) => `<td class="metric-value">${row.getValue(entry)}</td>`).join('')}
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function formatPrescriptionDate(entry) {
      if (entry.createdAtIso) {
        const parsed = new Date(entry.createdAtIso);
        if (!Number.isNaN(parsed.getTime())) {
          return parsed.toLocaleDateString('en-IN', {
            day: '2-digit',
            month: 'short',
            year: 'numeric'
          });
        }
      }

      return entry.createdAtDisplay || 'Saved prescription';
    }

    function getPrescriptionEntries(patientId) {
      return allHistory
        .filter((entry) => entry.type === 'prescription' || entry.source === 'prescription-pdf')
        .filter((entry) => (entry.patientId || '').toUpperCase() === String(patientId || '').toUpperCase())
        .sort((a, b) => new Date(b.createdAtIso || 0) - new Date(a.createdAtIso || 0));
    }

    function renderPrescriptionListHtml(patientId) {
      const entries = getPrescriptionEntries(patientId);

      if (!entries.length) {
        return '<p>No saved prescriptions found for this patient yet.</p>';
      }

      return `
        <div class="prescription-carousel">
          ${entries.length > 1 ? '<button class="carousel-arrow carousel-arrow-left" type="button" data-carousel-direction="-1" aria-label="Previous prescription">‹</button>' : ''}
          <div class="prescription-list">
            ${entries.slice(0, 5).map((entry, index) => {
              const downloadUrl = entry.downloadURL || '';
              const cardUrl = escapeHtml(downloadUrl);

              return `
                <div class="prescription-preview-card" data-open-prescription-url="${cardUrl}">
                  <div class="prescription-date">${formatPrescriptionDate(entry)}</div>
                  ${downloadUrl
                    ? `
                      <div class="prescription-preview-surface">
                        <div class="prescription-preview-placeholder">Preparing preview...</div>
                        <img class="prescription-preview-frame" data-pdf-url="${cardUrl}" alt="Prescription preview ${index + 1}">
                      </div>
                    `
                    : '<p>No prescription preview link was saved for this record.</p>'}
                </div>
              `;
            }).join('')}
          </div>
          ${entries.length > 1 ? '<button class="carousel-arrow carousel-arrow-right" type="button" data-carousel-direction="1" aria-label="Next prescription">›</button>' : ''}
        </div>
      `;
    }

    function renderPatients(patients) {
      updateCount(patients.length);

      if (patients.length === 0) {
        renderPlaceholder('No patients matched that search.');
        return;
      }

      resultsPanel.innerHTML = patients.map((patient) => {
        const childName = getPatientDisplayName(patient);
        const phone = formatMissing(patient.phone, 'Phone not saved');
        const parentName = formatMissing(patient.parentName, 'Parent not saved');
        const dob = formatDateDisplay(patient.dob);
        const gender = formatMissing(patient.gender, 'Gender not saved');
        const patientId = formatMissing(patient.patientId, 'ID not saved');
        const selectedHistoryDate = historyDateFilters[patientId] || '';
        const isExpanded = selectedPatientId === patientId;

        return `
          <article class="result-card" data-patient-card="${patientId}">
            <div class="result-top">
              <button class="result-meta result-meta--child profile-trigger" type="button" data-open-profile="${patientId}" aria-expanded="${isExpanded ? 'true' : 'false'}">
                <span class="result-meta-label">Child name</span>
                <div class="child-meta-head">
                  <div class="child-avatar">${childName.charAt(0).toUpperCase()}</div>
                  <div>
                    <strong>${childName}</strong>
                    <small>${gender} • ${dob}</small>
                  </div>
                </div>
                <div class="profile-action-row">
                  <div class="patient-id-badge mono">${patientId}</div>
                  <span class="profile-toggle-pill">${isExpanded ? 'Hide profile' : 'Open profile'}</span>
                </div>
              </button>
              <div class="result-meta">
                <span class="result-meta-label">Phone number</span>
                <strong>${phone}</strong>
                <small>${parentName}</small>
              </div>
              <a class="continue-link" href="prescription-growth-chart-dashboard.html?patientId=${encodeURIComponent(patientId)}">Continue</a>
            </div>

            <div class="result-layout ${isExpanded ? '' : 'is-hidden'}">
              <section class="info-panel">
                <div class="panel-content">
                  <h3>Info regarding patient details and current clinic record.</h3>
                  ${renderMeasurementTableHtml(patient, selectedHistoryDate)}
                </div>
              </section>

              <section class="history-panel">
                <div class="panel-content">
                  <h3>Past prescription</h3>
                  ${renderPrescriptionListHtml(patientId)}
                </div>
              </section>
            </div>
          </article>
        `;
      }).join('');

      attachPrescriptionPreviewRendering();
    }

    function filterPatients() {
      const searchValue = searchInput.value.trim();
      const filteredPatients = searchValue
        ? allPatients.filter((patient) => patientMatchesSearch(patient, searchValue))
        : allPatients;

      if (selectedPatientId && !filteredPatients.some((patient) => formatMissing(patient.patientId, 'ID not saved') === selectedPatientId)) {
        selectedPatientId = '';
      }

      renderPatients(filteredPatients);
      setStatus(searchValue ? `Showing matches for "${searchValue}".` : 'Showing all patients.');
    }

    async function openPrescriptionPreview(url) {
      if (!url) {
        return;
      }

      pdfPreviewLink.href = url;
      pdfPreviewModal.classList.add('is-open');
      pdfPreviewModal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      pdfPreviewFrame.classList.remove('is-ready');
      pdfPreviewFrame.removeAttribute('src');
      pdfPreviewPlaceholder.hidden = false;
      pdfPreviewPlaceholder.classList.remove('is-error');
      pdfPreviewPlaceholder.textContent = 'Loading preview...';
      pdfPreviewClose.focus();

      try {
        const previewDataUrl = await buildPrescriptionPreviewImage(url);
        pdfPreviewFrame.src = previewDataUrl;
        pdfPreviewFrame.classList.add('is-ready');
        pdfPreviewPlaceholder.hidden = true;
      } catch (error) {
        console.warn(`Unable to open prescription preview: ${error.message}`);
        pdfPreviewPlaceholder.hidden = false;
        pdfPreviewPlaceholder.classList.add('is-error');
        pdfPreviewPlaceholder.textContent = 'Preview could not be loaded here. Use the link below to open the prescription.';
      }
    }

    function closePrescriptionPreview() {
      pdfPreviewModal.classList.remove('is-open');
      pdfPreviewModal.setAttribute('aria-hidden', 'true');
      pdfPreviewFrame.classList.remove('is-ready');
      pdfPreviewFrame.removeAttribute('src');
      pdfPreviewPlaceholder.hidden = false;
      pdfPreviewPlaceholder.classList.remove('is-error');
      pdfPreviewPlaceholder.textContent = 'Loading preview...';
      pdfPreviewLink.href = '#';
      document.body.style.overflow = '';
    }

    resultsPanel.addEventListener('input', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement) || !target.classList.contains('history-date-input')) {
        return;
      }

      historyDateFilters[target.dataset.patientId] = target.value;
      filterPatients();
    });

    resultsPanel.addEventListener('click', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) {
        return;
      }

      const patientId = target.getAttribute('data-clear-history-date');
      const openProfilePatientId = target.closest('[data-open-profile]')?.getAttribute('data-open-profile');
      if (target.matches('[data-carousel-direction]')) {
        const carousel = target.closest('.prescription-carousel');
        const list = carousel?.querySelector('.prescription-list');
        const direction = Number(target.dataset.carouselDirection || 1);
        if (list) {
          list.scrollBy({
            left: list.clientWidth * direction,
            behavior: 'smooth'
          });
        }
        return;
      }

      const prescriptionCard = target.closest('.prescription-preview-card');
      const prescriptionUrl = prescriptionCard?.dataset.openPrescriptionUrl;
      if (prescriptionUrl) {
        openPrescriptionPreview(prescriptionUrl);
        return;
      }

      if (openProfilePatientId) {
        selectedPatientId = selectedPatientId === openProfilePatientId ? '' : openProfilePatientId;
        filterPatients();
        return;
      }

      if (!patientId) {
        return;
      }

      delete historyDateFilters[patientId];
      filterPatients();
    });

    async function loadPatients() {
      if (!db) {
        updateCount(0);
        renderPlaceholder('Firebase is not configured for patient search.');
        setStatus('Firebase is not configured, so patients cannot be loaded.', 'warning');
        return;
      }

      setStatus('Loading patients...');

      try {
        const snapshot = await getDocs(collection(db, 'patients'));
        const historySnapshot = await getDocs(collection(db, 'history')).catch((error) => {
          console.warn(`Unable to load history records: ${error.message}`);
          return { docs: [] };
        });
        allHistory = historySnapshot.docs.map((docSnapshot) => ({
          id: docSnapshot.id,
          ...docSnapshot.data()
        }));

        const patientRecords = snapshot.docs.map((docSnapshot) => ({
          id: docSnapshot.id,
          ...docSnapshot.data()
        }));
        const historyByPatientId = new Map();

        allHistory.forEach((entry) => {
          const patientId = String(entry.patientId || '').trim().toUpperCase();
          if (!patientId) {
            return;
          }

          const entries = historyByPatientId.get(patientId) || [];
          entries.push(entry);
          historyByPatientId.set(patientId, entries);
        });

        historyByPatientId.forEach((entries) => {
          entries.sort((left, right) => {
            const leftTime = Date.parse(left.createdAtIso || '') || 0;
            const rightTime = Date.parse(right.createdAtIso || '') || 0;
            return rightTime - leftTime;
          });
        });

        const mergedPatients = [];
        const seenPatientIds = new Set();

        patientRecords.forEach((patient) => {
          const patientId = String(patient.patientId || '').trim().toUpperCase();
          const historyEntries = patientId ? historyByPatientId.get(patientId) || [] : [];

          mergedPatients.push({
            ...patient,
            measurementHistory: Array.isArray(patient.measurementHistory) ? patient.measurementHistory : historyEntries,
            lastMeasurementRecord: patient.lastMeasurementRecord || historyEntries[0] || null
          });

          if (patientId) {
            seenPatientIds.add(patientId);
          }
        });

        historyByPatientId.forEach((entries, patientId) => {
          if (seenPatientIds.has(patientId)) {
            return;
          }

          const latest = entries[0] || {};
          mergedPatients.push({
            id: `history-${patientId}`,
            patientId: latest.patientId || patientId,
            childName: latest.childName || latest.patientName || '',
            firstName: latest.firstName || '',
            middleName: latest.middleName || '',
            lastName: latest.lastName || '',
            parentName: latest.parentName || '',
            phone: latest.phone || '',
            gender: latest.gender || '',
            dob: latest.dob || '',
            measurementHistory: entries,
            lastMeasurementRecord: latest,
            fromHistoryOnly: true
          });
        });

        allPatients = mergedPatients.sort(sortByPatientName);

        if (allPatients.length === 0) {
          updateCount(0);
          renderPlaceholder('No patients have been saved yet.');
          setStatus('No patients were found in the database.');
          return;
        }

        filterPatients();
      } catch (error) {
        updateCount(0);
        renderPlaceholder('The patient list could not be loaded right now.');
        setStatus(`Unable to load patients: ${error.message}`, 'warning');
      }
    }

    function clearSearch() {
      searchInput.value = '';
      filterPatients();
    }

    function closeMobileMenu() {
      if (!menuToggle || !primaryNav) {
        return;
      }

      menuToggle.setAttribute('aria-expanded', 'false');
      primaryNav.classList.remove('is-open');
    }

    function toggleMobileMenu() {
      if (!menuToggle || !primaryNav) {
        return;
      }

      const isOpen = menuToggle.getAttribute('aria-expanded') === 'true';
      menuToggle.setAttribute('aria-expanded', String(!isOpen));
      primaryNav.classList.toggle('is-open', !isOpen);
    }

    searchInput.addEventListener('input', filterPatients);
    clearBtn.addEventListener('click', clearSearch);
    pdfPreviewClose.addEventListener('click', closePrescriptionPreview);
    pdfPreviewModal.addEventListener('click', (event) => {
      if (event.target === pdfPreviewModal) {
        closePrescriptionPreview();
      }
    });
    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && pdfPreviewModal.classList.contains('is-open')) {
        closePrescriptionPreview();
      }
    });
    if (menuToggle && primaryNav) {
      menuToggle.addEventListener('click', toggleMobileMenu);
      navLinks.forEach((link) => link.addEventListener('click', closeMobileMenu));
      window.addEventListener('resize', () => {
        if (window.innerWidth > 820) {
          closeMobileMenu();
        }
      });
    }

    loadPatients();
  </script>
</body>
</html>
