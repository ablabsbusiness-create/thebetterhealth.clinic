<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single Graph Chart Preview</title>
  <style>
    :root {
      --bg: #f3f5f4;
      --panel: #fff;
      --ink: #152018;
      --muted: #617065;
      --line: #d9e2dc;
      --shadow: 0 14px 34px rgba(21, 32, 24, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.08), transparent 24%),
        linear-gradient(180deg, #f8fbf9 0%, var(--bg) 100%);
    }

    .page {
      width: min(1320px, calc(100% - 32px));
      margin: 24px auto 40px;
    }

    .hero {
      margin-bottom: 20px;
      padding: 20px 22px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }

    .card {
      display: grid;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .card h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .frame {
      width: 100%;
      height: 420px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
    }

    .open-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      background: #1f5132;
      font-size: 13px;
      font-weight: 700;
      width: fit-content;
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1320px);
        margin: 16px auto 26px;
      }

      .hero {
        padding: 16px;
        border-radius: 20px;
      }

      .card {
        padding: 12px;
      }

      .frame {
        height: 320px;
      }

      .open-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Single Graph Chart Preview</h1>
      <p>Only the one-graph minimalist chart files are shown here.</p>
    </section>

    <section id="chart-grid" class="grid"></section>
  </main>

  <script>
    const charts = [
      ['boys-height-0-5-minimal.svg', 'Boys Height 0-5'],
      ['boys-weight-0-5-minimal.svg', 'Boys Weight 0-5'],
      ['boys-head-0-5-minimal.svg', 'Boys Head 0-5'],
      ['boys-bmi-0-5-minimal.svg', 'Boys BMI 0-5'],
      ['boys-weight-for-height-0-5-minimal.svg', 'Boys Weight-for-Height 0-5'],
      ['boys-height-5-18-minimal.svg', 'Boys Height 5-18'],
      ['boys-weight-5-18-minimal.svg', 'Boys Weight 5-18'],
      ['boys-head-5-18-minimal.svg', 'Boys Head 5-18'],
      ['boys-bmi-5-18-minimal.svg', 'Boys BMI 5-18'],
      ['boys-waist-circumference-minimal.svg', 'Boys Waist Circumference'],
      ['boys-extended-bmi-minimal.svg', 'Boys Extended BMI'],
      ['girls-height-0-5-minimal.svg', 'Girls Height 0-5'],
      ['girls-weight-0-5-minimal.svg', 'Girls Weight 0-5'],
      ['girls-head-0-5-minimal.svg', 'Girls Head 0-5'],
      ['girls-bmi-0-5-minimal.svg', 'Girls BMI 0-5'],
      ['girls-weight-for-height-0-5-minimal.svg', 'Girls Weight-for-Height 0-5'],
      ['girls-height-5-18-minimal.svg', 'Girls Height 5-18'],
      ['girls-weight-5-18-minimal.svg', 'Girls Weight 5-18'],
      ['girls-head-5-18-minimal.svg', 'Girls Head 5-18'],
      ['girls-bmi-5-18-minimal.svg', 'Girls BMI 5-18'],
      ['girls-waist-circumference-minimal.svg', 'Girls Waist Circumference'],
      ['girls-extended-bmi-minimal.svg', 'Girls Extended BMI']
    ];

    const grid = document.getElementById('chart-grid');
    charts.forEach(([file, title]) => {
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `
        <div>
          <h2>${title}</h2>
          <p>${file}</p>
        </div>
        <iframe class="frame" src="${file}" title="${title} preview"></iframe>
        <a class="open-link" href="${file}" target="_blank" rel="noopener noreferrer">Open Full Chart</a>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
