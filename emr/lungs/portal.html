<html lang="en">
<head>

  <style>
    :root {
      --bg: #eef4ef;
      --panel: #ffffff;
      --ink: #17241c;
      --muted: #5c6d63;
      --faint: #8a988f;
      --line: #dde7de;
      --brand: #15803d;
      --brand-dark: #14532d;
      --brand-soft: #dcfce7;
      --brand-strong: #14532d;
      --danger: #b91c1c;
      --danger-soft: #fef2f2;
      --danger-line: #fecaca;
      --radius-lg: 26px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --shadow-panel: 0 20px 50px rgba(20, 46, 30, 0.09), 0 2px 6px rgba(20, 46, 30, 0.04);
      --shadow-btn: 0 14px 26px rgba(21, 128, 61, 0.26);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% -10%, rgba(34, 197, 94, 0.16), transparent 32%),
        radial-gradient(circle at 100% 0%, rgba(34, 197, 94, 0.1), transparent 30%),
        linear-gradient(180deg, #f5faf3 0%, #eaf3ec 55%, #e6f1e9 100%);
    }

    body.has-bottom-nav {
      padding-bottom: calc(84px + env(safe-area-inset-bottom));
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: rgba(248, 252, 248, 0.85);
      border-bottom: 1px solid rgba(215, 226, 217, 0.95);
      box-shadow: 0 8px 24px rgba(22, 38, 29, 0.05);
    }

    .topbar {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      min-height: 72px;
      display: flex;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #34d399, #15803d);
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 10px 22px rgba(21, 128, 61, 0.28);
    }

    .brand-mark svg {
      width: 22px;
      height: 22px;
    }

    .brand-copy strong {
      display: block;
      font-size: 15.5px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .brand-copy span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 500;
    }

    .page-shell {
      width: min(560px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 72px;
      display: grid;
      gap: 22px;
    }

    .panel {
      padding: 26px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow-panel);
    }

    .panel.is-hidden {
      display: none;
    }

    form.is-hidden {
      display: none;
    }

    .text-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 0;
      background: none;
      color: var(--brand-dark);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      padding: 8px 4px;
      justify-self: start;
    }

    .text-btn svg {
      width: 14px;
      height: 14px;
    }

    #recaptcha-container {
      display: flex;
      justify-content: center;
    }

    form {
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 7px;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--muted);
    }

    label .hint {
      font-weight: 500;
      color: var(--faint);
      font-size: 11.5px;
      text-transform: none;
      letter-spacing: 0;
    }

    input {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--line);
      background: #fbfdfb;
      color: var(--ink);
      font: inherit;
      font-size: 15.5px;
      font-weight: 600;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    input::placeholder {
      color: var(--faint);
      font-weight: 500;
    }

    input:hover {
      border-color: #c6d8ca;
    }

    input:focus {
      border-color: var(--brand);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.14);
    }

    .patient-id-group {
      display: flex;
      align-items: stretch;
      gap: 8px;
    }

    .patient-id-prefix {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 60px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      border: 1.5px solid transparent;
      background: linear-gradient(135deg, var(--brand-soft), #cdf3d8);
      color: var(--brand-strong);
      font-weight: 800;
      font-size: 15.5px;
      letter-spacing: 0.03em;
    }

    .patient-id-group input {
      flex: 1;
      min-width: 0;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    .btn-primary {
      position: relative;
      margin-top: 4px;
      min-height: 52px;
      border: 0;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #22c55e, #15803d);
      color: #fff;
      font: inherit;
      font-size: 15.5px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow-btn);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 30px rgba(21, 128, 61, 0.32);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .btn-primary:disabled {
      opacity: 0.72;
      cursor: default;
      transform: none;
      box-shadow: var(--shadow-btn);
    }

    .btn-spinner {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2.5px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      display: none;
      animation: spin 0.7s linear infinite;
    }

    .btn-primary.is-loading .btn-spinner {
      display: inline-block;
    }

    .btn-primary.is-loading .btn-label,
    .btn-primary.is-loading .btn-icon {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .form-message {
      display: none;
      align-items: flex-start;
      gap: 9px;
      margin: 0;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
    }

    .form-message svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .form-message.is-visible {
      display: flex;
    }

    .form-message.is-error {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid var(--danger-line);
    }

    .form-message.is-info {
      background: #f4f8f5;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .results-panel {
      display: none;
      opacity: 0;
      transform: translateY(6px);
    }

    .results-panel.is-visible {
      display: grid;
      gap: 14px;
      animation: rise 0.28s ease forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .results-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 2px;
    }

    .results-head-text h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
    }

    .results-head-text span {
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 500;
    }

    .results-head button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 0;
      background: none;
      color: var(--brand-dark);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      padding: 8px 4px;
    }

    .results-head button svg {
      width: 14px;
      height: 14px;
    }

    .visit-list {
      display: grid;
      gap: 10px;
    }

    .visit-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: #fbfdfb;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .visit-card:hover {
      border-color: #c6d8ca;
      box-shadow: 0 8px 20px rgba(20, 46, 30, 0.06);
    }

    .visit-card-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .visit-card-dot {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      border-radius: 11px;
      display: grid;
      place-items: center;
      background: var(--brand-soft);
      color: var(--brand-strong);
    }

    .visit-card-dot svg {
      width: 18px;
      height: 18px;
    }

    .visit-card-text {
      min-width: 0;
    }

    .visit-card-date {
      font-weight: 700;
      font-size: 14.5px;
      white-space: nowrap;
    }

    .visit-card-sub {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .visit-card-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .visit-card-actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 40px;
      padding: 0 15px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid var(--line);
      color: var(--ink);
      background: #fff;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    }

    .visit-card-actions a svg {
      width: 15px;
      height: 15px;
    }

    .visit-card-actions a:hover {
      transform: translateY(-1px);
    }

    .visit-card-actions a.is-primary {
      border-color: transparent;
      background: linear-gradient(135deg, var(--brand-soft), #cdf3d8);
      color: var(--brand-strong);
    }

    .empty-state,
    .loading-state {
      display: grid;
      justify-items: center;
      text-align: center;
      gap: 10px;
      padding: 30px 20px;
      border-radius: var(--radius-md);
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, 0.6);
    }

    .empty-state-icon,
    .loading-state-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--brand-soft);
      color: var(--brand-strong);
    }

    .empty-state-icon svg,
    .loading-state-icon svg {
      width: 22px;
      height: 22px;
    }

    .empty-state p,
    .loading-state p {
      margin: 0;
      color: var(--muted);
      font-size: 13.5px;
      font-weight: 600;
      max-width: 34ch;
    }

    .loading-state-icon {
      animation: pulse 1.1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    .loading-panel {
      display: none;
    }

    .loading-panel.is-visible {
      display: block;
    }

    .footnote {
      text-align: center;
      color: var(--faint);
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
    }

    .footnote a {
      color: var(--brand-dark);
      font-weight: 700;
      text-decoration: none;
    }

    .bottom-nav {
      display: none;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 40;
      justify-content: center;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      pointer-events: none;
    }

    .bottom-nav.is-visible {
      display: flex;
    }

    .bottom-nav-inner {
      pointer-events: auto;
      width: min(420px, 100%);
      display: flex;
      gap: 6px;
      padding: 6px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      box-shadow: 0 16px 34px rgba(20, 46, 30, 0.16);
      backdrop-filter: blur(14px);
    }

    .bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 56px;
      padding: 8px 6px;
      border-radius: 14px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 11.5px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .bottom-nav-item svg {
      width: 20px;
      height: 20px;
    }

    .bottom-nav-item.is-active {
      background: var(--brand-soft);
      color: var(--brand-strong);
    }

    .nav-toast {
      position: fixed;
      left: 50%;
      bottom: calc(88px + env(safe-area-inset-bottom));
      transform: translate(-50%, 8px);
      z-index: 50;
      max-width: min(360px, calc(100% - 32px));
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      background: var(--brand-strong);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
      text-align: center;
      box-shadow: 0 16px 30px rgba(20, 46, 30, 0.24);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .nav-toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .nav-toast a {
      color: #fff;
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .page-shell {
        padding: 28px 0 56px;
        gap: 18px;
      }

      .panel {
        padding: 22px 18px;
        border-radius: 20px;
      }

      .visit-card {
        flex-direction: column;
        align-items: stretch;
      }

      .visit-card-actions {
        justify-content: stretch;
      }

      .visit-card-actions a {
        flex: 1;
      }
    }

    @media (max-width: 760px) {
      body {
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
        padding-bottom: 0;
      }

      body.has-bottom-nav {
        padding-bottom: calc(84px + env(safe-area-inset-bottom));
      }

      .site-header {
        flex-shrink: 0;
      }

      .page-shell {
        margin: auto 0;
        padding-top: 14px;
        padding-bottom: 14px;
      }

      .panel {
        padding-bottom: 14px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 21s-7.5-4.6-10-9.3C.4 8.2 2 4.5 5.6 4a4.7 4.7 0 0 1 6.4 2 4.7 4.7 0 0 1 6.4-2c3.6.5 5.2 4.2 3.6 7.7C19.5 16.4 12 21 12 21Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="brand-copy">
          <strong>The Better Lungs Clinic</strong>
          <span>Patient Portal</span>
        </div>
      </div>
    </div>
  </header>

  <div class="page-shell">
    <section id="lookup-panel" class="panel">
      <form id="lookup-form">
        <label for="patient-id-number">
          Patient ID
          <div class="patient-id-group">
            <span class="patient-id-prefix">TBL</span>
            <input id="patient-id-number" name="patientIdNumber" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="0000" autocomplete="off" required>
          </div>
        </label>
        <label for="phone-number">
          Phone number
          <input id="phone-number" name="phoneNumber" type="tel" inputmode="tel" placeholder="Enter phone number" autocomplete="tel" required>
          <span class="hint">Must match the phone number given at registration.</span>
        </label>
        <button id="lookup-submit" class="btn-primary" type="submit">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="m21 21-4.3-4.3M18 11a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="btn-label">Send verification code</span>
          <span class="btn-spinner"></span>
        </button>
        <p id="form-message" class="form-message">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 8v5M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span id="form-message-text"></span>
        </p>
      </form>

      <form id="otp-form" class="is-hidden">
        <label for="otp-code">
          Verification code
          <input id="otp-code" name="otpCode" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="6-digit code" autocomplete="one-time-code" required>
          <span class="hint" id="otp-hint">Enter the code sent to your phone.</span>
        </label>
        <button id="otp-submit" class="btn-primary" type="submit">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="m5 13 4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="btn-label">Verify and view records</span>
          <span class="btn-spinner"></span>
        </button>
        <p id="otp-message" class="form-message">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 8v5M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span id="otp-message-text"></span>
        </p>
        <button id="otp-back" type="button" class="text-btn">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 18 3 12l6-6M3 12h12a5 5 0 0 1 5 5v1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Change phone number
        </button>
      </form>

      <div id="recaptcha-container"></div>
    </section>

    <div id="loading-panel" class="loading-panel">
      <div class="loading-state">
        <div class="loading-state-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 11a7 7 0 0 1-14 0M12 18v3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <p>Looking up your records...</p>
      </div>
    </div>

    <section id="results-panel" class="results-panel">
      <div class="results-head">
        <div class="results-head-text">
          <h2 id="results-title">Visit history</h2>
          <span id="results-subtitle"></span>
        </div>
        <div style="display: flex; gap: 4px;">
          <button id="logout-button" type="button">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Log out
          </button>
        </div>
      </div>
      <div id="visit-list" class="visit-list"></div>
    </section>

    <p class="footnote">Trouble finding your records? Call the clinic at <a href="tel:+919686183999">+91 96861 83999</a>.</p>
  </div>

  <nav class="bottom-nav" aria-label="Portal navigation">
    <div class="bottom-nav-inner">
      <a class="bottom-nav-item is-active" href="/emr/lungs/portal" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 3h8l4 4v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M9 12h6M9 16h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Prescriptions</span>
      </a>
      <button type="button" class="bottom-nav-item" id="appointment-tab">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3.5" y="5" width="17" height="16" rx="3" stroke="currentColor" stroke-width="2"/><path d="M3.5 10h17M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Appointment</span>
      </button>
    </div>
  </nav>

  <div class="nav-toast" id="nav-toast">Appointment booking is coming soon. Call <a href="tel:+919686183999">+91 96861 83999</a> to book.</div>

  <script type="module">
    import { collection, doc, getDoc, getDocs, orderBy, query, where } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js';
    import { getDownloadURL, ref } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-storage.js';
    import { onAuthStateChanged, RecaptchaVerifier, signInWithPhoneNumber, signOut } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js';
    import { db, storage, auth } from './lib/firebase-init.js';

    const CLINIC_FIREBASE_NAMESPACE = 'clinics/lungs';
    const FIREBASE_COLLECTIONS = {
      patients: `${CLINIC_FIREBASE_NAMESPACE}/patients`,
      history: `${CLINIC_FIREBASE_NAMESPACE}/history`
    };

    const PATIENT_ID_PREFIX = 'TBL';
    const PATIENT_ID_WIDTH = 4;

    const lookupForm = document.getElementById('lookup-form');
    const patientIdNumberInput = document.getElementById('patient-id-number');
    const phoneNumberInput = document.getElementById('phone-number');
    const lookupSubmit = document.getElementById('lookup-submit');
    const formMessage = document.getElementById('form-message');
    const formMessageText = document.getElementById('form-message-text');
    const lookupPanel = document.getElementById('lookup-panel');
    const loadingPanel = document.getElementById('loading-panel');
    const resultsPanel = document.getElementById('results-panel');
    const resultsTitle = document.getElementById('results-title');
    const resultsSubtitle = document.getElementById('results-subtitle');
    const visitList = document.getElementById('visit-list');

    const otpForm = document.getElementById('otp-form');
    const otpCodeInput = document.getElementById('otp-code');
    const otpSubmit = document.getElementById('otp-submit');
    const otpMessage = document.getElementById('otp-message');
    const otpMessageText = document.getElementById('otp-message-text');
    const otpHint = document.getElementById('otp-hint');
    const otpBack = document.getElementById('otp-back');
    const logoutButton = document.getElementById('logout-button');

    const VERIFIED_PATIENT_STORAGE_KEY = 'lungsPortalVerifiedPatientId';

    const NO_MATCH_MESSAGE = "We couldn't find a match for that patient ID and phone number. Please check and try again.";

    const DEFAULT_COUNTRY_CODE = '+91';
    let confirmationResult = null;
    let recaptchaVerifier = null;
    let pendingPatientId = '';

    const LOCKOUT_STORAGE_KEY = 'lungsPortalLookupState';
    const MAX_ATTEMPTS_BEFORE_LOCKOUT = 5;
    const BASE_LOCKOUT_MS = 30 * 1000;
    const MAX_LOCKOUT_MS = 10 * 60 * 1000;

    function getLookupState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(LOCKOUT_STORAGE_KEY) || '{}');
        return {
          attempts: Number(parsed.attempts) || 0,
          lockoutLevel: Number(parsed.lockoutLevel) || 0,
          lockedUntil: Number(parsed.lockedUntil) || 0
        };
      } catch {
        return { attempts: 0, lockoutLevel: 0, lockedUntil: 0 };
      }
    }

    function setLookupState(state) {
      try {
        localStorage.setItem(LOCKOUT_STORAGE_KEY, JSON.stringify(state));
      } catch {
        // Ignore storage failures (private browsing, storage disabled, etc.).
      }
    }

    function recordFailedAttempt() {
      const state = getLookupState();
      state.attempts += 1;
      if (state.attempts >= MAX_ATTEMPTS_BEFORE_LOCKOUT) {
        state.lockoutLevel += 1;
        state.lockedUntil = Date.now() + Math.min(BASE_LOCKOUT_MS * (2 ** (state.lockoutLevel - 1)), MAX_LOCKOUT_MS);
        state.attempts = 0;
      }
      setLookupState(state);
    }

    function clearLookupState() {
      setLookupState({ attempts: 0, lockoutLevel: 0, lockedUntil: 0 });
    }

    function formatCooldownRemaining(ms) {
      const totalSeconds = Math.max(1, Math.ceil(ms / 1000));
      if (totalSeconds < 60) {
        return `${totalSeconds} second${totalSeconds === 1 ? '' : 's'}`;
      }
      const minutes = Math.ceil(totalSeconds / 60);
      return `${minutes} minute${minutes === 1 ? '' : 's'}`;
    }

    const ICON_CALENDAR = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3.5" y="5" width="17" height="16" rx="3" stroke="currentColor" stroke-width="2"/><path d="M3.5 10h17M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
    const ICON_VIEW = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7-10.5-7-10.5-7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>';
    const ICON_EMPTY = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 3h8l4 4v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M9 12h6M9 16h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';

    function getNormalizedPatientId(value) {
      return String(value || '').trim().toUpperCase().replace(/#@#\d+$/i, '');
    }

    function buildPatientIdFromNumber(rawNumber) {
      const digits = String(rawNumber || '').trim().replace(/\D/g, '');
      if (!digits) {
        return '';
      }
      return `${PATIENT_ID_PREFIX}${digits.padStart(PATIENT_ID_WIDTH, '0')}`;
    }

    function getPhoneDigits(value) {
      return String(value || '').trim().replace(/\D/g, '').replace(/^0+/, '');
    }

    function normalizePhoneForCompare(value) {
      const digits = getPhoneDigits(value);
      return digits.length > 10 ? digits.slice(-10) : digits;
    }

    function phoneToE164(value) {
      const digits = getPhoneDigits(value);
      if (!digits) {
        return '';
      }
      if (String(value || '').trim().startsWith('+')) {
        return `+${digits}`;
      }
      const local = digits.length > 10 ? digits.slice(-10) : digits;
      return `${DEFAULT_COUNTRY_CODE}${local}`;
    }

    function showFormMessage(text, type = 'error') {
      formMessageText.textContent = text;
      formMessage.classList.remove('is-error', 'is-info');
      formMessage.classList.add('is-visible', type === 'error' ? 'is-error' : 'is-info');
    }

    function clearFormMessage() {
      formMessageText.textContent = '';
      formMessage.classList.remove('is-visible', 'is-error', 'is-info');
    }

    function showOtpMessage(text, type = 'error') {
      otpMessageText.textContent = text;
      otpMessage.classList.remove('is-error', 'is-info');
      otpMessage.classList.add('is-visible', type === 'error' ? 'is-error' : 'is-info');
    }

    function clearOtpMessage() {
      otpMessageText.textContent = '';
      otpMessage.classList.remove('is-visible', 'is-error', 'is-info');
    }

    function formatDateDisplay(dateValue) {
      if (!dateValue) {
        return 'Date not recorded';
      }
      const parsed = new Date(dateValue);
      if (Number.isNaN(parsed.getTime())) {
        return String(dateValue);
      }
      return parsed.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function isPublicPdfUrl(value) {
      return /^(https?:|blob:|data:)/i.test(String(value || '').trim());
    }

    function normalizeStoragePath(value) {
      const rawValue = String(value || '').trim();
      if (!rawValue || isPublicPdfUrl(rawValue)) {
        return '';
      }
      try {
        return decodeURIComponent(rawValue).replace(/^\/+/, '');
      } catch {
        return rawValue.replace(/^\/+/, '');
      }
    }

    async function resolvePrescriptionPdfUrl(record) {
      const directUrl = String(record?.downloadURL || record?.downloadUrl || record?.pdfURL || record?.pdfUrl || '').trim();
      if (isPublicPdfUrl(directUrl)) {
        return directUrl;
      }
      const storagePath = normalizeStoragePath(
        record?.storagePath || record?.fullPath || record?.filePath || record?.pdfPath || record?.path || record?.prescriptionSaveId
      );
      if (!storagePath || !storage) {
        return '';
      }
      try {
        return await getDownloadURL(ref(storage, storagePath));
      } catch {
        return '';
      }
    }

    function getVisitSortValue(entry) {
      const value = entry.createdAtIso || entry.createdAt || entry.savedAt || entry.updatedAt || '';
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? 0 : parsed.getTime();
    }

    function renderVisitCard(entry, pdfUrl) {
      const card = document.createElement('div');
      card.className = 'visit-card';

      const main = document.createElement('div');
      main.className = 'visit-card-main';

      const dot = document.createElement('div');
      dot.className = 'visit-card-dot';
      dot.innerHTML = ICON_CALENDAR;
      main.appendChild(dot);

      const text = document.createElement('div');
      text.className = 'visit-card-text';

      const dateLine = document.createElement('div');
      dateLine.className = 'visit-card-date';
      dateLine.textContent = formatDateDisplay(entry.createdAtIso || entry.createdAt || entry.savedAt || entry.updatedAt);
      text.appendChild(dateLine);

      if (!pdfUrl) {
        const sub = document.createElement('div');
        sub.className = 'visit-card-sub';
        sub.textContent = 'PDF not available for this visit yet.';
        text.appendChild(sub);
      }

      main.appendChild(text);
      card.appendChild(main);

      if (pdfUrl) {
        const actions = document.createElement('div');
        actions.className = 'visit-card-actions';

        const viewLink = document.createElement('a');
        viewLink.href = pdfUrl;
        viewLink.target = '_blank';
        viewLink.rel = 'noopener';
        viewLink.className = 'is-primary';
        viewLink.innerHTML = `${ICON_VIEW}<span>View</span>`;
        actions.appendChild(viewLink);

        card.appendChild(actions);
      }

      return card;
    }

    async function renderVisits(entries) {
      visitList.innerHTML = '';

      if (!entries.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = `
          <div class="empty-state-icon">${ICON_EMPTY}</div>
          <p>No saved prescriptions were found for this patient yet.</p>
        `;
        visitList.appendChild(empty);
        return;
      }

      const sorted = [...entries].sort((a, b) => getVisitSortValue(b) - getVisitSortValue(a));

      for (const entry of sorted) {
        const pdfUrl = await resolvePrescriptionPdfUrl(entry);
        visitList.appendChild(renderVisitCard(entry, pdfUrl));
      }
    }

    function setLoading(isLoading) {
      loadingPanel.classList.toggle('is-visible', isLoading);
      lookupSubmit.classList.toggle('is-loading', isLoading);
      lookupSubmit.disabled = isLoading;
    }

    function setOtpLoading(isLoading) {
      otpSubmit.classList.toggle('is-loading', isLoading);
      otpSubmit.disabled = isLoading;
    }

    function resetRecaptcha() {
      try {
        recaptchaVerifier?.clear();
      } catch {
        // Ignore teardown failures from an already-cleared or never-rendered widget.
      }
      recaptchaVerifier = null;
      const container = document.getElementById('recaptcha-container');
      if (container) {
        container.innerHTML = '';
      }
    }

    function getRecaptchaVerifier() {
      if (!recaptchaVerifier) {
        recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'invisible' });
      }
      return recaptchaVerifier;
    }

    async function loadHistoryEntries(patientId) {
      const historyQuery = query(
        collection(db, FIREBASE_COLLECTIONS.history),
        where('patientId', '==', patientId),
        orderBy('createdAtIso', 'desc')
      );

      try {
        const snapshot = await getDocs(historyQuery);
        return snapshot.docs.map((docSnapshot) => ({ id: docSnapshot.id, ...docSnapshot.data() }));
      } catch {
        const fallbackSnapshot = await getDocs(
          query(collection(db, FIREBASE_COLLECTIONS.history), where('patientId', '==', patientId))
        );
        return fallbackSnapshot.docs.map((docSnapshot) => ({ id: docSnapshot.id, ...docSnapshot.data() }));
      }
    }

    async function showRecords(patientId) {
      const entries = await loadHistoryEntries(patientId);

      resultsTitle.textContent = `Visit history for ${patientId}`;
      resultsSubtitle.textContent = entries.length === 1 ? '1 visit found' : `${entries.length} visits found`;
      otpForm.classList.add('is-hidden');
      lookupPanel.classList.add('is-hidden');
      resultsPanel.classList.add('is-visible');
      document.body.classList.add('has-bottom-nav');
      document.querySelector('.bottom-nav')?.classList.add('is-visible');
      await renderVisits(entries);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function handleLookup(event) {
      event.preventDefault();
      clearFormMessage();
      resultsPanel.classList.remove('is-visible');

      const lookupState = getLookupState();
      const cooldownRemaining = lookupState.lockedUntil - Date.now();
      if (cooldownRemaining > 0) {
        showFormMessage(`Too many attempts. Please try again in ${formatCooldownRemaining(cooldownRemaining)}.`);
        return;
      }

      const patientId = getNormalizedPatientId(buildPatientIdFromNumber(patientIdNumberInput.value));
      const enteredPhone = normalizePhoneForCompare(phoneNumberInput.value);

      if (!patientId) {
        showFormMessage('Please enter the number from your patient ID.');
        return;
      }

      if (enteredPhone.length !== 10) {
        showFormMessage('Please enter a valid 10-digit phone number.');
        return;
      }

      if (!db || !auth) {
        showFormMessage('Records are not available right now. Please try again later.');
        return;
      }

      setLoading(true);

      try {
        const patientSnapshot = await getDoc(doc(db, FIREBASE_COLLECTIONS.patients, patientId));
        const patientData = patientSnapshot.data();
        const registeredPhone = normalizePhoneForCompare(patientData?.phone || patientData?.mobileNumber || '');

        if (!patientSnapshot.exists() || !registeredPhone || registeredPhone !== enteredPhone) {
          recordFailedAttempt();
          showFormMessage(NO_MATCH_MESSAGE);
          return;
        }

        const e164Phone = phoneToE164(phoneNumberInput.value);
        confirmationResult = await signInWithPhoneNumber(auth, e164Phone, getRecaptchaVerifier());
        pendingPatientId = patientId;

        clearFormMessage();
        otpHint.textContent = `Enter the code sent to ${e164Phone}.`;
        otpCodeInput.value = '';
        clearOtpMessage();
        lookupForm.classList.add('is-hidden');
        otpForm.classList.remove('is-hidden');
        otpCodeInput.focus();
      } catch (error) {
        resetRecaptcha();
        showFormMessage(error?.message || 'Something went wrong while sending the verification code. Please try again.');
      } finally {
        setLoading(false);
      }
    }

    async function handleOtpVerify(event) {
      event.preventDefault();
      clearOtpMessage();

      const code = otpCodeInput.value.trim();
      if (!/^\d{6}$/.test(code)) {
        showOtpMessage('Please enter the 6-digit code.');
        return;
      }

      if (!confirmationResult) {
        showOtpMessage('Your session expired. Please request a new code.');
        return;
      }

      setOtpLoading(true);

      try {
        await confirmationResult.confirm(code);
        clearLookupState();
        try {
          localStorage.setItem(VERIFIED_PATIENT_STORAGE_KEY, pendingPatientId);
        } catch {
          // Ignore storage failures (private browsing, storage disabled, etc.).
        }
        await showRecords(pendingPatientId);
      } catch (error) {
        showOtpMessage(error?.code === 'auth/invalid-verification-code'
          ? 'That code is incorrect. Please try again.'
          : (error?.message || 'Could not verify that code. Please try again.'));
      } finally {
        setOtpLoading(false);
      }
    }

    function resetToLookup() {
      confirmationResult = null;
      pendingPatientId = '';
      resetRecaptcha();
      otpForm.classList.add('is-hidden');
      lookupForm.classList.remove('is-hidden');
      lookupPanel.classList.remove('is-hidden');
      resultsPanel.classList.remove('is-visible');
      document.body.classList.remove('has-bottom-nav');
      document.querySelector('.bottom-nav')?.classList.remove('is-visible');
      clearFormMessage();
      clearOtpMessage();
    }

    async function handleLogout() {
      if (!window.confirm('Log out?')) {
        return;
      }
      try {
        await signOut(auth);
      } catch {
        // Ignore sign-out failures; we still clear local state below.
      }
      try {
        localStorage.removeItem(VERIFIED_PATIENT_STORAGE_KEY);
      } catch {
        // Ignore storage failures (private browsing, storage disabled, etc.).
      }
      resetToLookup();
      patientIdNumberInput.value = '';
      phoneNumberInput.value = '';
      lookupPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    lookupForm.addEventListener('submit', handleLookup);
    otpForm.addEventListener('submit', handleOtpVerify);
    otpBack.addEventListener('click', resetToLookup);
    logoutButton.addEventListener('click', handleLogout);

    let hasAutoRestored = false;
    if (auth) {
      onAuthStateChanged(auth, (user) => {
        if (hasAutoRestored) {
          return;
        }
        hasAutoRestored = true;

        if (!user) {
          return;
        }

        let storedPatientId = '';
        try {
          storedPatientId = localStorage.getItem(VERIFIED_PATIENT_STORAGE_KEY) || '';
        } catch {
          storedPatientId = '';
        }

        if (!storedPatientId) {
          return;
        }

        setLoading(true);
        showRecords(storedPatientId)
          .catch(() => resetToLookup())
          .finally(() => setLoading(false));
      });
    }
  </script>

  <script>
    const prescriptionsTab = document.querySelector('.bottom-nav-item.is-active');
    const appointmentTab = document.getElementById('appointment-tab');
    const navToast = document.getElementById('nav-toast');
    let navToastTimer = null;

    prescriptionsTab?.addEventListener('click', (event) => {
      event.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    appointmentTab?.addEventListener('click', () => {
      navToast.classList.add('is-visible');
      window.clearTimeout(navToastTimer);
      navToastTimer = window.setTimeout(() => {
        navToast.classList.remove('is-visible');
      }, 4000);
    });
  </script>
</body>
</html>
