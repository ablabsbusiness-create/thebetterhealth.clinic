  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef4ef;
      --panel: #fcfdf8;
      --panel-strong: #ffffff;
      --ink: #1b2a21;
      --muted: #607067;
      --faint: #8a988f;
      --line: #d7e2d9;
      --brand: #166534;
      --brand-soft: #dcfce7;
      --brand-strong: #14532d;
      --danger: #b91c1c;
      --danger-soft: #fef2f2;
      --danger-line: #fecaca;
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --shadow: 0 18px 45px rgba(22, 38, 29, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.14), transparent 28%),
        linear-gradient(180deg, #f5faf3 0%, #edf5ef 100%);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: rgba(248, 252, 248, 0.85);
      border-bottom: 1px solid rgba(215, 226, 217, 0.95);
      box-shadow: 0 8px 24px rgba(22, 38, 29, 0.05);
    }

    .topbar {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 20px;
      background: linear-gradient(135deg, #166534, #22c55e);
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 10px 22px rgba(22, 101, 52, 0.22);
    }

    .brand-copy strong {
      display: block;
      font-size: 15px;
      line-height: 1.1;
    }

    .brand-copy span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .nav-link {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      padding: 0 16px;
      border-radius: 999px;
      color: #5f6f66;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .nav-link:hover,
    .nav-link.active {
      background: var(--brand-soft);
      color: var(--brand-strong);
    }

    .menu-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      margin-left: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(22, 38, 29, 0.08);
    }

    .menu-toggle-inner {
      display: grid;
      gap: 4px;
    }

    .menu-toggle-bar {
      display: block;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-bar:nth-child(1) {
      transform: translateY(6px) rotate(45deg);
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-bar:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-bar:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg);
    }

    .page-shell {
      width: min(680px, calc(100% - 32px));
      margin: -10px auto 72px;
      display: grid;
      gap: 18px;
    }

    .page-intro {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin: 32px 0 4px;
    }

    .page-intro h1 {
      margin: 0;
      font-size: clamp(28px, 3.4vw, 40px);
      line-height: 1.05;
    }

    .page-meta {
      display: block;
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(215, 226, 217, 0.95);
      box-shadow: var(--shadow);
      color: inherit;
      text-decoration: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .page-meta:hover,
    .page-meta:focus-visible {
      border-color: rgba(22, 101, 52, 0.28);
      box-shadow: 0 18px 45px rgba(22, 101, 52, 0.12);
      transform: translateY(-1px);
      outline: none;
    }

    .page-meta strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
      line-height: 1.4;
    }

    .page-meta span {
      display: block;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      margin-top: 4px;
    }

    .page-meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 2px 14px;
      margin-top: 4px;
    }

    .page-meta-grid span {
      margin-top: 0;
    }

    .panel {
      padding: 28px;
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(215, 226, 217, 0.58);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 46px rgba(22, 38, 29, 0.08);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand-strong);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .panel h2 {
      margin: 0 0 4px;
      font-size: 20px;
    }

    .panel .panel-copy {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .vitals-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    label.vitals-field {
      display: grid;
      gap: 7px;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--muted);
    }

    input[type="number"] {
      width: 100%;
      min-height: 48px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--panel-strong);
      color: var(--ink);
      font: inherit;
      font-size: 15.5px;
      font-weight: 600;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    input::placeholder {
      color: var(--faint);
      font-weight: 500;
    }

    input:focus {
      outline: none;
      border-color: rgba(22, 101, 52, 0.55);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(22, 101, 52, 0.12);
      transform: translateY(-1px);
    }

    .form-actions {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    button {
      border: 0;
      border-radius: var(--radius-md);
      padding: 14px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      min-height: 50px;
      padding: 0 26px;
      background: linear-gradient(135deg, #166534, #15803d);
      color: #fff;
      font-size: 15px;
      box-shadow: 0 14px 28px rgba(22, 101, 52, 0.22);
    }

    .btn-primary:disabled {
      opacity: 0.65;
      cursor: default;
      transform: none;
    }

    .btn-secondary-link {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    .btn-secondary-link:hover {
      color: var(--brand-strong);
    }

    .form-message {
      margin: 16px 0 0;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      display: none;
    }

    .form-message.is-visible {
      display: block;
    }

    .form-message.is-error {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid var(--danger-line);
    }

    #page-meta-skeleton {
      display: none;
    }

    body.page-is-loading #page-meta-skeleton {
      display: block;
    }

    body.page-is-loading #page-meta-link,
    body.page-is-loading #vitals-panel {
      display: none;
    }

    .skeleton-card {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(215, 226, 217, 0.95);
      box-shadow: var(--shadow);
    }

    .skeleton-line,
    .skeleton-block {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      background: #e8f0eb;
    }

    .skeleton-line {
      height: 12px;
      margin-bottom: 8px;
    }

    .skeleton-block {
      height: 42px;
    }

    .skeleton-line::after,
    .skeleton-block::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.72), transparent);
      animation: skeleton-shimmer 1.2s ease-in-out infinite;
    }

    @keyframes skeleton-shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    @media (max-width: 640px) {
      .site-header {
        position: static;
      }

      .topbar {
        min-height: auto;
        padding: 12px 0;
        flex-wrap: wrap;
        gap: 12px;
        align-items: stretch;
      }

      .brand {
        width: auto;
        flex: 1 1 auto;
      }

      .menu-toggle {
        display: inline-flex;
        flex-shrink: 0;
      }

      .nav-links {
        width: 100%;
        order: 3;
        margin-left: 0;
        display: none;
        flex-direction: column;
        gap: 6px;
        padding: 10px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 14px 28px rgba(22, 38, 29, 0.08);
      }

      .nav-links.is-open {
        display: flex;
      }

      .nav-link {
        width: 100%;
        min-height: 42px;
        justify-content: center;
        padding: 10px 12px;
        border-radius: 14px;
      }

      .page-shell {
        margin: 16px auto 56px;
      }

      .page-intro {
        margin-top: 16px;
      }

      .page-intro h1 {
        font-size: clamp(24px, 8vw, 32px);
      }

      .panel {
        padding: 20px;
      }

      .vitals-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="page-is-loading">
  <header class="site-header">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">🩺</div>
        <div class="brand-copy">
          <strong>The Better Lungs Clinic</strong>
          <span>Vitals</span>
        </div>
      </div>

      <button
        class="menu-toggle"
        id="menu-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="primary-nav"
        aria-label="Toggle navigation"
      >
        <span class="menu-toggle-inner" aria-hidden="true">
          <span class="menu-toggle-bar"></span>
          <span class="menu-toggle-bar"></span>
          <span class="menu-toggle-bar"></span>
        </span>
      </button>

      <nav id="primary-nav" class="nav-links" aria-label="Primary">
        <a class="nav-link" href="/emr/lungs/index">Dashboard</a>
        <a class="nav-link active" href="/emr/lungs/search">Enter Clinic</a>
        <a class="nav-link" href="/emr/lungs/pending-approvals">Approvals</a>
        <a class="nav-link" href="/emr/lungs/settings">Settings</a>
      </nav>
    </div>
  </header>

  <div class="page-shell">
    <section class="page-intro">
      <div>
        <h1>Vitals</h1>
      </div>
    </section>

    <section id="page-meta-skeleton" class="skeleton-card" aria-label="Loading patient details">
      <div class="skeleton-line" style="width: 160px; height: 16px;"></div>
      <div class="skeleton-line" style="width: 90px;"></div>
      <div class="skeleton-block" style="height: 20px; margin-top: 10px;"></div>
    </section>

    <a id="page-meta-link" class="page-meta" href="/emr/lungs/search" aria-label="Edit patient details">
      <strong id="patient-name-display">Loading patient...</strong>
      <span id="patient-id-display"></span>
      <div class="page-meta-grid">
        <span id="page-meta-phone">Ph -</span>
        <span id="page-meta-height">Height -</span>
        <span id="page-meta-weight">Weight -</span>
      </div>
    </a>

    <section id="vitals-panel" class="panel">
      <span class="eyebrow">Step 1 · Vitals</span>
      <h2>Current vitals</h2>
      <p class="panel-copy">Enter the patient's current vitals, then continue to the prescription.</p>

      <form id="vitals-form">
        <div class="vitals-grid">
          <label class="vitals-field" for="spo2-input">
            SpO2 (%)
            <input id="spo2-input" name="spo2" type="number" inputmode="numeric" min="0" max="100" step="1" placeholder="e.g. 98">
          </label>
          <label class="vitals-field" for="systolic-input">
            Systolic BP (mmHg)
            <input id="systolic-input" name="systolic" type="number" inputmode="numeric" min="0" step="1" placeholder="e.g. 120">
          </label>
          <label class="vitals-field" for="diastolic-input">
            Diastolic BP (mmHg)
            <input id="diastolic-input" name="diastolic" type="number" inputmode="numeric" min="0" step="1" placeholder="e.g. 80">
          </label>
          <label class="vitals-field" for="weight-input">
            Weight (kg)
            <input id="weight-input" name="weight" type="number" inputmode="decimal" min="0" step="0.1" placeholder="e.g. 62">
          </label>
          <label class="vitals-field" for="height-input">
            Height (cm)
            <input id="height-input" name="height" type="number" inputmode="decimal" min="0" step="0.1" placeholder="e.g. 165">
          </label>
        </div>

        <p id="form-message" class="form-message" role="alert"></p>

        <div class="form-actions">
          <button id="continue-btn" class="btn-primary" type="submit">Continue</button>
        </div>
      </form>
    </section>
  </div>

  <script type="module">
    import { doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js';
    import { db } from './lib/firebase-init.js';

    const menuToggle = document.getElementById('menu-toggle');
    const primaryNav = document.getElementById('primary-nav');
    const navLinks = [...document.querySelectorAll('#primary-nav .nav-link')];

    function closeMobileMenu() {
      if (!menuToggle || !primaryNav) {
        return;
      }
      menuToggle.setAttribute('aria-expanded', 'false');
      primaryNav.classList.remove('is-open');
    }

    function toggleMobileMenu() {
      if (!menuToggle || !primaryNav) {
        return;
      }
      const isOpen = menuToggle.getAttribute('aria-expanded') === 'true';
      menuToggle.setAttribute('aria-expanded', String(!isOpen));
      primaryNav.classList.toggle('is-open', !isOpen);
    }

    if (menuToggle && primaryNav) {
      menuToggle.addEventListener('click', toggleMobileMenu);
      navLinks.forEach((link) => link.addEventListener('click', closeMobileMenu));
      window.addEventListener('resize', () => {
        if (window.innerWidth > 640) {
          closeMobileMenu();
        }
      });
    }

    const CLINIC_FIREBASE_NAMESPACE = 'clinics/lungs';
    const FIREBASE_COLLECTIONS = {
      patients: `${CLINIC_FIREBASE_NAMESPACE}/patients`
    };

    const patientNameDisplay = document.getElementById('patient-name-display');
    const patientIdDisplay = document.getElementById('patient-id-display');
    const pageMetaLink = document.getElementById('page-meta-link');
    const pageMetaPhone = document.getElementById('page-meta-phone');
    const pageMetaHeight = document.getElementById('page-meta-height');
    const pageMetaWeight = document.getElementById('page-meta-weight');
    const vitalsForm = document.getElementById('vitals-form');
    const continueBtn = document.getElementById('continue-btn');
    const formMessage = document.getElementById('form-message');
    const spo2Input = document.getElementById('spo2-input');
    const systolicInput = document.getElementById('systolic-input');
    const diastolicInput = document.getElementById('diastolic-input');
    const weightInput = document.getElementById('weight-input');
    const heightInput = document.getElementById('height-input');

    function getCurrentPatientId() {
      const params = new URLSearchParams(window.location.search);
      return (params.get('patientId') || '').trim().toUpperCase();
    }

    function formatPhoneDisplay(value, fallback = 'Phone not saved') {
      const digits = String(value || '').replace(/\D/g, '');
      if (!digits) {
        return fallback;
      }
      return digits.length >= 10 ? `+91 ${digits.slice(-10)}` : value;
    }

    function formatPageMetaMetric(value, unit) {
      const normalized = String(value || '').trim();
      return normalized ? `${normalized} ${unit}` : '-';
    }

    function getPatientEditUrl(id) {
      return id ? `/emr/lungs/search?patientId=${encodeURIComponent(id)}` : '/emr/lungs/search';
    }

    function showFormMessage(text) {
      formMessage.textContent = text;
      formMessage.classList.add('is-visible', 'is-error');
    }

    function clearFormMessage() {
      formMessage.textContent = '';
      formMessage.classList.remove('is-visible', 'is-error');
    }

    const patientId = getCurrentPatientId();

    if (!patientId) {
      window.location.href = '/emr/lungs/search';
    }

    if (pageMetaLink) {
      pageMetaLink.href = getPatientEditUrl(patientId);
    }

    async function loadPatient() {
      if (!db) {
        patientNameDisplay.textContent = patientId;
        patientIdDisplay.textContent = 'Records are not available right now.';
        document.body.classList.remove('page-is-loading');
        return;
      }

      try {
        const snapshot = await getDoc(doc(db, FIREBASE_COLLECTIONS.patients, patientId));
        if (!snapshot.exists()) {
          patientNameDisplay.textContent = patientId;
          patientIdDisplay.textContent = 'Patient not found.';
          return;
        }

        const patient = snapshot.data();
        const name = patient.patientName || patient.childName || patient.parentName || patientId;
        patientNameDisplay.textContent = name;
        patientIdDisplay.textContent = patientId;

        if (pageMetaPhone) pageMetaPhone.textContent = `Ph - ${formatPhoneDisplay(patient.phone || patient.mobileNumber, '')}`;
        if (pageMetaHeight) pageMetaHeight.textContent = `Height - ${formatPageMetaMetric(patient.height, 'cm')}`;
        if (pageMetaWeight) pageMetaWeight.textContent = `Weight - ${formatPageMetaMetric(patient.weight, 'kg')}`;

        spo2Input.value = patient.spo2 || '';
        systolicInput.value = patient.systolic || '';
        diastolicInput.value = patient.diastolic || '';
        weightInput.value = patient.weight || '';
        heightInput.value = patient.height || '';
      } catch (error) {
        patientNameDisplay.textContent = patientId;
        patientIdDisplay.textContent = 'Unable to load patient details.';
      } finally {
        document.body.classList.remove('page-is-loading');
      }
    }

    loadPatient();

    vitalsForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearFormMessage();

      if (!db) {
        showFormMessage('Records are not available right now. Please try again later.');
        return;
      }

      continueBtn.disabled = true;
      try {
        await setDoc(doc(db, FIREBASE_COLLECTIONS.patients, patientId), {
          spo2: spo2Input.value.trim(),
          systolic: systolicInput.value.trim(),
          diastolic: diastolicInput.value.trim(),
          weight: weightInput.value.trim(),
          height: heightInput.value.trim(),
          vitalsUpdatedAt: serverTimestamp()
        }, { merge: true });

        window.location.href = `/emr/lungs/prescription?patientId=${encodeURIComponent(patientId)}`;
      } catch (error) {
        showFormMessage(error?.message || 'Unable to save vitals. Please try again.');
        continueBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
