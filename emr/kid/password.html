  <style>
    :root {
      --bg: #eef4ef;
      --panel: rgba(255, 255, 255, 0.88);
      --ink: #1b2a21;
      --muted: #607067;
      --line: #d7e2d9;
      --brand: #166534;
      --brand-strong: #14532d;
      --brand-soft: #dcfce7;
      --danger: #b91c1c;
      --shadow: 0 24px 48px rgba(22, 38, 29, 0.1);
      --radius-lg: 28px;
      --radius-md: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.15), transparent 28%),
        linear-gradient(180deg, #f5faf3 0%, #edf5ef 100%);
    }

    .access-card {
      width: min(480px, 100%);
      padding: 28px;
      border: 1px solid rgba(215, 226, 217, 0.95);
      border-radius: var(--radius-lg);
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      color: #fff;
      font-size: 24px;
      background: linear-gradient(135deg, #166534, #22c55e);
      box-shadow: 0 14px 28px rgba(22, 101, 52, 0.22);
    }

    .brand-copy strong {
      display: block;
      font-size: 20px;
      line-height: 1.1;
    }

    .brand-copy span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 36px);
      line-height: 1.05;
    }

    .intro {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .pin-input {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.45em;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .pin-input:focus {
      outline: 2px solid rgba(34, 197, 94, 0.2);
      border-color: rgba(22, 101, 52, 0.38);
    }

    .helper {
      color: var(--muted);
      font-size: 13px;
    }

    .error {
      min-height: 20px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 600;
    }

    .submit-btn {
      min-height: 52px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, #166534, #22c55e);
      color: #fff;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 14px 26px rgba(22, 101, 52, 0.2);
    }

    .submit-btn:hover {
      filter: brightness(1.02);
    }

    .download-link {
      display: block;
      margin-top: 16px;
      color: var(--brand);
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
    }

    .download-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 520px) {
      body {
        padding: 16px;
      }

      .access-card {
        padding: 22px 18px;
      }

      .pin-input {
        font-size: 24px;
        letter-spacing: 0.3em;
      }
    }

<body>
  <main class="access-card">
    <div class="brand">
      <div class="brand-mark">+</div>
      <div class="brand-copy">
        <strong>The Better Health Clinic</strong>
        <span>Secure entry</span>
      </div>
    </div>

    <h1>Enter Password</h1>
    <p class="intro">Enter the clinic password to open the protected app.</p>

    <form id="password-form">
      <div>
        <label for="pin">Clinic password</label>
        <input id="pin" class="pin-input" name="pin" type="password" autocomplete="current-password" spellcheck="false">
        <div class="helper">Protected pages are now checked on the server before they open.</div>
      </div>

      <div id="error-message" class="error" aria-live="polite"></div>

      <button class="submit-btn" type="submit">Continue</button>
    </form>
    <a class="download-link" href="/emr/kid/download">Download / Install Kids EMR app</a>
  </main>

  <script>
    const ACCESS_PASSWORD = '3301';
    const ACCESS_COOKIE_NAME = 'clinic_session';
    const ACCESS_COOKIE_TTL_SECONDS = 60 * 60 * 12;
    const form = document.getElementById('password-form');
    const pinInput = document.getElementById('pin');
    const errorMessage = document.getElementById('error-message');
    const nextParam = new URLSearchParams(window.location.search).get('next');
    const fallbackPath = window.location.pathname.startsWith('/emr/kid/')
      ? '/emr/kid/index.html'
      : '/index';
    const loginEndpoint = window.location.pathname.startsWith('/emr/kid/')
      ? '/emr/kid/api/auth/login'
      : '/api/auth/login';
    const redirectPath = nextParam && nextParam.startsWith('/') && !nextParam.startsWith('//')
      ? nextParam
      : fallbackPath;

    function setClientSessionCookie() {
      document.cookie = `${ACCESS_COOKIE_NAME}=client-session; Max-Age=${ACCESS_COOKIE_TTL_SECONDS}; Path=/; SameSite=Strict`;
    }

    function tryClientSideLogin(password) {
      if (password !== ACCESS_PASSWORD) {
        errorMessage.textContent = 'Incorrect password. Please try again.';
        pinInput.select();
        return false;
      }

      setClientSessionCookie();
      window.location.replace(redirectPath);
      return true;
    }

    pinInput.addEventListener('input', () => {
      errorMessage.textContent = '';
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const password = pinInput.value;

      if (!password) {
        errorMessage.textContent = 'Enter the clinic password to continue.';
        pinInput.focus();
        return;
      }

      try {
        const response = await fetch(loginEndpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password })
        });

        const payload = await response.json().catch(() => ({}));

        if (response.status === 405 || response.status === 404) {
          tryClientSideLogin(password);
          return;
        }

        if (!response.ok) {
          errorMessage.textContent = payload.error || 'Incorrect password. Please try again.';
          pinInput.select();
          return;
        }

        window.location.replace(redirectPath);
      } catch (error) {
        if (tryClientSideLogin(password)) {
          return;
        }

        errorMessage.textContent = 'Unable to sign in right now. Please try again.';
      }
    });
  </script>
