<body>
  <main class="panel">
    <h1 id="title">Opening Prescription</h1>
    <p id="message">Please wait while we open the prescription.</p>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js';
    import { doc, getDoc, getFirestore } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js';
    const CLINIC_FIREBASE_NAMESPACE = 'clinics/kid';
    const FIREBASE_COLLECTIONS = {
      patients: `${CLINIC_FIREBASE_NAMESPACE}/patients`,
      pendingPatients: `${CLINIC_FIREBASE_NAMESPACE}/pendingPatients`,
      history: `${CLINIC_FIREBASE_NAMESPACE}/history`,
      prescription: `${CLINIC_FIREBASE_NAMESPACE}/prescription`
    };
    const CLINIC_STORAGE_PREFIX = CLINIC_FIREBASE_NAMESPACE;

    const title = document.getElementById('title');
    const message = document.getElementById('message');
    const params = new URLSearchParams(window.location.search);
    const prescriptionId = (params.get('i') || '').trim();

    const firebaseEnv = import.meta.env || {};
    const firebaseConfig = {
      apiKey: firebaseEnv.VITE_FIREBASE_API_KEY || 'AIzaSyAm-cUFMyTFSyw8KlFOCcBKQkTKApEr5oo',
      authDomain: firebaseEnv.VITE_FIREBASE_AUTH_DOMAIN || 'clinci-dr-gunda.firebaseapp.com',
      projectId: firebaseEnv.VITE_FIREBASE_PROJECT_ID || 'clinci-dr-gunda',
      storageBucket: firebaseEnv.VITE_FIREBASE_STORAGE_BUCKET || 'clinci-dr-gunda.firebasestorage.app',
      messagingSenderId: firebaseEnv.VITE_FIREBASE_MESSAGING_SENDER_ID || '1059959825609',
      appId: firebaseEnv.VITE_FIREBASE_APP_ID || '1:1059959825609:web:8201599754706ac4661918',
      measurementId: firebaseEnv.VITE_FIREBASE_MEASUREMENT_ID || 'G-4V5JMVW45E'
    };

    async function openPrescription() {
      if (!prescriptionId) {
        title.textContent = 'Prescription Not Found';
        message.textContent = 'This prescription link is missing an ID.';
        return;
      }

      const configured = Object.values(firebaseConfig).every(Boolean);
      if (!configured) {
        title.textContent = 'Prescription Link Not Ready';
        message.textContent = 'Prescription link cannot open because Cloud records are not configured.';
        return;
      }

      try {
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const snapshot = await getDoc(doc(db, FIREBASE_COLLECTIONS.history, prescriptionId));

        if (!snapshot.exists()) {
          title.textContent = 'Prescription Not Found';
          message.textContent = 'No saved prescription was found for this link.';
          return;
        }

        const record = snapshot.data();
        if (!record?.downloadURL) {
          title.textContent = 'Prescription Not Available';
          message.textContent = 'This prescription record does not have a PDF link.';
          return;
        }

        message.innerHTML = `Redirecting to prescription PDF. If it does not open automatically, <a href="${record.downloadURL}">tap here</a>.`;
        window.location.replace(record.downloadURL);
      } catch (error) {
        title.textContent = 'Unable To Open Prescription';
        message.textContent = error.message || 'Something went wrong while opening the prescription.';
      }
    }

    openPrescription();
  </script>
</body>
