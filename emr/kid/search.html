    function filterPatients() {
      const searchValue = searchInput.value.trim();
      let filteredPatients = allPatients;
      if (searchValue) {
        const normalizedSearchPatientId = getNormalizedPatientId(searchValue);
        const rankedPatients = allPatients
          .map((patient) => ({ patient, rank: getPatientSearchRank(patient, searchValue) }))
          .filter((entry) => entry.rank > 0);
        const exactPatientIdMatches = isExactPatientIdSearch(searchValue)
          ? rankedPatients.filter((entry) => getNormalizedPatientId(entry.patient.patientId) === normalizedSearchPatientId)
          : [];
        filteredPatients = (exactPatientIdMatches.length ? exactPatientIdMatches : rankedPatients)
          .sort((left, right) => right.rank - left.rank || sortByPatientName(left.patient, right.patient))
          .map((entry) => entry.patient);
      }

      if (selectedPatientId && !filteredPatients.some((patient) => formatMissing(patient.patientId, 'ID not saved') === selectedPatientId)) {
        selectedPatientId = '';
      }

      renderDoctorWorklist(filteredPatients, searchValue);
      setStatus(searchValue ? `Showing matches for "${searchValue}".` : 'Showing all patients.');
    }

    function openPrescriptionPreview(url, previewImageUrl = '') {
      if (!url && !previewImageUrl) {
        return;
      }

      pdfPreviewLink.href = url;
      pdfPreviewModal.classList.add('is-open');
      pdfPreviewModal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      if (url) {
        window.open(url, '_blank', 'noopener,noreferrer');
        closePrescriptionPreview();
        return;
      }
      pdfPreviewFrame.src = '';
      pdfPreviewClose.focus();
    }

    function closePrescriptionPreview() {
      pdfPreviewModal.classList.remove('is-open');
      pdfPreviewModal.setAttribute('aria-hidden', 'true');
      pdfPreviewFrame.src = '';
      pdfPreviewLink.href = '#';
      document.body.style.overflow = '';
    }

    resultsPanel.addEventListener('input', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) {
        return;
      }

      if (target.classList.contains('history-date-input')) {
        historyDateFilters[target.dataset.patientId] = target.value;
        historyPageIndexes[target.dataset.patientId] = 0;
        filterPatients();
      }

      if (target.matches('[data-worklist-date-picker]')) {
        selectedWorklistDate = target.value || getTodayIsoDate();
        selectedPatientId = '';
        filterPatients();
      }
    });

    resultsPanel.addEventListener('change', async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement) || !target.matches('[data-history-inline-edit]')) {
        return;
      }

      try {
        target.disabled = true;
        await saveMeasurementEntryEdit(
          target.dataset.patientId || '',
          target.dataset.historyEntry || '',
          target.dataset.historyMetric || '',
          target.value
        );
        filterPatients();
        setStatus('Vitals saved.', 'success');
      } catch (error) {
        setStatus(`Unable to save vitals: ${error.message}`, 'warning');
      } finally {
        target.disabled = false;
      }
    });

    resultsPanel.addEventListener('keydown', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) {
        return;
      }

      const selectedWorklistPatientId = target.closest('[data-select-worklist-patient]')?.getAttribute('data-select-worklist-patient');
      if (!selectedWorklistPatientId) {
        return;
      }

      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        selectedPatientId = selectedWorklistPatientId;
        filterPatients();
      }
    });

    resultsPanel.addEventListener('click', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) {
        return;
      }

      const patientId = target.getAttribute('data-clear-history-date');
      const toggleHistoryPatientId = target.getAttribute('data-toggle-history-all');
      const historyPageStep = target.getAttribute('data-history-page-step');
      const historyPagePatientId = target.getAttribute('data-patient-id');
      const openProfilePatientId = target.closest('[data-open-profile]')?.getAttribute('data-open-profile');
      const selectedWorklistPatientId = target.closest('[data-select-worklist-patient]')?.getAttribute('data-select-worklist-patient');
      const queuedPatientId = target.closest('[data-queue-patient]')?.getAttribute('data-queue-patient');
      const selectedMode = target.getAttribute('data-worklist-mode');
      const dateStep = target.getAttribute('data-worklist-date-step');
      const dateTrigger = target.closest('[data-worklist-date-trigger]');
      if (selectedMode) {
        selectedWorklistMode = selectedMode;
        selectedPatientId = '';
        filterPatients();
        return;
      }

      if (dateStep) {
        selectedWorklistDate = shiftIsoDate(selectedWorklistDate, Number(dateStep));
        selectedPatientId = '';
        filterPatients();
        return;
      }

      if (dateTrigger) {
        openWorklistDatePicker(dateTrigger);
        return;
      }

      if (selectedWorklistPatientId) {
        selectedPatientId = selectedWorklistPatientId;
        filterPatients();
        return;
      }

      if (queuedPatientId) {
        const patient = allPatients.find((entry) => formatMissing(entry.patientId, 'ID not saved') === queuedPatientId);
        if (patient && !patientHasSeenActivityOnDate(patient, selectedWorklistDate) && !patientIsQueuedOnDate(patient, selectedWorklistDate)) {
          addPatientToQueue(selectedWorklistDate, queuedPatientId);
        }
        filterPatients();
        return;
      }

      if (target.matches('[data-carousel-direction]')) {
        const carousel = target.closest('.prescription-carousel');
        const list = carousel?.querySelector('.prescription-list');
        const direction = Number(target.dataset.carouselDirection || 1);
        if (list) {
          list.scrollBy({
            left: list.clientWidth * direction,
            behavior: 'smooth'
          });
        }
        return;
      }

      if (target.closest('.prescription-preview-open-chip')) {
        return;
      }

      if (toggleHistoryPatientId) {
        historyShowAll[toggleHistoryPatientId] = !historyShowAll[toggleHistoryPatientId];
        historyPageIndexes[toggleHistoryPatientId] = 0;
        filterPatients();
        return;
      }

      if (historyPageStep && historyPagePatientId) {
        const nextPage = Math.max(0, Number(historyPageIndexes[historyPagePatientId] || 0) + Number(historyPageStep));
        historyPageIndexes[historyPagePatientId] = nextPage;
        historyShowAll[historyPagePatientId] = true;
        filterPatients();
        return;
      }

      const prescriptionCard = target.closest('.prescription-preview-card');
      const prescriptionUrl = prescriptionCard?.dataset.openPrescriptionUrl;
      if (prescriptionUrl && prescriptionCard) {
        openPrescriptionPreview(prescriptionUrl);
        return;
      }

      if (openProfilePatientId) {
        selectedPatientId = selectedPatientId === openProfilePatientId ? '' : openProfilePatientId;
        filterPatients();
        return;
      }

      if (!patientId) {
        return;
      }

      delete historyDateFilters[patientId];
      historyPageIndexes[patientId] = 0;
      historyShowAll[patientId] = true;
      filterPatients();
    });

    async function loadPatients() {
      const showedCache = showSearchCache();
      if (!showedCache) {
        renderSearchSkeleton();
      }
      if (!db) {
        if (!showedCache) {
          allPatients = [];
          allHistory = [];
          filterPatients();
        }
        setStatus('Cloud records are not configured, so no patient data is available.', 'warning');
        return;
      }

      if (navigator.onLine === false) {
        if (!showedCache) {
          allPatients = [];
          allHistory = [];
          filterPatients();
        }
        setStatus('Internet is disconnected, so live patient data is unavailable.', 'warning');
        return;
      }

      setStatus(showedCache ? 'Updating records...' : 'Loading patients...');

      try {
        const { snapshot, usedLegacy: usedLegacyPatients } = await getDocsWithLegacyFallback(FIREBASE_COLLECTIONS.patients, 'patients');
        const patientRecords = snapshot.docs.map((docSnapshot) => ({
          id: docSnapshot.id,
          ...docSnapshot.data()
        })).filter((patient) => !usedLegacyPatients || recordBelongsToCurrentClinic(patient));

        allHistory = getMergedHistoryEntries([], patientRecords);
        historyLoaded = false;
        rebuildHistoryIndexes();
        allPatients = buildPatientsFromRecords(patientRecords, allHistory);
        saveSearchCache();

        if (allPatients.length === 0) {
          updateCount(0);
          renderPlaceholder('No patients have been saved yet.');
          setStatus('No patients were found in online records.');
        } else {
          filterPatients();
          setStatus(showedCache ? 'Records updated. Loading visit history...' : 'Patients loaded. Loading visit history...');
        }

        getDocsWithLegacyFallback(FIREBASE_COLLECTIONS.history, 'history')
          .then(({ snapshot: historySnapshot, usedLegacy: usedLegacyHistory }) => {
        const remoteHistory = historySnapshot.docs
          .map((docSnapshot) => normalizePrescriptionEntry({
            id: docSnapshot.id,
            ...docSnapshot.data()
          }))
          .filter((entry) => !usedLegacyHistory || recordBelongsToCurrentClinic(entry))
          .filter(Boolean);
        if (snapshot.empty && remoteHistory.length === 0) {
          clearLocalPrescriptionEntries();
        }

        allHistory = getMergedHistoryEntries(remoteHistory, patientRecords);
        historyLoaded = true;
        rebuildHistoryIndexes();
        allPatients = buildPatientsFromRecords(patientRecords, allHistory);
        saveSearchCache();

        if (allPatients.length === 0) {
          updateCount(0);
          renderPlaceholder('No patients have been saved yet.');
          setStatus('No patients were found in online records.');
          return;
        }

        filterPatients();
        if (usedLegacyPatients || usedLegacyHistory) {
          setStatus('Showing patients from older shared records. Ask support to finish separating clinic records.', 'warning');
          return;
        }
        setStatus('Showing all patients.');
          })
          .catch((error) => {
            console.warn(`Unable to load history records: ${error.message}`);
            setStatus('Patients loaded. Visit history will appear when the connection allows it.', 'warning');
          });
      } catch (error) {
        if (!showedCache) {
          allPatients = [];
          allHistory = [];
          historyLoaded = false;
          filterPatients();
        }
        setStatus(`Unable to load patient records: ${error.message}.`, 'warning');
      }
    }

    window.addEventListener('online', () => {
      setStatus('Connection restored. Reloading patients...', 'ready');
      loadPatients();
    });

    window.addEventListener('offline', () => {
      setStatus('Internet is disconnected. Search results may be limited to locally available data.', 'warning');
    });

    function clearSearch() {
      searchInput.value = '';
      updateNewPatientButton();
      filterPatients();
    }

    function closeMobileMenu() {
      if (!menuToggle || !primaryNav) {
        return;
      }

      menuToggle.setAttribute('aria-expanded', 'false');
      primaryNav.classList.remove('is-open');
    }

    function toggleMobileMenu() {
      if (!menuToggle || !primaryNav) {
        return;
      }

      const isOpen = menuToggle.getAttribute('aria-expanded') === 'true';
      menuToggle.setAttribute('aria-expanded', String(!isOpen));
      primaryNav.classList.toggle('is-open', !isOpen);
    }

    searchInput.addEventListener('input', () => {
      updateNewPatientButton();
      window.clearTimeout(searchInputTimer);
      searchInputTimer = window.setTimeout(filterPatients, SEARCH_INPUT_DEBOUNCE_MS);
    });
    clearBtn.addEventListener('click', clearSearch);
    updateNewPatientButton();
    pdfPreviewClose.addEventListener('click', closePrescriptionPreview);
    pdfPreviewModal.addEventListener('click', (event) => {
      if (event.target === pdfPreviewModal) {
        closePrescriptionPreview();
      }
    });
    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && pdfPreviewModal.classList.contains('is-open')) {
        closePrescriptionPreview();
      }
    });
    if (menuToggle && primaryNav) {
      menuToggle.addEventListener('click', toggleMobileMenu);
      navLinks.forEach((link) => link.addEventListener('click', closeMobileMenu));
      window.addEventListener('resize', () => {
        if (window.innerWidth > 820) {
          closeMobileMenu();
        }
      });
    }

    loadPatients();
  </script>
</body>
</html>
