  <style>
    :root {
      --bg: #eef4ef;
      --panel: #fcfdf8;
      --panel-strong: #ffffff;
      --ink: #1b2a21;
      --muted: #607067;
      --line: #d7e2d9;
      --brand: #166534;
      --brand-soft: #dcfce7;
      --brand-strong: #14532d;
      --accent: #b45309;
      --accent-soft: #ffedd5;
      --shadow: 0 18px 45px rgba(22, 38, 29, 0.08);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--ink);
      background: #f4f7f5;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: rgba(248, 252, 248, 0.85);
      border-bottom: 1px solid rgba(215, 226, 217, 0.95);
      box-shadow: 0 8px 24px rgba(22, 38, 29, 0.05);
    }

    .topbar {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 20px;
      background: linear-gradient(135deg, #166534, #22c55e);
      color: #fff;
      box-shadow: 0 10px 22px rgba(22, 101, 52, 0.22);
    }

    .brand-copy strong {
      display: block;
      font-size: 15px;
      line-height: 1.1;
    }

    .brand-copy span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      min-width: 0;
    }

    .nav-link {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 999px;
      color: #5f6f66;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      background: #dcfce7;
      color: #14532d;
    }
    .menu-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      margin-left: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(22, 38, 29, 0.08);
    }

    .menu-toggle-inner {
      display: grid;
      gap: 4px;
    }

    .menu-toggle-bar {
      display: block;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-bar:nth-child(1) {
      transform: translateY(6px) rotate(45deg);
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-bar:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle[aria-expanded="true"] .menu-toggle-bar:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg);
    }

    .topbar-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: #f8fbf9;
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.12);
    }

    .page-shell {
      width: 100%;
      margin: 0;
    }

    .page-intro {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    .page-intro h1 {
      margin: 10px 0 6px;
      font-size: clamp(28px, 3.4vw, 40px);
      line-height: 1.05;
    }

    .page-intro p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      max-width: 64ch;
    }

    .page-meta {
      padding: 14px 16px;
      min-width: 220px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(215, 226, 217, 0.95);
      box-shadow: var(--shadow);
    }

    .page-meta strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .page-meta span {
      color: var(--muted);
      font-size: 13px;
    }

    .search-shell {
      min-height: calc(100vh - 72px);
      background: #f4f7f5;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
    }

    .search-head {
      display: none;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .search-head h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .search-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .count-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 999px;
      background: var(--brand-soft);
      color: var(--brand-strong);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 140px 160px;
      gap: 10px;
      padding: 8px;
      margin: 0;
      background: #ffffff;
      border-bottom: 1px solid #dfe6e1;
    }

    .search-row input {
      width: 100%;
      min-height: 40px;
      padding: 0 12px;
      border-radius: 4px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      font: inherit;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .search-row input:focus {
      border-color: rgba(22, 101, 52, 0.5);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
      background: #fff;
    }

    button {
      width: 100%;
      min-height: 40px;
      border: none;
      border-radius: 4px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      color: #fff;
      background: #15803d;
      box-shadow: none;
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 4px;
      border: 1px solid #cfe0d4;
      background: #f8fbf9;
      color: var(--brand-strong);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .btn-secondary:hover {
      transform: translateY(-1px);
      background: var(--brand-soft);
    }

    .status-note {
      display: none;
      margin: 0;
      padding: 12px 14px;
      border-radius: 0;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #f8fbf9;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .status-note.visible {
      display: block;
    }

    .status-note.warning {
      background: #fff7ed;
      border-color: #fed7aa;
      color: #9a3412;
    }

    .skeleton-shell {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      min-height: calc(100vh - 121px);
      background: #fff;
      overflow: hidden;
    }

    .skeleton-sidebar,
    .skeleton-main {
      padding: 18px;
    }

    .skeleton-sidebar {
      border-right: 1px solid var(--line);
      background: #fbfdfb;
    }

    .skeleton-main {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .skeleton-tabs,
    .skeleton-pills,
    .skeleton-grid {
      display: grid;
      gap: 10px;
    }

    .skeleton-tabs {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 18px;
    }

    .skeleton-pills {
      grid-template-columns: repeat(2, minmax(96px, 112px));
    }

    .skeleton-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .skeleton-item,
    .skeleton-card {
      padding: 14px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .skeleton-item + .skeleton-item {
      margin-top: 10px;
    }

    .skeleton-tab,
    .skeleton-pill,
    .skeleton-line,
    .skeleton-block {
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      background: #edf3ef;
    }

    .skeleton-tab,
    .skeleton-pill {
      height: 34px;
    }

    .skeleton-line {
      height: 12px;
      margin-bottom: 10px;
    }

    .skeleton-block {
      min-height: 74px;
    }

    .skeleton-tab::after,
    .skeleton-pill::after,
    .skeleton-line::after,
    .skeleton-block::after {
      content: '';
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.74), transparent);
      animation: skeleton-shimmer 1.35s ease-in-out infinite;
    }

    @keyframes skeleton-shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    .results-dashboard {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 0;
      align-items: stretch;
      min-height: calc(100vh - 121px);
    }

    .worklist-sidebar,
    .worklist-main {
      border-radius: 0;
      border: 0;
      background: #ffffff;
      box-shadow: none;
    }

    .worklist-sidebar {
      padding: 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 0;
      max-height: calc(100vh - 121px);
      position: sticky;
      top: 72px;
      overflow: hidden;
      border-right: 1px solid #dfe6e1;
    }

    .worklist-datebar {
      display: grid;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid #dfe6e1;
    }

    .worklist-date-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .worklist-date-nav {
      width: 36px;
      min-width: 36px;
      min-height: 36px;
      border-radius: 4px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      color: var(--brand-strong);
      font-size: 22px;
      line-height: 1;
      box-shadow: none;
    }

    .worklist-date-pill {
      flex: 1;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      border-radius: 4px;
      border: 1px solid #dfe6e1;
      background: #f8fbf9;
      color: var(--brand-strong);
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      box-shadow: none;
      width: 100%;
    }

    .worklist-date-pill:hover {
      background: #f0f6f2;
    }

    .worklist-date-pill:focus-visible {
      outline: 3px solid rgba(34, 197, 94, 0.16);
      outline-offset: 2px;
    }

    .worklist-date-picker {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    .worklist-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
      border-bottom: 1px solid #dfe6e1;
    }

    .worklist-tab {
      min-height: 44px;
      border-radius: 0;
      border: 0;
      border-right: 1px solid #dfe6e1;
      background: #ffffff;
      color: var(--muted);
      box-shadow: none;
      font-size: 13px;
      font-weight: 700;
    }

    .worklist-tab.is-active {
      background: #eef6ff;
      border-bottom: 2px solid #1a73e8;
      color: var(--brand-strong);
    }

    .worklist-summary {
      display: none;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .worklist-summary-card {
      padding: 12px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fbfdfb;
    }

    .worklist-summary-card span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .worklist-summary-card strong {
      display: block;
      margin-top: 6px;
      font-size: 24px;
      line-height: 1;
      color: var(--brand-strong);
    }

    .worklist-summary-card small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .worklist-list {
      min-height: 0;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 0;
      padding-right: 0;
    }

    .worklist-empty {
      padding: 16px;
      border-radius: 0;
      border: 0;
      background: #f8fbf9;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .worklist-item {
      width: 100%;
      border: 0;
      border-bottom: 1px solid #e4e9e5;
      border-radius: 0;
      background: #ffffff;
      color: var(--ink);
      box-shadow: none;
      display: grid;
      gap: 0;
    }

    .worklist-item.is-active {
      border-color: #1a73e8;
      background: linear-gradient(180deg, #f4f8ff 0%, #eef5ff 100%);
      box-shadow: inset 4px 0 0 #1a73e8;
    }

    .worklist-item-main {
      width: 100%;
      min-height: 0;
      padding: 14px 16px 15px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      box-shadow: none;
      display: grid;
      gap: 10px;
      cursor: pointer;
    }

    .worklist-item-main:focus-visible {
      outline: 2px solid rgba(26, 115, 232, 0.28);
      outline-offset: -2px;
    }

    .worklist-item-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .worklist-item-ident {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .worklist-item-title {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .worklist-item-name {
      margin: 0;
      font-size: 16px;
      line-height: 1.1;
    }

    .worklist-item-meta,
    .worklist-item-sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .worklist-item-sub {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .worklist-item-sub span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .worklist-item-sub span + span::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: #b9c7bd;
      display: inline-block;
    }

    .worklist-item-phone {
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.1;
      text-align: right;
      white-space: nowrap;
    }

    .worklist-item-actions {
      display: grid;
      justify-items: end;
      gap: 8px;
      flex-shrink: 0;
    }

    .worklist-item-queue-btn {
      width: auto;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid #cfe0ff;
      background: #eef5ff;
      color: #1a56b3;
      box-shadow: none;
      font-size: 11px;
      font-weight: 700;
    }

    .worklist-item-queue-btn:hover {
      transform: none;
      background: #e5f0ff;
    }

    .worklist-item-queue-btn.is-added {
      border-color: #cdebd7;
      background: #e9f7ef;
      color: #166534;
    }

    .worklist-item-queue-btn.is-seen {
      border-color: #dfe6e1;
      background: #f4f7f5;
      color: #607067;
      cursor: default;
    }

    .worklist-item-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .worklist-main {
      padding: 16px;
      display: grid;
      gap: 16px;
      min-height: calc(100vh - 121px);
      background: #f4f7f5;
    }

    .doctor-main-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
      padding: 4px;
    }

    .doctor-main-head h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1;
    }

    .doctor-main-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .doctor-patient-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .doctor-meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8fbf9;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .doctor-patient-meta .continue-link {
      min-height: 42px;
      border-radius: 12px;
      padding: 0 16px;
      font-size: 14px;
      box-shadow: 0 10px 20px rgba(21, 128, 61, 0.16);
    }

    .doctor-detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
      gap: 16px;
      align-items: start;
    }

    .doctor-detail-grid.is-single {
      grid-template-columns: minmax(0, 1fr);
    }

    .doctor-detail-stack {
      display: grid;
      gap: 16px;
    }

    .doctor-card {
      border-radius: 0;
      border: 1px solid #dfe6e1;
      background: #ffffff;
      box-shadow: none;
      overflow: hidden;
    }

    .doctor-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid #e9f0ea;
    }

    .doctor-card-head h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
    }

    .doctor-card-body {
      padding: 16px 18px 18px;
    }

    .doctor-card-body.is-compact {
      padding-top: 12px;
    }

    .doctor-visit-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .doctor-visit-metric {
      padding: 12px;
      border-radius: 4px;
      background: #f8fbf9;
      border: 1px solid #e3ece5;
    }

    .doctor-visit-metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .doctor-visit-metric strong {
      display: block;
      margin-top: 6px;
      font-size: 22px;
      line-height: 1;
      color: var(--ink);
    }

    .doctor-card-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .doctor-card .history-filter-row label,
    .doctor-card .record-table .metric-name,
    .doctor-card .record-table th,
    .doctor-card .record-table td,
    .doctor-card .table-empty {
      color: var(--ink);
    }

    .doctor-card .history-filter-row input[type="date"] {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
    }

    .doctor-card .filter-clear-btn {
      background: #ffffff;
      border: 1px solid var(--line);
      color: var(--brand-strong);
    }

    .doctor-card .record-table thead th {
      color: var(--brand-strong);
    }

    .doctor-card .record-table .metric-unit {
      color: var(--muted);
    }

    .doctor-card .record-table .metric-value,
    .doctor-card .record-table .table-empty {
      background: rgba(22, 101, 52, 0.06);
      border: 1px solid rgba(22, 101, 52, 0.1);
    }

    .doctor-card .prescription-list {
      max-height: none;
    }

    .doctor-card .prescription-preview-surface {
      min-height: 0;
      height: 100%;
      border-radius: 0;
    }

    .doctor-card .prescription-preview-frame,
    .doctor-card .prescription-preview-embed {
      min-height: 0;
      height: 100%;
    }

    .doctor-empty-state {
      min-height: 420px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 28px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .results-list {
      display: grid;
      gap: 12px;
    }

    .result-card {
      padding: 14px;
      border-radius: 22px;
      border: 1px solid rgba(215, 226, 217, 0.98);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(247, 251, 247, 0.96));
      box-shadow:
        0 16px 38px rgba(22, 38, 29, 0.07),
        inset 0 1px 0 rgba(255, 255, 255, 0.92);
    }

    .result-top {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(0, 0.95fr) 170px;
      gap: 12px;
      align-items: start;
      margin-bottom: 14px;
    }

    .result-meta {
      padding: 14px 14px 12px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      min-height: 92px;
    }

    .result-meta--child {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.2), transparent 32%),
        linear-gradient(135deg, rgba(22, 101, 52, 0.12), rgba(255, 255, 255, 0.96) 58%);
      border-color: rgba(22, 101, 52, 0.18);
    }

    .profile-trigger {
      width: 100%;
      padding: 0;
      border: 0;
      text-align: left;
      font: inherit;
      color: inherit;
      cursor: pointer;
      background: transparent;
    }

    .profile-trigger:focus-visible {
      outline: 3px solid rgba(22, 101, 52, 0.2);
      outline-offset: 4px;
      border-radius: 18px;
    }

    .result-meta--child::after {
      content: '';
      position: absolute;
      top: -26px;
      right: -24px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.46), rgba(255,255,255,0));
      pointer-events: none;
    }

    .result-meta-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .child-meta-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .child-avatar {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #166534, #22c55e);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(22, 101, 52, 0.18);
      flex-shrink: 0;
    }

    .result-meta strong {
      display: block;
      margin-top: 6px;
      font-size: clamp(20px, 3vw, 28px);
      line-height: 1.05;
    }

    .result-meta--child strong {
      margin-top: 0;
      font-size: clamp(22px, 3.1vw, 30px);
      line-height: 1;
    }

    .result-meta small {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .patient-id-badge {
      display: inline-flex;
      align-items: center;
      margin-top: 0;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(22, 101, 52, 0.1);
      color: var(--brand-strong);
      border: 1px solid rgba(22, 101, 52, 0.14);
      font-size: 11px;
      font-weight: 700;
    }

    .profile-action-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .profile-toggle-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(22, 101, 52, 0.14);
      color: var(--brand-strong);
      font-size: 11px;
      font-weight: 700;
    }

    .continue-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 92px;
      border-radius: 18px;
      padding: 14px;
      text-decoration: none;
      color: #fff;
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 700;
      background: linear-gradient(135deg, #166534, #0f3f22);
      box-shadow: 0 12px 24px rgba(21, 128, 61, 0.18);
      text-align: center;
    }

    .result-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.85fr) minmax(260px, 0.9fr);
      gap: 16px;
    }

    .result-layout.is-hidden {
      display: none;
    }

    .info-panel,
    .history-panel {
      min-height: 260px;
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(135deg, rgba(18, 23, 20, 0.92), rgba(41, 49, 44, 0.96)),
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.22), transparent 38%);
      color: #fff;
    }

    .history-panel .panel-content {
      min-height: 640px;
      padding: 0;
      gap: 0;
    }

    .history-panel .panel-content h3 {
      display: none;
    }

    .info-panel::before,
    .history-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 28px);
      opacity: 0.5;
      pointer-events: none;
    }

    .panel-content {
      position: relative;
      z-index: 1;
      height: 100%;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }

    .panel-content h3 {
      margin: 0;
      font-size: clamp(26px, 3.2vw, 34px);
      line-height: 1.15;
    }

    .panel-content p {
      margin: 0;
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.86);
    }

    .record-table-wrap {
      overflow-x: auto;
      margin-top: 2px;
    }

    .history-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .history-pager {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .history-page-btn {
      width: 34px;
      min-height: 34px;
      padding: 0;
      border-radius: 10px;
      box-shadow: none;
      font-size: 16px;
      line-height: 1;
    }

    .history-page-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .history-page-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }

    .record-table {
      width: 100%;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 4px;
    }

    .record-table th,
    .record-table td {
      padding: 8px 8px;
      text-align: center;
      vertical-align: middle;
      font-size: 12px;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.9);
    }

    .record-table thead th {
      padding-bottom: 4px;
      color: rgba(255, 255, 255, 0.76);
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .record-table .metric-name {
      min-width: 70px;
      padding-left: 0;
      text-align: left;
      color: #fff;
      font-weight: 700;
      white-space: nowrap;
    }

    .record-table .metric-unit {
      min-width: 34px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
    }

    .record-table .metric-value {
      min-width: 52px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-weight: 600;
    }

    .record-table-input {
      width: 100%;
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid #d6e3d8;
      border-radius: 10px;
      background: #fcfefc;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      text-align: left;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .record-table-input:hover {
      border-color: #c8d9cc;
      background: #ffffff;
    }

    .record-table-input:focus {
      outline: none;
      border-color: rgba(22, 101, 52, 0.38);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.10);
    }

    .record-table-input::placeholder {
      color: #91a396;
      font-weight: 500;
    }

    .record-table .table-empty {
      text-align: left;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .history-filter-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 2px;
    }

    .history-filter-row label {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.84);
    }

    .history-filter-row input[type="date"] {
      width: auto;
      min-width: 180px;
      min-height: 42px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      font: inherit;
    }

    .filter-clear-btn {
      width: auto;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: #fff;
      box-shadow: none;
      font-size: 13px;
    }

    .filter-clear-btn.is-active {
      background: var(--brand-strong);
      border-color: var(--brand-strong);
      color: #ffffff;
    }

    .table-empty {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.82);
    }

    .prescription-list {
      display: flex;
      gap: 0;
      width: 100%;
      flex: 1;
      min-height: 0;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
    }

    .prescription-list::-webkit-scrollbar {
      display: none;
    }

    .prescription-carousel {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 0;
      display: flex;
    }

    .carousel-arrow {
      position: absolute;
      top: 50%;
      z-index: 3;
      width: 24px;
      height: 24px;
      transform: translateY(-50%);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: #102217;
      font: inherit;
      font-size: 16px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(5, 18, 11, 0.18);
    }

    .carousel-arrow:hover {
      background: #fff;
    }

    .carousel-arrow-left {
      left: 6px;
    }

    .carousel-arrow-right {
      right: 6px;
    }

    .prescription-preview-entry {
      display: grid;
      grid-template-rows: auto minmax(0, auto) auto;
      gap: 8px;
      flex: 0 0 100%;
      min-height: 0;
      scroll-snap-align: start;
    }

    .prescription-preview-card {
      position: relative;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      aspect-ratio: 210 / 297;
      padding: 0;
      border-radius: 0;
      border: 0;
      background: transparent;
      color: #fff;
      min-height: 0;
      cursor: default;
    }

    .prescription-date {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: #102217;
      font-size: 15px;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(5, 18, 11, 0.16);
      width: 100%;
      max-width: 100%;
    }

    .prescription-preview-surface {
      position: relative;
      width: 100%;
      min-height: 0;
      height: 100%;
      aspect-ratio: 210 / 297;
      border-radius: 0;
      background: rgba(255, 255, 255, 0.92);
      overflow: hidden;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: inset 0 0 0 1px rgba(22, 38, 29, 0.06);
    }

    .prescription-preview-surface.is-tap-preview {
      min-height: 0;
      height: 100%;
      background: linear-gradient(180deg, #ffffff, #f5faf6);
    }

    .prescription-preview-frame {
      width: 100%;
      height: 100%;
      min-height: 0;
      object-fit: contain;
      object-position: top center;
      background: rgba(255, 255, 255, 0.92);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .prescription-preview-frame.is-ready {
      opacity: 1;
    }

    .prescription-preview-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      text-align: center;
      color: #415146;
      font-size: 13px;
      line-height: 1.6;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.95), rgba(244, 248, 245, 0.96));
    }

    .prescription-preview-placeholder[hidden] {
      display: none !important;
    }

    .prescription-preview-placeholder.is-error {
      color: #8a3b12;
      background: linear-gradient(180deg, #fff8f2, #fff0e6);
    }

    .prescription-preview-placeholder.is-static {
      position: static;
      width: 100%;
      height: 100%;
      color: #102217;
      font-size: 15px;
      font-weight: 800;
      background: transparent;
    }

    .prescription-preview-embed {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .prescription-preview-embed.is-ready {
      opacity: 1;
    }

    .prescription-preview-open-chip {
      position: static;
      justify-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      background: #102217;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 22px rgba(5, 18, 11, 0.16);
    }

    .pdf-preview-modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(11, 22, 16, 0.68);
      backdrop-filter: blur(10px);
    }

    .pdf-preview-modal.is-open {
      display: flex;
    }

    .pdf-preview-dialog {
      width: min(980px, 100%);
      height: min(92vh, 980px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      border-radius: 24px;
      background: #f8fbf9;
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: 0 30px 80px rgba(11, 22, 16, 0.28);
    }

    .pdf-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px 12px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
    }

    .pdf-preview-head strong {
      font-size: 15px;
    }

    .pdf-preview-close {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(22, 38, 29, 0.08);
    }

    .pdf-preview-body {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 16px;
      background: linear-gradient(180deg, #f8fbf9, #eef4f0);
    }

    .pdf-preview-viewer {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 18px 40px rgba(22, 38, 29, 0.08);
    }

    .pdf-preview-fallback {
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
    }

    .pdf-preview-fallback a {
      color: var(--brand-strong);
      font-weight: 800;
    }

    .placeholder {
      padding: 28px;
      border-radius: 20px;
      border: 1px dashed var(--line);
      background: rgba(248, 251, 249, 0.88);
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
    }

    .placeholder strong {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font-size: 18px;
    }

    .placeholder p {
      margin: 0;
    }

    .placeholder-actions {
      margin-top: 16px;
      display: flex;
      justify-content: center;
    }

    .placeholder-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 12px;
      background: var(--brand);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(21, 128, 61, 0.16);
    }

    .mono {
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    @media (max-width: 960px) {
      .results-dashboard,
      .skeleton-shell,
      .doctor-detail-grid,
      .result-top,
      .result-layout,
      .search-row {
        grid-template-columns: 1fr;
      }

      .skeleton-sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .skeleton-grid {
        grid-template-columns: 1fr;
      }

      .worklist-sidebar {
        position: static;
        max-height: none;
      }

      .worklist-list {
        max-height: 380px;
      }

      .continue-link {
        min-height: 72px;
      }

      .doctor-patient-meta .continue-link {
        min-height: 42px;
      }
    }

    @media (max-width: 820px) {
      .topbar {
        position: relative;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        padding: 12px 0;
      }

      .topbar-actions {
        margin-left: 0;
        width: 100%;
        order: 4;
      }

      .menu-toggle {
        display: inline-flex;
      }

      .nav-links {
        display: none;
        width: 100%;
        margin: 0;
        padding: 14px;
        border-radius: 20px;
        border: 1px solid rgba(215, 226, 217, 0.95);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 16px 36px rgba(22, 38, 29, 0.12);
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .nav-links.is-open {
        display: flex;
      }

      .nav-link {
        justify-content: flex-start;
        width: 100%;
        min-height: 44px;
        border-radius: 14px;
      }

      .page-intro {
        flex-direction: column;
        align-items: flex-start;

    function getExplicitQueueIdsForDate(dateValue) {
      const queueState = getQueueState();
      const entries = Array.isArray(queueState[dateValue]) ? queueState[dateValue] : [];

      const normalizedPatientId = String(patientId || '').trim();
      if (!dateValue || !normalizedPatientId) {
        return;

      const queueState = getQueueState();
      const nextEntries = new Set(getExplicitQueueIdsForDate(dateValue));
      nextEntries.add(normalizedPatientId);
      queueState[dateValue] = [...nextEntries];
      saveQueueState(queueState);
    }

    function removePatientFromQueue(dateValue, patientId) {
      const normalizedPatientId = String(patientId || '').trim();
      if (!dateValue || !normalizedPatientId) {
        return;

      const queueState = getQueueState();
      const nextEntries = getExplicitQueueIdsForDate(dateValue).filter((entry) => entry !== normalizedPatientId);

        queueState[dateValue] = nextEntries;

      return entry.type === 'prescription'

    function normalizePrescriptionEntry(entry, fallbackPatient = null, fallbackId = '') {
      if (!entry || typeof entry !== 'object') {
        return null;
      }

      const normalizedPatientId = getNormalizedPatientId(
        entry.patientId
        || entry.officeId
        || fallbackPatient?.patientId
        || fallbackId
      );

      if (!isUsablePatientId(normalizedPatientId)) {
        return null;

      return {
        ...entry,
        patientId: normalizedPatientId,
        type: isPrescriptionHistoryEntry(entry) ? 'prescription' : entry.type || '',
        source: entry.source || (getPrescriptionDownloadUrl(entry) ? 'prescription-pdf' : ''),
        createdAtIso: entry.createdAtIso || entry.createdAt || entry.savedAt || entry.updatedAt || '',

        .map((entry, index) => {
          const normalized = normalizePrescriptionEntry(entry, patient, patient.patientId || '');
          if (!normalized) {

          }

          return {
            id: normalized.prescriptionSaveId || normalized.id || `${getNormalizedPatientId(patient.patientId)}-patient-rx-${index}`,
            ...normalized
          };
        })
        .filter(Boolean);
    }

    async function getStoragePrescriptionEntriesForPatient(patient) {
      if (!storage || !patient) {
        return [];
      }

      const patientId = getNormalizedPatientId(patient.patientId || patient.id || '');
      if (!isUsablePatientId(patientId)) {
        return [];
      }

      try {
        const folderRef = ref(storage, `${CLINIC_STORAGE_PREFIX}/prescriptions/${patientId}`);
        const folder = await listAll(folderRef);
        const pdfRefs = folder.items.filter((itemRef) => itemRef.name.toLowerCase().endsWith('.pdf'));

        return (await Promise.all(pdfRefs.map(async (itemRef) => {
          const [downloadURL, metadata] = await Promise.all([
            getDownloadURL(itemRef),
            getMetadata(itemRef).catch(() => ({}))
          ]);
          const createdAtIso = metadata.timeCreated || metadata.updated || '';
          const id = metadata.fullPath || itemRef.fullPath || `${patientId}-${itemRef.name}`;

          return normalizePrescriptionEntry({
            id,
            prescriptionSaveId: id,
            patientId,
            childName: getPatientDisplayName(patient),
            phone: patient.phone || '',
            downloadURL,
            storagePath: metadata.fullPath || itemRef.fullPath || '',
            fileName: metadata.name || itemRef.name,
            createdAtIso,
            createdAtDisplay: createdAtIso ? '' : itemRef.name,
            source: 'prescription-pdf',
            type: 'prescription'
          }, patient, patientId);
        }))).filter(Boolean);
      } catch (error) {
        console.warn(`Unable to load prescription PDFs for ${patientId}: ${error.message}`);
        return [];
      }
    }

    async function getStoragePrescriptionEntriesForPatients(patients) {
      if (!storage || !Array.isArray(patients) || patients.length === 0) {
        return [];
      }

      const seenIds = new Set();
      const uniquePatients = patients.filter((patient) => {
        const patientId = getNormalizedPatientId(patient?.patientId || patient?.id || '');
        if (!patientId || seenIds.has(patientId)) {
          return false;
        }
        seenIds.add(patientId);
        return true;
      });

      const chunks = [];
      for (let index = 0; index < uniquePatients.length; index += 8) {
        chunks.push(uniquePatients.slice(index, index + 8));
      }

      const entries = [];
      for (const chunk of chunks) {
        const chunkEntries = await Promise.all(chunk.map((patient) => getStoragePrescriptionEntriesForPatient(patient)));
        entries.push(...chunkEntries.flat());
      }

      return entries;
    }

    function getHistoryEntryKey(entry, fallbackPrefix = 'history', index = 0) {
      return entry?.prescriptionSaveId
        || entry?.id
        || getPrescriptionDownloadUrl(entry)
        || `${entry?.patientId || fallbackPrefix}-${entry?.createdAtIso || index}`;
    }

    function mergeHistoryEntries(entries) {
      if (!Array.isArray(entries) || entries.length === 0) {
        return false;
      }

      const existingHistoryById = new Map();
      allHistory.forEach((entry, index) => {
        existingHistoryById.set(getHistoryEntryKey(entry, 'history', index), entry);
      });

      let changed = false;
      entries.forEach((entry, index) => {
        const key = getHistoryEntryKey(entry, 'storage', index);
        if (!existingHistoryById.has(key)) {
          changed = true;
        }
        existingHistoryById.set(key, entry);
      });

      if (!changed) {
        return false;
      }

      allHistory = [...existingHistoryById.values()];
      rebuildHistoryIndexes();
      saveSearchCache();
      return true;
    }

    function ensureStoragePrescriptionsForPatient(patient) {
      const patientId = getNormalizedPatientId(patient?.patientId || patient?.id || '');
      if (!patientId || storagePrescriptionPatientIdsLoaded.has(patientId) || storagePrescriptionPatientLoads.has(patientId)) {
        return;
      }

      const loadPromise = getStoragePrescriptionEntriesForPatient(patient)
        .then((entries) => {
          storagePrescriptionPatientIdsLoaded.add(patientId);
          storagePrescriptionPatientLoads.delete(patientId);
          if (mergeHistoryEntries(entries)) {
            filterPatients();
          }
        })
        .catch((error) => {
          storagePrescriptionPatientLoads.delete(patientId);
          console.warn(`Unable to load prescription PDFs for selected patient ${patientId}: ${error.message}`);
        });

      storagePrescriptionPatientLoads.set(patientId, loadPromise);
    }

    function renderPrescriptionPreviewImage(imageElement) {
      if (!(imageElement instanceof HTMLImageElement)) {
        return;
      }

      if (imageElement.dataset.rendered === 'true') {
        return;
      }

      const previewImageUrl = imageElement.dataset.previewImageUrl || '';
      if (!previewImageUrl) {
        return;
      }

      imageElement.onload = () => {
        markPrescriptionPreviewReady(imageElement);
      };
      imageElement.onerror = () => {
        markPrescriptionPreviewError(imageElement, 'Preview image could not be loaded. Open the prescription PDF instead.');
      };
      imageElement.src = previewImageUrl;
    }

    function renderPrescriptionPreviewPdf(frameElement) {
      if (!(frameElement instanceof HTMLIFrameElement)) {
        return;
      }

      if (frameElement.dataset.rendered === 'true' || frameElement.dataset.pdfLoading === 'true') {
        return;
      }

      const pdfUrl = frameElement.dataset.previewPdfUrl || '';
      if (!pdfUrl) {
        return;
      }

      setPrescriptionPreviewLoading(frameElement);

      if (frameElement._previewReadyTimer) {
        window.clearTimeout(frameElement._previewReadyTimer);
      }

      frameElement.onload = () => {
        markPrescriptionPreviewReady(frameElement);
      };
      frameElement.onerror = () => {
        markPrescriptionPreviewError(frameElement, 'Prescription preview could not be loaded. Open the prescription instead.');
      };

      frameElement._previewReadyTimer = window.setTimeout(() => {
        if (frameElement.dataset.rendered !== 'true') {
          frameElement.dataset.pdfLoading = 'false';
          frameElement.dataset.pdfError = 'false';
          frameElement.classList.add('is-ready');
          const placeholder = frameElement.parentElement?.querySelector('.prescription-preview-placeholder');
          if (placeholder) {
            placeholder.hidden = true;
            placeholder.style.display = 'none';
            placeholder.classList.remove('is-error');
          }
        }
      }, 3500);

      frameElement.src = pdfUrl.includes('pdf-viewer.html') || pdfUrl.includes('#')
        ? pdfUrl
        : `${pdfUrl}#page=1&toolbar=0&navpanes=0&scrollbar=0&view=FitH`;
    }

    function attachPrescriptionPreviewRendering() {
      const previewElements = [
        ...resultsPanel.querySelectorAll('.prescription-preview-frame[data-preview-image-url]'),
        ...resultsPanel.querySelectorAll('.prescription-preview-embed[data-preview-pdf-url]')
      ];
      if (!previewElements.length) {
        return;
      }

      previewElements.forEach((previewElement) => {
        if (previewElement instanceof HTMLImageElement) {
          renderPrescriptionPreviewImage(previewElement);
        } else if (previewElement instanceof HTMLIFrameElement) {
          renderPrescriptionPreviewPdf(previewElement);
        }
      });
    }

    function formatDateDisplay(dateValue, fallback = 'DOB not saved') {
      if (!dateValue) {
        return fallback;
      }

      const parsed = new Date(dateValue);
      if (Number.isNaN(parsed.getTime())) {
        return dateValue;
      }

      return parsed.toLocaleDateString('en-IN', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      });
    }

    function getIsoDatePart(dateValue) {
      if (!dateValue) {
        return '';
      }

      const parsed = new Date(dateValue);
      if (Number.isNaN(parsed.getTime())) {
        return '';
      }

      const year = parsed.getFullYear();
      const month = String(parsed.getMonth() + 1).padStart(2, '0');
      const day = String(parsed.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function formatIsoDateFromDate(dateValue) {
      const year = dateValue.getFullYear();
      const month = String(dateValue.getMonth() + 1).padStart(2, '0');
      const day = String(dateValue.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getTodayIsoDate() {
      return formatIsoDateFromDate(new Date());
    }

    function formatHistoryDateTime(entry) {
      if (entry.createdAtIso) {
        const parsed = new Date(entry.createdAtIso);
        if (!Number.isNaN(parsed.getTime())) {
          return parsed.toLocaleString('en-IN');
        }
      }

      return entry.createdAtDisplay || 'Saved measurement';
    }

    function formatHistoryDateHeader(entry) {
      if (entry.createdAtIso) {
        const parsed = new Date(entry.createdAtIso);
        if (!Number.isNaN(parsed.getTime())) {
          return parsed.toLocaleDateString('en-IN', {
            day: '2-digit',
            month: 'short',
            year: '2-digit'
          });
        }
      }

      return 'Saved';
    }

    function formatMetricCellValue(value, suffix = '') {
      return value && String(value).trim() ? `${value}${suffix}` : '';
    }

    function getPatientDisplayName(patient) {
      return (
        patient.childName
        || [patient.firstName, patient.middleName, patient.lastName].filter(Boolean).join(' ').trim()
        || patient.patientId
        || 'Unknown child'
      );
    }

    function normalizeSearchValue(value) {
      return String(value || '').replace(/\D+/g, '');
    }

    function normalizeSearchText(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, ' ')
        .trim()
        .replace(/\s+/g, ' ');
    }

    function buildPatientSearchMeta(patient) {
      const displayName = normalizeSearchText(getPatientDisplayName(patient));
      const explicitNames = [
        patient.childName,
        patient.firstName,
        patient.middleName,
        patient.lastName
      ].map(normalizeSearchText).filter(Boolean);
      const names = [...new Set([displayName, ...explicitNames].filter(Boolean))];
      const tokens = [...new Set(names.flatMap((value) => value.split(/\s+/)).filter(Boolean))];
      const patientId = getNormalizedPatientId(patient.patientId);
      const phones = [patient.phone, patient.mobileNumber].map(normalizeSearchValue).filter(Boolean);

      return {
        names,
        tokens,
        patientId,
        phones,
        sortName: getPatientDisplayName(patient)
      };
    }

    function preparePatientForSearch(patient) {
      if (!patient || typeof patient !== 'object') {
        return patient;
      }

      Object.defineProperty(patient, '__searchMeta', {
        value: buildPatientSearchMeta(patient),
        configurable: true
      });
      if (Object.prototype.hasOwnProperty.call(patient, '__measurementEntries')) {
        delete patient.__measurementEntries;
      }
      return patient;
    }

    function getPatientSearchMeta(patient) {
      if (!patient?.__searchMeta) {
        preparePatientForSearch(patient);
      }

      return patient.__searchMeta || buildPatientSearchMeta(patient || {});
    }

    function getPatientNameParts(patient) {
      const { names, tokens } = getPatientSearchMeta(patient);
      return { names, tokens };
    }

    function getPatientSearchTokens(patient) {
      if (Array.isArray(patient.__searchTokens)) {
        return patient.__searchTokens;
      }

      const tokens = [
        patient.childName,
        patient.firstName,
        patient.middleName,
        patient.lastName,
        patient.patientId,
        patient.parentName
      ]
        .filter(Boolean)
        .flatMap((value) => String(value).toLowerCase().split(/\s+/))
        .filter(Boolean);
      Object.defineProperty(patient, '__searchTokens', {
        value: tokens,
        configurable: true
      });
      return tokens;
    }

    function getPatientSearchRank(patient, rawSearchValue) {
      const loweredSearchValue = normalizeSearchText(rawSearchValue);
      if (!loweredSearchValue) {
        return 0;
      }

      const searchMeta = getPatientSearchMeta(patient);
      const normalizedPatientId = searchMeta.patientId;
      const normalizedSearchPatientId = getNormalizedPatientId(rawSearchValue);
      const normalizedSearchValue = normalizeSearchValue(rawSearchValue);
      const normalizedPatientPhones = searchMeta.phones;
      const isLikelyPatientIdSearch = /^(GS|SAC|SX|TEST)[A-Z0-9]*/.test(normalizedSearchPatientId)
        || /\d/.test(normalizedSearchPatientId);
      const { names, tokens } = searchMeta;

      if (names.some((name) => name === loweredSearchValue)) {
        return 100;
      }
      if (names.some((name) => name.startsWith(loweredSearchValue))) {
        return 90;
      }
      if (tokens.some((token) => token === loweredSearchValue)) {
        return 80;
      }
      if (tokens.some((token) => token.startsWith(loweredSearchValue))) {
        return 70;
      }
      if (isLikelyPatientIdSearch && normalizedPatientId && normalizedSearchPatientId && normalizedPatientId === normalizedSearchPatientId) {
        return 65;
      }
      if (isLikelyPatientIdSearch && normalizedPatientId && normalizedSearchPatientId && normalizedPatientId.startsWith(normalizedSearchPatientId)) {
        return 60;
      }
      if (normalizedSearchValue && normalizedPatientPhones.some((phone) => phone === normalizedSearchValue)) {
        return 58;
      }
      if (normalizedSearchValue && normalizedPatientPhones.some((phone) => phone.includes(normalizedSearchValue))) {
        return 50;
      }
      if (isLikelyPatientIdSearch && normalizedPatientId && normalizedSearchPatientId && normalizedPatientId.includes(normalizedSearchPatientId)) {
        return 40;
      }

      return 0;
    }

    function isExactPatientIdSearch(rawSearchValue) {
      const normalizedSearchPatientId = getNormalizedPatientId(rawSearchValue);
      return /^(GS|SAC|SX|TEST)[A-Z0-9]*\d[A-Z0-9]*$/.test(normalizedSearchPatientId);
    }

    function patientMatchesSearch(patient, rawSearchValue) {
      if (!rawSearchValue.trim()) {
        return true;
      }

      return getPatientSearchRank(patient, rawSearchValue) > 0;
    }

    function sortByPatientName(left, right) {
      return getPatientSearchMeta(left).sortName.localeCompare(getPatientSearchMeta(right).sortName);
    }

    function getMeasurementEntries(patient) {
      if (Array.isArray(patient.__measurementEntries)) {
        return patient.__measurementEntries;
      }

      const entries = Array.isArray(patient.measurementHistory) ? [...patient.measurementHistory] : [];
      if (patient.lastMeasurementRecord && entries.length === 0) {
        entries.push(patient.lastMeasurementRecord);
      }

      const sortedEntries = entries.sort((a, b) => {
        const aTime = Date.parse(a?.createdAtIso || '') || 0;
        const bTime = Date.parse(b?.createdAtIso || '') || 0;
        return bTime - aTime;
      });
      Object.defineProperty(patient, '__measurementEntries', {
        value: sortedEntries,
        configurable: true
      });
      return sortedEntries;
    }

    function isMeasurementHistoryEntry(entry) {
      if (!entry || typeof entry !== 'object') {
        return false;
      }

      if (entry.type === 'prescription' || entry.source === 'prescription-pdf') {
        return false;
      }

      return ['weight', 'height', 'head', 'spo2', 'pulse', 'systolic', 'diastolic', 'temp']
        .some((key) => String(entry[key] || '').trim());
    }

    function rebuildHistoryIndexes() {
      const byPatientId = new Map();
      const byPatientDate = new Map();

      allHistory
        .filter((entry) => isPrescriptionHistoryEntry(entry))
        .forEach((entry) => {
          const patientId = getNormalizedPatientId(entry.patientId);
          if (!patientId) {
            return;
          }

          const entries = byPatientId.get(patientId) || [];
          entries.push(entry);
          byPatientId.set(patientId, entries);

          const dateValue = getIsoDatePart(entry.createdAtIso);
          if (dateValue) {
            const dateKey = `${patientId}|${dateValue}`;
            const dateEntries = byPatientDate.get(dateKey) || [];
            dateEntries.push(entry);
            byPatientDate.set(dateKey, dateEntries);
          }
        });

      byPatientId.forEach((entries) => {
        entries.sort((a, b) => new Date(b.createdAtIso || 0) - new Date(a.createdAtIso || 0));
      });

      prescriptionHistoryByPatientId = byPatientId;
      prescriptionHistoryByPatientDate = byPatientDate;
    }

    function getHistoryEntriesByPatientId(historyEntries) {
      const historyByPatientId = new Map();

      historyEntries.forEach((entry) => {
        const patientId = getNormalizedPatientId(entry.patientId);
        if (!isUsablePatientId(patientId)) {
          return;
        }

        const entries = historyByPatientId.get(patientId) || [];
        entries.push(entry);
        historyByPatientId.set(patientId, entries);
      });

      historyByPatientId.forEach((entries) => {
        entries.sort((left, right) => {
          const leftTime = Date.parse(left.createdAtIso || '') || 0;
          const rightTime = Date.parse(right.createdAtIso || '') || 0;
          return rightTime - leftTime;
        });
      });

      return historyByPatientId;
    }

    function getMergedHistoryEntries(remoteHistory, patientRecords) {
      const localHistory = getLocalPrescriptionEntries()
        .map((entry) => normalizePrescriptionEntry(entry))
        .filter(Boolean);
      const mergedHistoryById = new Map();

      [...remoteHistory, ...localHistory].forEach((entry, index) => {
        const key = entry.prescriptionSaveId
          || entry.id
          || getPrescriptionDownloadUrl(entry)
          || `${entry.patientId || 'history'}-${entry.createdAtIso || index}`;
        mergedHistoryById.set(key, entry);
      });

      patientRecords.forEach((patient) => {
        getPatientPrescriptionHistoryEntries(patient).forEach((entry, index) => {
          const key = entry.prescriptionSaveId
            || entry.id
            || getPrescriptionDownloadUrl(entry)
            || `${entry.patientId || 'patient'}-embedded-${index}`;
          if (!mergedHistoryById.has(key)) {
            mergedHistoryById.set(key, entry);
          }
        });
      });

      return [...mergedHistoryById.values()];
    }

    function buildPatientsFromRecords(patientRecords, historyEntries = []) {
      const historyByPatientId = getHistoryEntriesByPatientId(historyEntries);
      const mergedPatients = [];
      const seenPatientIds = new Set();

      patientRecords.forEach((patient) => {
        if (patient.status === 'pending' || patient.status === 'rejected') {
          return;
        }
        const patientId = getNormalizedPatientId(patient.patientId);
        const patientHistoryEntries = patientId ? historyByPatientId.get(patientId) || [] : [];

        const measurementEntries = Array.isArray(patient.measurementHistory)
          ? [...patient.measurementHistory]
          : [];
        patientHistoryEntries
          .filter(isMeasurementHistoryEntry)
          .forEach((entry) => {
            const entryKey = createMeasurementEntryKey(entry);
            const alreadyIncluded = measurementEntries.some((candidate) => createMeasurementEntryKey(candidate) === entryKey);
            if (!alreadyIncluded) {
              measurementEntries.push(entry);
            }
          });

        mergedPatients.push(preparePatientForSearch({
          ...patient,
          measurementHistory: measurementEntries,
          lastMeasurementRecord: patient.lastMeasurementRecord || measurementEntries[0] || null
        }));

        if (isUsablePatientId(patientId)) {
          seenPatientIds.add(patientId);
        }
      });

      historyByPatientId.forEach((entries, patientId) => {
        if (seenPatientIds.has(patientId)) {
          return;
        }

        const latest = entries[0] || {};
        mergedPatients.push(preparePatientForSearch({
          id: `history-${patientId}`,
          patientId: latest.patientId || patientId,
          childName: latest.childName || latest.patientName || '',
          firstName: latest.firstName || '',
          middleName: latest.middleName || '',
          lastName: latest.lastName || '',
          parentName: latest.parentName || '',
          phone: latest.phone || '',
          gender: latest.gender || '',
          dob: latest.dob || '',
          measurementHistory: entries.filter(isMeasurementHistoryEntry),
          lastMeasurementRecord: entries.find(isMeasurementHistoryEntry) || null,
          fromHistoryOnly: true
        }));
      });

      return withTestPastChartsPatient(mergedPatients).map(preparePatientForSearch).sort(sortByPatientName);
    }

    function getDateLabel(dateValue) {
      const parsed = new Date(`${dateValue}T12:00:00`);
      if (Number.isNaN(parsed.getTime())) {
        return 'Select date';
      }

      return parsed.toLocaleDateString('en-IN', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      });
    }

    function shiftIsoDate(dateValue, dayDelta) {
      const parsed = new Date(`${dateValue}T12:00:00`);
      if (Number.isNaN(parsed.getTime())) {
        return getTodayIsoDate();
      }
      parsed.setDate(parsed.getDate() + dayDelta);
      return formatIsoDateFromDate(parsed);
    }

    function openWorklistDatePicker(triggerElement) {
      const scope = triggerElement?.closest('.worklist-datebar') || resultsPanel;
      const dateInput = scope?.querySelector('[data-worklist-date-picker]');
      if (!(dateInput instanceof HTMLInputElement)) {
        return;
      }

      dateInput.focus({ preventScroll: true });
      if (typeof dateInput.showPicker === 'function') {
        dateInput.showPicker();
        return;
      }
      dateInput.click();
    }

    function getPatientVisitEntriesForDate(patient, dateValue) {
      return getMeasurementEntries(patient).filter((entry) => getIsoDatePart(entry.createdAtIso) === dateValue);
    }

    function getPatientAppointmentDates(patient) {
      return [
        patient.appointmentDate,
        patient.appointmentAt,
        patient.nextAppointmentDate,
        patient.nextVisitDate,
        patient.visitDate,
        patient.followUpDate
      ]
        .map(getIsoDatePart)
        .filter(Boolean);
    }

    function patientHasAppointmentOnDate(patient, dateValue) {
      return getPatientAppointmentDates(patient).includes(dateValue);
    }

    function getLatestMeasurementForDate(patient, dateValue) {
      return getPatientVisitEntriesForDate(patient, dateValue)[0] || getMeasurementEntries(patient)[0] || null;
    }

    function getQueuedPatientIdSet(dateValue) {
      return new Set(getExplicitQueueIdsForDate(dateValue));
    }

    function getWorklistCounts(patients, dateValue) {
      const queuedIds = getQueuedPatientIdSet(dateValue);
      let seen = 0;
      let queue = 0;

      patients.forEach((patient) => {
        const hasSeen = patientHasSeenActivityOnDate(patient, dateValue);
        if (hasSeen) {
          seen += 1;
        } else if (patientIsQueuedOnDate(patient, dateValue, queuedIds)) {
          queue += 1;
        }
      });

      return { seen, queue };
    }

    function getWorklistPatients(patients, dateValue, mode, searchValue = '') {
      const hasSearch = Boolean(String(searchValue || '').trim());
      const queuedIds = getQueuedPatientIdSet(dateValue);
      const filtered = hasSearch
        ? [...patients]
        : !historyLoaded
          ? [...patients]
        : mode === 'queue'
          ? patients.filter((patient) => patientIsQueuedOnDate(patient, dateValue, queuedIds))
          : patients.filter((patient) => patientHasSeenActivityOnDate(patient, dateValue));

      return filtered.sort((left, right) => {
        const leftVisit = getLatestMeasurementForDate(left, dateValue);
        const rightVisit = getLatestMeasurementForDate(right, dateValue);
        const leftSeenScore = patientHasSeenActivityOnDate(left, dateValue) ? 1 : 0;
        const rightSeenScore = patientHasSeenActivityOnDate(right, dateValue) ? 1 : 0;
        const leftTime = Date.parse(leftVisit?.createdAtIso || '') || 0;
        const rightTime = Date.parse(rightVisit?.createdAtIso || '') || 0;
        return rightSeenScore - leftSeenScore || rightTime - leftTime || sortByPatientName(left, right);
      });
    }

    function renderMeasurementHtml(patient) {
      const entries = getMeasurementEntries(patient).slice(0, 3);

      if (entries.length === 0) {
        return '<p>No chart measurements have been saved for this patient yet.</p>';
      }

      return `
        <div class="measurement-stack">
          ${entries.map((entry) => `
            <div class="measurement-item">
              <strong>${entry.createdAtDisplay || 'Saved measurement'}</strong>
              <span>Wt ${entry.weight || '-'} kg • Ht ${entry.height || '-'} cm • HC ${entry.head || '-'} cm</span>
              <span>SpO2 ${entry.spo2 || '-'}% • Pulse ${entry.pulse || '-'} bpm • BP ${entry.systolic || '-'}/${entry.diastolic || '-'} mmHg • Temp ${entry.temp || '-'}°C</span>
              <span>Charts: ${Array.isArray(entry.charts) && entry.charts.length > 0 ? entry.charts.join(', ') : 'Not saved'}</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderMeasurementTableHtml(patient, selectedDate = '') {
      const entries = getMeasurementEntries(patient);
      if (entries.length === 0 && !selectedDate) {
        return '';
      }

      const patientId = formatMissing(patient.patientId, 'ID not saved');
      const showAll = Boolean(historyShowAll[patientId]) && !selectedDate;
      const allFilteredEntries = getEditableMeasurementEntries(patient, selectedDate);
      const totalPages = showAll ? Math.max(1, Math.ceil(allFilteredEntries.length / HISTORY_PAGE_SIZE)) : 1;
      const currentPage = showAll
        ? Math.min(Math.max(Number(historyPageIndexes[patientId] || 0), 0), totalPages - 1)
        : 0;
      historyPageIndexes[patientId] = currentPage;
      const startIndex = showAll ? currentPage * HISTORY_PAGE_SIZE : 0;
      const visibleCount = showAll ? HISTORY_PAGE_SIZE : HISTORY_DEFAULT_VISIBLE_COUNT;
      const filteredEntries = allFilteredEntries.slice(startIndex, startIndex + visibleCount);
      const canToggleAllEntries = !selectedDate && allFilteredEntries.length > 0;

      const rows = [
        {
          label: 'Weight',
          unit: 'kg',
          key: 'weight',
          placeholder: 'kg',
          getValue: (entry) => formatMetricCellValue(entry.weight)
        },
        {
          label: 'Height',
          unit: 'cm',
          key: 'height',
          placeholder: 'cm',
          getValue: (entry) => formatMetricCellValue(entry.height)
        },
        {
          label: 'Ofc',

    function formatPrescriptionDate(entry) {
      if (entry.createdAtIso) {
        const parsed = new Date(entry.createdAtIso);
        if (!Number.isNaN(parsed.getTime())) {
          return parsed.toLocaleDateString('en-IN', {
            day: '2-digit',
            month: 'short',
            year: 'numeric'
          });
        }
      }

      return entry.createdAtDisplay || 'Saved prescription';
    }

    function getPrescriptionEntries(patientId) {
      return prescriptionHistoryByPatientId.get(getNormalizedPatientId(patientId)) || [];
    }

    function createMeasurementEntryKey(entry) {
      return String(entry?.createdAtIso || '').trim()
        || `${entry?.weight || ''}-${entry?.height || ''}-${entry?.head || ''}-${entry?.spo2 || ''}-${entry?.pulse || ''}`;
    }

    function buildBlankMeasurementEntry(dateValue) {
      const isoSeed = dateValue || getTodayIsoDate();
      return {
        createdAtIso: `${isoSeed}T12:00:00.000Z`,
        weight: '',
        height: '',
        head: '',
        spo2: '',
        pulse: '',
        systolic: '',
        diastolic: '',
        temp: ''
      };
    }

    function getEditableMeasurementEntries(patient, selectedDate = '') {
      const entries = getMeasurementEntries(patient);
      if (selectedDate) {
        const matches = entries.filter((entry) => getIsoDatePart(entry.createdAtIso) === selectedDate);
        return matches.length ? matches.slice(0, 6) : [buildBlankMeasurementEntry(selectedDate)];
      }

      return entries;
    }

    async function saveMeasurementEntryEdit(patientId, entryKey, metricKey, nextValue) {
      if (!db || !patientId || !entryKey || !metricKey) {
        return;
      }

      const patientIndex = allPatients.findIndex((entry) => String(entry?.patientId || '').trim().toUpperCase() === String(patientId).trim().toUpperCase());
      if (patientIndex < 0) {
        throw new Error('Patient not found for this edit');
      }

      const patient = allPatients[patientIndex];
      const entries = getMeasurementEntries(patient).map((entry) => ({ ...entry }));
      const existingIndex = entries.findIndex((entry) => createMeasurementEntryKey(entry) === entryKey);
      const targetEntry = existingIndex >= 0 ? { ...entries[existingIndex] } : { ...buildBlankMeasurementEntry(getIsoDatePart(entryKey)), createdAtIso: entryKey };
      targetEntry[metricKey] = String(nextValue || '').trim();

      const nextEntries = existingIndex >= 0
        ? entries.map((entry, index) => index === existingIndex ? targetEntry : entry)
        : [targetEntry, ...entries];

      nextEntries.sort((a, b) => new Date(b.createdAtIso || 0) - new Date(a.createdAtIso || 0));
      const latestEntry = nextEntries[0] || null;

      await setDoc(doc(db, FIREBASE_COLLECTIONS.patients, patientId), {
        patientId,
        measurementHistory: nextEntries,
        ...(latestEntry ? { lastMeasurementRecord: latestEntry } : {}),
        updatedAt: serverTimestamp()
      }, { merge: true });

      allPatients = allPatients.map((entry) => {
        if (String(entry?.patientId || '').trim().toUpperCase() !== String(patientId).trim().toUpperCase()) {
          return entry;
        }

        return {
          ...entry,
          measurementHistory: nextEntries,
          lastMeasurementRecord: latestEntry
        };
      });
    }

    function getPrescriptionEntriesForDate(patientId, dateValue) {
      return prescriptionHistoryByPatientDate.get(`${getNormalizedPatientId(patientId)}|${dateValue}`) || [];
    }

    function patientHasSeenActivityOnDate(patient, dateValue) {
      const patientId = String(patient?.patientId || '').trim();
      return getPatientVisitEntriesForDate(patient, dateValue).length > 0
        || (patientId && getPrescriptionEntriesForDate(patientId, dateValue).length > 0);
    }

    function patientIsQueuedOnDate(patient, dateValue, queuedIds = null) {
      const patientId = String(patient?.patientId || '').trim();
      if (!patientId) {
        return false;
      }

      const ids = queuedIds || getQueuedPatientIdSet(dateValue);
      return ids.has(patientId) && !patientHasSeenActivityOnDate(patient, dateValue);
    }
